<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Task Portal</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {db} from './firebase.js';import {doc,getDoc,collection,addDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
const p=new URLSearchParams(location.search), id=p.get('id'), pub=p.get('pub')||'', sid=p.get('sid')||'', source=p.get('source')||'';const safe=v=>String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));const money=v=>'₹'+Number(v||0).toLocaleString('en-IN');let camp=null, sl=null;if(id){const s=await getDoc(doc(db,'campaigns',id)); if(s.exists()) camp={id:s.id,...s.data()};}if(sid){const ss=await getDoc(doc(db,'smart_links',sid)).catch(()=>null); if(ss?.exists()) sl={id:ss.id,...ss.data()};}if(!camp){location.replace('index.html')}else{const reward=Number(sl?.userReward||camp.userReward||camp.reward||0);root.innerHTML=`<div class="landing"><div class="landingCard"><div class="landingHero"><img src="${safe(camp.image||'')}"><div><h1>${safe(camp.title||'Campaign')}</h1><p><b class="greenText">Cashback ${money(reward)}</b> • Verified Task Portal</p></div></div><div class="notice"><b>Steps to Follow</b><p>${safe(camp.steps||'Complete all task steps carefully.').replaceAll('\n','<br>')}</p></div><input id="worker" class="field" placeholder="Worker ID / Name"><input id="upi" class="field" placeholder="UPI ID for reward"><button type="button" class="btn green full" onclick="startTask()">Confirm & Start Task ✨</button><p class="muted">Click tracked hoga. Fake/spam details par reward reject ho sakta hai.</p></div></div>`}
window.startTask=async()=>{const click=await addDoc(collection(db,'click_logs'),{campaignId:id,campaignTitle:camp.title||'',publisherId:pub||sl?.publisherId||'',smartLinkId:sid,source,worker:worker.value,upi:upi.value,userReward:Number(sl?.userReward||camp.userReward||camp.reward||0),affiliateCommission:Number(sl?.affiliateCommission||0),referrer:document.referrer||'',userAgent:navigator.userAgent,time:Date.now(),createdAt:Date.now()});await addDoc(collection(db,'lead_submissions'),{clickId:click.id,campaignId:id,campaignTitle:camp.title||'',publisherId:pub||sl?.publisherId||'',smartLinkId:sid,worker:worker.value,upi:upi.value,userReward:Number(sl?.userReward||camp.userReward||camp.reward||0),reward:Number(sl?.userReward||camp.userReward||camp.reward||0),affiliateCommission:Number(sl?.affiliateCommission||0),status:'pending',time:Date.now(),createdAt:Date.now()});const url=camp.destinationUrl||camp.url||camp.offerUrl||''; if(url) location.href=url; else alert('Admin ne destination URL set nahi kiya hai.')};</script></body></html>
