<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Task Portal</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {db} from './firebase.js';import {doc,getDoc,collection,addDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';let id=new URLSearchParams(location.search).get('id');let pub=new URLSearchParams(location.search).get('pub')||'';let snap= id ? await getDoc(doc(db,'campaigns',id)) : null;let d=snap?.exists()?snap.data():null;if(!d){location.href='index.html'}else{root.innerHTML=`<div class="landing"><div class="panel" style="max-width:720px;text-align:left"><div style="display:flex;gap:16px;align-items:center;margin-bottom:18px"><img src="${d.image||''}" style="width:82px;height:82px;border-radius:18px;object-fit:cover"><div><h2>${d.title||'Campaign'}</h2><b style="color:#059669">VERIFIED TASK PORTAL</b></div></div><div class="stat"><span class="muted">Reward</span><h2>₹${d.reward||d.userReward||0}</h2></div><div class="notice"><b>Steps to Follow</b><p>${(d.steps||'Complete task').replaceAll('\n','<br>')}</p></div><input id="upi" class="field" placeholder="UPI ID"><button type="button" class="btn green full" onclick="startTask()">Confirm & Start Task ✨</button><p class="muted">After task complete, login karke proof submit karo.</p></div></div>`}window.startTask=async()=>{await addDoc(collection(db,'click_logs'),{campaignId:id,publisherId:pub,upi:upi.value,time:Date.now(),userAgent:navigator.userAgent});let url=d.destinationUrl||d.url||d.offerUrl||''; if(url) location.href=url; else alert('Admin ne destination URL set nahi kiya hai.')};</script></body></html>
