<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Task Portal</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">
import {db} from './firebase.js';
import {doc,getDoc,collection,getDocs,addDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
const q=new URLSearchParams(location.search);const id=q.get('id');const slug=q.get('slug');
const safe=v=>(v??'').toString().replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
async function startVisit(d){const clickId='clk_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);try{await addDoc(collection(db,'click_logs'),{campaignId:d.id||id,slug:slug||'',clickId,destinationUrl:d.destinationUrl||d.url||'',time:Date.now(),userAgent:navigator.userAgent});}catch(e){}let dest=d.destinationUrl||d.url||'';if(!dest){alert('Destination URL missing in campaign/admin.');return}dest+=(dest.includes('?')?'&':'?')+'click_id='+encodeURIComponent(clickId);location.href=dest}
async function run(){
 if(slug){let docs=(await getDocs(collection(db,'smart_links'))).docs.map(x=>({id:x.id,...x.data()}));let s=docs.find(x=>(x.slug||x.id)===slug);if(!s){location.href='index.html';return}await startVisit(s);return}
 if(!id){location.href='index.html';return}
 let snap=await getDoc(doc(db,'campaigns',id));if(!snap.exists()){location.href='index.html';return}let d={id:snap.id,...snap.data()};
 root.innerHTML=`<div class="worker"><div class="panel"><div style="display:flex;gap:16px;align-items:center;margin-bottom:18px"><img src="${safe(d.image||'')}" style="width:82px;height:82px;border-radius:18px;object-fit:cover;background:#eef2ff"><div><h2>${safe(d.title||'Task')}</h2><b style="color:#059669">VERIFIED TASK PORTAL</b></div></div><div class="balanceCard"><span>USER REWARD</span><h1>₹${d.reward||d.userReward||0}</h1><b>${safe(d.category||'CPA OFFER')}</b></div><div class="note"><b>STEPS TO FOLLOW</b><p>${safe(d.steps||d.description||'Complete task').replaceAll('\n','<br>')}</p></div><input class="field" placeholder="UPI ID"><button type="button" onclick="startNow()" class="btn green full">CONFIRM & START TASK ✨</button></div><div class="notice"><b>IMPORTANT NOTICE</b><p>Read all steps. One IP/device one time. Wrong details may reject payout.</p></div></div>`;
 window.startNow=()=>startVisit(d)
}
run();
</script></body></html>
