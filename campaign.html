<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Task Portal</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {db} from './firebase.js';import {doc,getDoc,collection,addDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';const p=new URLSearchParams(location.search),id=p.get('id');if(!id){location.replace('index.html')}const snap=await getDoc(doc(db,'campaigns',id));if(!snap.exists()){location.replace('index.html')}const d=snap.data();root.innerHTML=`<div class="worker"><div style="display:flex;gap:16px;align-items:center;margin:25px 0"><img src="${d.image||''}" style="width:82px;height:82px;border-radius:18px;object-fit:cover"><div><h2>${d.title||'Task'}</h2><b style="color:#059669">Verified Task Portal</b></div></div><div class="panel"><div class="cash">₹${Number(d.reward||0)}</div><div class="panel soft"><b>Steps To Follow</b><p>${(d.steps||'Complete task').replaceAll('\n','<br>')}</p><input id="upi" class="field" placeholder="UPI ID"><button type="button" onclick="startTask()" class="btn green full">Confirm & Start Task ✨</button></div></div><div class="notice"><b>Important Notice</b><p>Read all steps. One IP/device one time. Wrong UPI may reject payout.</p></div></div>`;window.startTask=async()=>{await addDoc(collection(db,'click_logs'),{campaignId:id,publisherId:p.get('pub')||'',upi:upi.value,slug:d.slug||'',time:Date.now(),ua:navigator.userAgent});if(d.destinationUrl){location.href=d.destinationUrl}else{alert('Task started. Complete instructions and submit proof from dashboard.')}};</script></body></html>
