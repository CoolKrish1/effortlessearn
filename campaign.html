<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Campaign</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#eef2ff;padding:20px}
.card{max-width:720px;margin:auto;background:white;padding:25px;border-radius:24px}
img{width:90px;height:90px;border-radius:18px;object-fit:cover}
.top{display:flex;gap:15px;align-items:center}
.box{background:#f8fafc;padding:16px;border-radius:16px;margin-top:18px}
input{width:100%;padding:15px;margin-top:10px;border:1px solid #ddd;border-radius:12px}
button{width:100%;padding:16px;margin-top:18px;border:0;border-radius:14px;background:#111827;color:white;font-weight:bold}
.err{color:#b91c1c;margin-top:10px}
</style>
</head>
<body>

<div class="card">
<div class="top">
<img id="image" src="https://via.placeholder.com/100">
<div>
<h2 id="title">Loading...</h2>
<p>Cashback ₹<b id="reward">0</b></p>
</div>
</div>

<div class="box">
<h3>Instructions</h3>
<p id="instructions">Complete the task carefully.</p>
</div>

<div class="box">
<h3>Start Task</h3>
<input id="upi" placeholder="Enter UPI ID">
<button id="btn" onclick="startTask()">CONFIRM & START TASK</button>
<div class="err" id="err"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getFirestore,collection,query,where,getDocs,addDoc,limit } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
authDomain:"effortless-earn-7f39e.firebaseapp.com",
projectId:"effortless-earn-7f39e",
storageBucket:"effortless-earn-7f39e.appspot.com",
messagingSenderId:"554178513766",
appId:"1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const el=id=>document.getElementById(id);

let data=null;
let submitted=false;

const slug=new URLSearchParams(location.search).get("slug");

async function load(){
const snap=await getDocs(query(collection(db,"smart_links"),where("slug","==",slug),limit(1)));

if(snap.empty){
el("title").innerText="Invalid Link";
el("btn").disabled=true;
return;
}

data=snap.docs[0].data();

el("title").innerText=data.title||"Campaign";
el("reward").innerText=data.userReward||0;
el("instructions").innerText=data.instructions||"Enter UPI and complete task.";
if(data.image)el("image").src=data.image;
}

window.startTask=async function(){
if(submitted)return;

const upi=el("upi").value.trim();

if(!upi||!upi.includes("@")){
el("err").innerText="Valid UPI ID dalo";
return;
}

submitted=true;
el("btn").disabled=true;
el("btn").innerText="PLEASE WAIT...";

const trackingId=Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);

await addDoc(collection(db,"lead_submissions"),{
slug,
campaignId:data.campaignId||"",
publisherId:data.publisherId||"",
affiliateId:data.affiliateId||"",
title:data.title||"",
upi,
trackingId,
userReward:Number(data.userReward||0),
affiliateCommission:Number(data.affiliateCommission||0),
companyPayout:Number(data.companyPayout||0),
status:"pending",
verified:false,
time:Date.now()
});

let link=data.offerLink||"";

if(!link){
el("err").innerText="Offer link missing";
el("btn").disabled=false;
el("btn").innerText="CONFIRM & START TASK";
submitted=false;
return;
}

link=link.replace("{trackingId}",trackingId);
link=link.replace("{click_id}",trackingId);
link=link.replace("{upi}",encodeURIComponent(upi));

location.href=link;
};

load();
</script>
</body>
</html>
