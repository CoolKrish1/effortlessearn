<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Task Portal</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {db} from './firebase.js';import {doc,getDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';let id=new URLSearchParams(location.search).get('id');let snap=await getDoc(doc(db,'campaigns',id));let d=snap.data();root.innerHTML=`<div class="worker"><div style="display:flex;gap:16px;align-items:center;margin:25px 0"><img src="${d.image}" style="width:82px;height:82px;border-radius:18px;object-fit:cover"><div><h2>${d.title}</h2><b style="color:#059669">VERIFIED TASK PORTAL</b></div></div><div class="panel"><div class="cash">₹${d.reward}</div><div class="panel"><b>STEPS TO FOLLOW</b><p>${(d.steps||'Complete task').replaceAll('\\n','<br>')}</p><input class="field" placeholder="UPI ID"><button class="btn green full">CONFIRM & START TASK ✨</button></div></div><div class="notice"><b>IMPORTANT NOTICE</b><p>Read all steps. One IP/device one time. Wrong UPI may reject payout.</p></div></div>`;</script></body></html>
