<!DOCTYPE html>
<html>
<head>
<title>Admin Withdraw Panel</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
margin-right:10px;
cursor:pointer;
border:none;
border-radius:5px;
}

.approve{
background:green;
color:white;
}

.reject{
background:red;
color:white;
}

.pending{ color:orange; font-weight:bold; }
.approved{ color:green; font-weight:bold; }
.rejected{ color:red; font-weight:bold; }
</style>
</head>

<body>

<h1>Withdraw Requests (Admin Panel)</h1>

<div id="list">Loading requests...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
getDoc,
increment
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
  authDomain: "effortless-earn-7f39e.firebaseapp.com",
  projectId: "effortless-earn-7f39e",
  storageBucket: "effortless-earn-7f39e.firebasestorage.app",
  messagingSenderId: "554178513766",
  appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let processing = false;

//
// 📦 LOAD WITHDRAW REQUESTS
//
async function loadWithdrawals() {

  const snap = await getDocs(collection(db, "withdrawals"));

  let html = "";

  snap.forEach((docSnap) => {

    const data = docSnap.data();

    let statusClass = data.status === "pending"
      ? "pending"
      : data.status === "approved"
      ? "approved"
      : "rejected";

    html += `
      <div class="card">
        <p><b>User ID:</b> ${data.userId}</p>
        <p><b>Amount:</b> ₹${data.amount}</p>
        <p><b>UPI:</b> ${data.upi}</p>
        <p><b>Status:</b> <span class="${statusClass}">${data.status}</span></p>
        <p><b>Time:</b> ${data.createdAt ? new Date(data.createdAt.seconds*1000).toLocaleString() : "N/A"}</p>

        ${data.status === "pending" ? `
          <button class="approve" onclick="approve('${docSnap.id}')">
            Approve
          </button>

          <button class="reject" onclick="reject('${docSnap.id}')">
            Reject
          </button>
        ` : ``}
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "No withdrawals found";
}

//
// ✅ APPROVE
//
window.approve = async function(id) {

  if(processing) return;
  processing = true;

  try {

    const ref = doc(db, "withdrawals", id);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      alert("Request not found");
      return;
    }

    const data = snap.data();

    if(data.status !== "pending"){
      alert("Already processed");
      return;
    }

    const walletRef = doc(db, "wallets", data.userId);
    const walletSnap = await getDoc(walletRef);

    if (!walletSnap.exists()) {
      alert("Wallet not found");
      return;
    }

    const currentBalance = walletSnap.data().balance || 0;

    if (currentBalance < data.amount) {
      alert("Insufficient balance");
      return;
    }

    await updateDoc(ref, {
      status: "approved"
    });

    await updateDoc(walletRef, {
      balance: increment(-data.amount)
    });

    alert("Approved successfully!");

    loadWithdrawals();

  } catch (err) {
    alert(err.message);
  }

  processing = false;
};

//
// ❌ REJECT
//
window.reject = async function(id) {

  try {

    const ref = doc(db, "withdrawals", id);

    await updateDoc(ref, {
      status: "rejected"
    });

    alert("Rejected successfully!");
    loadWithdrawals();

  } catch (err) {
    alert(err.message);
  }
};

loadWithdrawals();

// 🔄 auto refresh every 10 sec
setInterval(loadWithdrawals, 10000);

</script>

</body>
</html>
