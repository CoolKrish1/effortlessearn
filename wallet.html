<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wallet</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,profile,withdraws,user} from './app.js';import {db} from './firebase.js';import {collection,addDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';window.renderPage=()=>{if(!requireLogin())return;shell('wallet',`<div class="banner" style="background:#24439a"><b>🛡 SECURE PAYMENT GATEWAY</b><br>Payments are processed within 3-7 business days.</div><div class="grid2"><div class="panel"><h2>Request Payout</h2><div style="background:#111827;color:white;border-radius:20px;text-align:center;padding:30px"><span class="muted">AVAILABLE BALANCE</span><h1>₹${profile?.balance||0}</h1><span class="tag">MIN WITHDRAW: ₹100</span></div><input id="wname" class="field" placeholder="Enter Name"><input id="wupi" class="field" placeholder="Enter UPI ID"><input id="wamount" type="number" class="field" placeholder="Amount"><button onclick="requestWithdraw()" class="btn full">WITHDRAW MONEY →</button></div><div class="panel"><h2>Payouts</h2>${withdraws.map(w=>`<div class="panel"><h2>₹${w.amount}</h2><p>${w.name} • ${w.upi}</p><span class="status ${w.status||'pending'}">${w.status||'pending'}</span></div>`).join('')||'No payouts'}</div></div>`)};window.requestWithdraw=async()=>{await addDoc(collection(db,'withdraws'),{userId:user.uid,name:wname.value,upi:wupi.value,amount:Number(wamount.value),status:'pending',time:Date.now()});alert('Withdraw requested');location.reload()};init();</script></body></html>
