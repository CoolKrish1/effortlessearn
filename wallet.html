<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wallet</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,profile,withdraws,user,money,toast} from './app.js';import {db} from './firebase.js';import {collection,addDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';window.renderPage=()=>{if(!requireLogin())return;shell('wallet',`<div class="banner"><b>🛡 Secure Payment Gateway</b><br>Payments are processed after admin approval.</div><div class="grid2"><div class="panel"><h2>Request Payout</h2><div class="cash">${money(profile?.balance)}</div><input id="wname" class="field" placeholder="Name"><input id="wupi" class="field" placeholder="UPI ID"><input id="wamount" type="number" class="field" placeholder="Amount"><button type="button" onclick="requestWithdraw()" class="btn full">Withdraw Money →</button></div><div class="panel"><h2>Payouts</h2>${withdraws.map(w=>`<div class="linkbox"><h2>${money(w.amount)}</h2><p>${w.name} • ${w.upi}</p><span class="status ${w.status||'pending'}">${w.status||'pending'}</span></div>`).join('')||'<div class="empty">No payouts</div>'}</div></div>`)};window.requestWithdraw=async()=>{const amount=Number(wamount.value||0);if(amount<100)return toast('Minimum withdraw ₹100','red');if(amount>Number(profile?.balance||0))return toast('Insufficient balance','red');await addDoc(collection(db,'withdraws'),{userId:user.uid,email:user.email,name:wname.value,upi:wupi.value,amount,status:'pending',time:Date.now()});toast('Withdraw requested');setTimeout(()=>location.reload(),600)};init();</script></body></html>
