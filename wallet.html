<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wallet</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,profile,user,withdraws,transactions,money,refresh,safe} from './app.js';import {db} from './firebase.js';import {collection,addDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
window.renderPage=()=>{if(!requireLogin())return;shell('wallet',`<div class="stats"><div class="stat"><span class="muted">Available Balance</span><h2>${money(profile?.balance||0)}</h2><small>Minimum withdraw ₹100</small></div><div class="stat"><span class="muted">Pending Withdraw</span><h2>${money(withdraws.filter(w=>(w.status||'pending')==='pending').reduce((a,b)=>a+Number(b.amount||0),0))}</h2></div><div class="stat"><span class="muted">Paid</span><h2>${money(withdraws.filter(w=>w.status==='approved').reduce((a,b)=>a+Number(b.amount||0),0))}</h2></div><div class="stat"><span class="muted">Requests</span><h2>${withdraws.length}</h2></div></div><div class="grid2"><div class="panel"><h2>Withdraw Request</h2><input id="amount" type="number" class="field" placeholder="Amount"><input id="upi" class="field" placeholder="UPI ID / Bank Details"><button type="button" class="btn green full" onclick="requestWithdraw()">Submit Withdraw</button></div><div class="panel"><h2>Important</h2><p>Wrong UPI/bank details par payment fail ho sakti hai. Admin approve karega tab status approved dikhega.</p></div></div><div class="panel"><h2>Withdraw History</h2><div class="tableWrap"><table class="table"><tr><th>Amount</th><th>UPI/Bank</th><th>Status</th><th>Date</th></tr>${withdraws.map(w=>`<tr><td>${money(w.amount||0)}</td><td>${safe(w.upi||'-')}</td><td><span class="status ${w.status||'pending'}">${safe(w.status||'pending')}</span></td><td>${new Date(w.createdAt||w.time||Date.now()).toLocaleString()}</td></tr>`).join('')||'<tr><td colspan="4">No withdrawals</td></tr>'}</table></div></div>`)};window.requestWithdraw=async()=>{const a=Number(amount.value||0);if(a<100)return alert('Minimum ₹100');if(a>Number(profile?.balance||0))return alert('Insufficient balance');await addDoc(collection(db,'withdrawals'),{userId:user.uid,publisherId:user.uid,email:user.email,name:profile?.name||'',amount:a,upi:upi.value,status:'pending',createdAt:Date.now()});alert('Withdraw request submitted');await refresh()};init();</script></body></html>
