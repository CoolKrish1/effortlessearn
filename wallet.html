<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Wallet</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
}

.top{
background:#111827;
padding:20px;
color:white;
}

.wrap{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.balance{
background:#111827;
padding:30px;
border-radius:20px;
color:white;
text-align:center;
margin-bottom:20px;
}

.balance h1{
font-size:45px;
color:#22c55e;
}

input{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
border:none;
background:black;
color:white;
border-radius:10px;
}

.item{
padding:15px;
border:1px solid #eee;
border-radius:12px;
margin-top:10px;
}

.pending{
color:orange;
font-weight:bold;
}

.approved{
color:green;
font-weight:bold;
}

@media(max-width:900px){

.wrap{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="top">

<h2>

Wallet & Withdraw

</h2>

</div>

<div class="wrap">

<div class="card">

<div class="balance">

Available Balance

<h1 id="bal">

₹0

</h1>

</div>

<input
id="name"
placeholder="Name"
>

<input
id="upi"
placeholder="UPI ID"
>

<input
id="amount"
type="number"
placeholder="Amount"
>

<button
onclick="withdraw()"
>

REQUEST WITHDRAW

</button>

</div>

<div class="card">

<h2>

Withdraw History

</h2>

<div id="list">

</div>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

collection,

addDoc,

getDocs

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.withdraw=
async()=>{

await addDoc(

collection(
db,
"withdraws"
),

{

name:
name.value,

upi:
upi.value,

amount:
Number(
amount.value
),

status:
"pending",

time:
Date.now()

}

);

alert(
"Withdraw Requested"
);

load();

}

async function load(){

const snap=

await getDocs(
collection(
db,
"withdraws"
)
);

let html="";

snap.forEach(doc=>{

let d=
doc.data();

html+=`

<div class="item">

<h3>

₹${d.amount}

</h3>

<p>

${d.name}

</p>

<p>

${d.upi}

</p>

<p class="${
d.status
}">

${d.status}

</p>

</div>

`;

});

list.innerHTML=
html;

}

load();

</script>

</body>
</html>
