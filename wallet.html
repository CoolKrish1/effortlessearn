<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wallet</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,profile,withdraws,user,loadData} from './app.js';import {db} from './firebase.js';import {collection,addDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';window.renderPage=()=>{if(!requireLogin())return;shell('wallet',`<div class="banner"><b>Secure Payment Gateway</b><br>Payments processed after admin approval.</div><div class="grid2"><div class="panel"><h2>Request Payout</h2><div class="stat"><span class="muted">Available Balance</span><h2>₹${profile?.balance||0}</h2><span class="tag">Min Withdraw ₹100</span></div><input id="wname" class="field" placeholder="Name"><input id="wupi" class="field" placeholder="UPI ID"><input id="wamount" type="number" class="field" placeholder="Amount"><button type="button" onclick="requestWithdraw()" class="btn blue full">Withdraw Money</button></div><div class="panel"><h2>Payouts</h2>${withdraws.map(w=>`<div class="linkbox"><h2>₹${w.amount}</h2><p>${w.name||''} • ${w.upi||''}</p><span class="status ${w.status||'pending'}">${w.status||'pending'}</span></div>`).join('')||'No payouts'}</div></div>`)};window.requestWithdraw=async()=>{if(Number(wamount.value)>Number(profile?.balance||0)){alert('Balance low');return}await addDoc(collection(db,'withdrawals'),{userId:user.uid,email:user.email,name:wname.value,upi:wupi.value,amount:Number(wamount.value),status:'pending',time:Date.now()});alert('Withdraw requested');await loadData();window.renderPage()};init();</script></body></html>
