<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wallet</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,profile,withdraws,user,api} from './app.js';import {db} from './firebase.js';import {collection,addDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';const {refresh,safe}=api;window.renderPage=()=>{if(!requireLogin())return;let mine=withdraws.filter(w=>w.userId===user.uid||w.email===user.email);shell('wallet',`<div class="banner"><b>🛡 Secure Payment Gateway</b><br>Payments are processed within 3-7 business days.</div><div class="grid2"><div class="panel"><h2>Request Payout</h2><div class="balanceCard"><span>AVAILABLE BALANCE</span><h1>₹${profile?.balance||0}</h1><b>MIN WITHDRAW: ₹100</b></div><input id="wname" class="field" placeholder="Enter Name"><input id="wupi" class="field" placeholder="Enter UPI ID"><input id="wamount" type="number" class="field" placeholder="Amount"><button type="button" onclick="requestWithdraw()" class="btn blue full">WITHDRAW MONEY →</button></div><div class="panel"><h2>Payouts</h2>${mine.map(w=>`<div class="mini"><div><h3>₹${w.amount||0}</h3><p>${safe(w.name||'')} • ${safe(w.upi||'')}</p></div><span class="status ${w.status||'pending'}">${w.status||'pending'}</span></div>`).join('')||'<p class="muted">No payouts</p>'}</div></div>`)};window.requestWithdraw=async()=>{if(Number(wamount.value)<100){alert('Minimum withdraw ₹100');return} await addDoc(collection(db,'withdraws'),{userId:user.uid,email:user.email,name:wname.value,upi:wupi.value,amount:Number(wamount.value),status:'pending',time:Date.now()});alert('Withdraw requested');await refresh()};init();</script></body></html>
