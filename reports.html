<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reports</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,submissions} from './app.js';window.renderPage=()=>{if(!requireLogin())return;shell('reports',`<div class="toolbar"><button type="button" class="btn light">All: ${submissions.length}</button><button type="button" class="btn green">Approved: ${submissions.filter(x=>x.status==='approved').length}</button><button type="button" class="btn orange">Pending: ${submissions.filter(x=>(x.status||'pending')==='pending').length}</button></div><table class="table"><tr><th>Time</th><th>Offer</th><th>Payout</th><th>Status</th><th>UPI</th><th>Proof</th></tr>${submissions.map(s=>`<tr><td>${new Date(s.time||s.createdAt||Date.now()).toLocaleString()}</td><td>${s.campaignTitle||s.campaignId||s.campaign}</td><td>₹${s.reward||0}</td><td><span class="status ${s.status||'pending'}">${s.status||'pending'}</span></td><td>${s.upi||'-'}</td><td>${s.proof?`<a target="_blank" href="${s.proof}">View</a>`:'-'}</td></tr>`).join('')||'<tr><td colspan="6" style="text-align:center;padding:40px">No Records Found</td></tr>'}</table>`)};init();</script></body></html>
