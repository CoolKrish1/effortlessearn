<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reports</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,submissions,money} from './app.js';window.renderPage=()=>{if(!requireLogin())return;const row=s=>`<tr><td>${new Date(s.time||Date.now()).toLocaleString()}</td><td>${s.campaignTitle||s.campaign}</td><td>${money(s.reward)}</td><td><span class="status ${s.status||'pending'}">${s.status||'pending'}</span></td><td>${s.upi||'-'}</td><td>${s.proof?`<a target="_blank" href="${s.proof}">View</a>`:'-'}</td></tr>`;shell('reports',`<div class="toolbar"><button type="button" onclick="filterReport('all')" class="btn">All</button><button type="button" onclick="filterReport('approved')" class="btn green">Approved</button><button type="button" onclick="filterReport('pending')" class="btn orange">Pending</button></div><div class="panel"><h2>Tracking History</h2><div class="tablewrap"><table class="table" id="reportTable"><tr><th>Time</th><th>Offer</th><th>Payout</th><th>Status</th><th>UPI</th><th>Proof</th></tr>${submissions.map(row).join('')||`<tr><td colspan="6" style="text-align:center;padding:50px">No records found.</td></tr>`}</table></div></div>`);window.filterReport=(st)=>{let list=st==='all'?submissions:submissions.filter(x=>(x.status||'pending')===st);reportTable.innerHTML=`<tr><th>Time</th><th>Offer</th><th>Payout</th><th>Status</th><th>UPI</th><th>Proof</th></tr>${list.map(row).join('')}`}};init();</script></body></html>
