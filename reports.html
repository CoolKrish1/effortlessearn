<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Reports</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
}

.top{
background:#111827;
padding:20px;
color:white;
}

.wrap{
padding:20px;
}

.search{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:18px;
margin-bottom:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.card img{
width:100%;
max-height:250px;
object-fit:cover;
border-radius:12px;
margin-top:10px;
}

.row{
display:flex;
gap:10px;
margin-top:15px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
color:white;
}

.approve{
background:#16a34a;
}

.reject{
background:#dc2626;
}

.pending{
color:orange;
font-weight:bold;
}

.approved{
color:green;
font-weight:bold;
}

.rejected{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div class="top">

<h2>
Task Reports
</h2>

</div>

<div class="wrap">

<input
id="search"
class="search"
placeholder="Search Campaign"
oninput="filterReports()"
>

<div id="reports">

</div>

</div>

<script type="module">

import { db }

from "./firebase.js";

import {

collection,
getDocs,
doc,
updateDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let all=[];

async function load(){

const snap=

await getDocs(
collection(
db,
"submissions"
)
);

all=[];

snap.forEach(x=>{

all.push({

id:x.id,

...x.data()

});

});

render(all);

}

function render(data){

let html="";

data.forEach(d=>{

html+=`

<div class="card">

<h3>

Campaign:
${d.campaign}

</h3>

<p>

UPI:
${d.upi}

</p>

<p class="${d.status}">

${d.status}

</p>

<p>

${d.note||""}

</p>

${
d.proof ?

`<img src="${d.proof}">`

:

""

}

<div class="row">

<button
class="approve"

onclick="
approveTask(
'${d.id}'
)
">

APPROVE

</button>

<button
class="reject"

onclick="
rejectTask(
'${d.id}'
)
">

REJECT

</button>

</div>

</div>

`;

});

reports.innerHTML=
html;

}

window.filterReports=()=>{

let s=

search.value
.toLowerCase();

let result=

all.filter(x=>

String(
x.campaign
)

.toLowerCase()

.includes(s)

);

render(result);

}

window.approveTask=
async(id)=>{

await updateDoc(

doc(
db,
"submissions",
id
),

{

status:
"approved"

}

);

alert(
"Approved"
);

load();

}

window.rejectTask=
async(id)=>{

await updateDoc(

doc(
db,
"submissions",
id
),

{

status:
"rejected"

}

);

alert(
"Rejected"
);

load();

}

load();

</script>

</body>
</html>
