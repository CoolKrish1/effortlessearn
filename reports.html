<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reports</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,submissions,user,api} from './app.js';const {safe}=api;window.renderPage=()=>{if(!requireLogin())return;let rows=submissions.filter(x=>x.userId===user.uid||!x.userId);shell('reports',`<div class="panel"><h2>My Reports</h2><table class="table"><tr><th>Offer</th><th>Reward</th><th>Status</th><th>Time</th></tr>${rows.map(s=>`<tr><td>${safe(s.campaignTitle||s.campaignId||'-')}</td><td>₹${s.userReward||s.reward||0}</td><td><span class="status ${s.status||'pending'}">${s.status||'pending'}</span></td><td>${s.time?new Date(s.time).toLocaleString():'-'}</td></tr>`).join('')||'<tr><td colspan="4">No reports</td></tr>'}</table></div>`)};init();</script></body></html>
