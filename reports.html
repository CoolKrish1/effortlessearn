<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reports</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,submissions} from './app.js';window.renderPage=()=>{if(!requireLogin())return;shell('reports',`<div class="toolbar"><button class="btn">📊 ALL REPORTS</button><button class="btn light">🎯 PAID / APPROVED</button><button class="btn orange">⏳ PENDING CHECK</button></div><div class="panel"><h2>TRACKING HISTORY</h2></div><table class="table"><tr><th>Time</th><th>Offer Name</th><th>Payout</th><th>Status</th><th>UPI</th><th>Proof</th></tr>${submissions.map(s=>`<tr><td>${new Date(s.time||Date.now()).toLocaleString()}</td><td>${s.campaignTitle||s.campaign}</td><td>-</td><td><span class="status ${s.status||'pending'}">${s.status||'pending'}</span></td><td>${s.upi||'-'}</td><td>${s.proof?`<a href="${s.proof}" target="_blank">View</a>`:'-'}</td></tr>`).join('')||`<tr><td colspan="6" style="text-align:center;padding:60px">No Records Found.</td></tr>`}</table>`)};init();</script></body></html>
