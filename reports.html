<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reports</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,submissions,clickLogs,money,safe} from './app.js';
window.renderPage=()=>{if(!requireLogin())return;const approved=submissions.filter(x=>x.status==='approved'), pending=submissions.filter(x=>(x.status||'pending')==='pending');shell('reports',`<div class="stats"><div class="stat"><span class="muted">Clicks</span><h2>${clickLogs.length}</h2></div><div class="stat"><span class="muted">Pending</span><h2>${pending.length}</h2></div><div class="stat"><span class="muted">Approved</span><h2>${approved.length}</h2></div><div class="stat"><span class="muted">Revenue</span><h2>${money(approved.reduce((a,b)=>a+Number(b.affiliateCommission||b.reward||0),0))}</h2></div></div><div class="panel"><h2>Lead Reports</h2><div class="tableWrap"><table class="table"><tr><th>Click/Lead ID</th><th>Offer</th><th>User Reward</th><th>Affiliate Profit</th><th>Status</th><th>Date</th></tr>${submissions.map(s=>`<tr><td>${safe(s.clickId||s.id)}</td><td>${safe(s.campaignTitle||s.campaignId||'-')}</td><td>${money(s.userReward||s.reward||0)}</td><td>${money(s.affiliateCommission||0)}</td><td><span class="status ${s.status||'pending'}">${safe(s.status||'pending')}</span></td><td>${new Date(s.time||s.createdAt||Date.now()).toLocaleString()}</td></tr>`).join('')||'<tr><td colspan="6">No reports</td></tr>'}</table></div></div><div class="panel"><h2>Click Logs</h2><div class="tableWrap"><table class="table"><tr><th>Click ID</th><th>Offer</th><th>Source</th><th>Referrer</th><th>Date</th></tr>${clickLogs.map(c=>`<tr><td>${safe(c.id)}</td><td>${safe(c.campaignTitle||c.campaignId||'-')}</td><td>${safe(c.source||'-')}</td><td>${safe((c.referrer||'-').slice(0,80))}</td><td>${new Date(c.time||c.createdAt||Date.now()).toLocaleString()}</td></tr>`).join('')||'<tr><td colspan="5">No clicks</td></tr>'}</table></div></div>`)};init();</script></body></html>
