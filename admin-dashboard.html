<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard Pro FIX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
background:#0b1220;
color:white;
}

/* SIDEBAR */
.sidebar{
width:160px;
height:100vh;
background:#111827;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#38bdf8;
margin-bottom:20px;
}

.sidebar button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:#38bdf8;
color:black;
}

/* MAIN */
.main{
margin-left:200px;
padding:20px;
width:0%;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
}

/* SECTIONS */
.section{display:none;}
.active{display:block;}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}
th{color:#38bdf8;}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>⚡ Admin Panel</h2>

<button onclick="show('home')">Home</button>
<button onclick="show('users')">Users</button>
<button onclick="show('withdraw')">Withdraw</button>
<button onclick="show('campaigns')">Campaigns</button>
<button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="home" class="section active">

<div class="cards">
<div class="card">Users: <p id="usersCount">0</p></div>
<div class="card">Withdraw: <p id="withdrawCount">0</p></div>
<div class="card">Pending: <p id="pendingCount">0</p></div>
<div class="card">Payout: <p id="payoutCount">0</p></div>
</div>

<canvas id="chart"></canvas>

</div>

<!-- USERS -->
<div id="users" class="section">
<h2>Users</h2>
<div id="userList"></div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="section">
<h2>Withdraw</h2>
<div id="withdrawList"></div>
</div>

<!-- CAMPAIGNS -->
<div id="campaigns" class="section">
<h2>Campaigns</h2>
<div id="campaignList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

/* ✅ FIXED CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
authDomain: "effortless-earn-7f39e.firebaseapp.com",
projectId: "effortless-earn-7f39e",
storageBucket: "effortless-earn-7f39e.appspot.com",
messagingSenderId: "554178513766",
appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* NAV */
window.show = function(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
};

/* INIT */
window.onload = function(){
show("home");
loadAll();
};

/* MASTER LOAD */
async function loadAll(){

const usersSnap = await getDocs(collection(db,"users"));
const withdrawSnap = await getDocs(collection(db,"withdrawals"));
const campaignSnap = await getDocs(collection(db,"campaigns"));

let pending = 0;
let payout = 0;

/* USERS */
document.getElementById("usersCount").innerText = usersSnap.size;

let uhtml="";
usersSnap.forEach(d=>{
uhtml+=`<div class="card">${d.id} | ₹${d.data().balance || 0}</div>`;
});
document.getElementById("userList").innerHTML=uhtml;

/* WITHDRAW */
document.getElementById("withdrawCount").innerText = withdrawSnap.size;

let whtml="";
withdrawSnap.forEach(d=>{
let x=d.data();
if(x.status==="pending") pending++;
if(x.status==="approved") payout+=Number(x.amount||0);

whtml+=`<div class="card">${x.userId} | ₹${x.amount} | ${x.status}</div>`;
});
document.getElementById("withdrawList").innerHTML=whtml;

/* CAMPAIGNS */
document.getElementById("campaignList").innerHTML =
Array.from(campaignSnap.docs).map(d=>
`<div class="card">${d.data().title}</div>`
).join("");

/* STATS */
document.getElementById("pendingCount").innerText = pending;
document.getElementById("payoutCount").innerText = payout;

/* CHART */
new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Users","Withdraw","Pending","Payout"],
datasets:[{
data:[usersSnap.size,withdrawSnap.size,pending,payout],
backgroundColor:["#38bdf8","#60a5fa","#facc15","#22c55e"]
}]
}
});

}

/* LOGOUT */
window.logout = function(){
window.location.href="login.html";
};

</script>

</body>
</html>
