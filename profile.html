<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Profile</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,profile,user,toast} from './app.js';import {db} from './firebase.js';import {doc,updateDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';window.renderPage=()=>{if(!requireLogin())return;shell('profile',`<div class="grid2"><div class="panel"><h2>Details</h2><input id="pname" class="field" value="${profile?.name||''}" placeholder="Name"><p>Email <b style="float:right">${profile?.email||user.email}</b></p><hr><p>ID <b style="float:right;color:#2563eb">${user.uid.slice(0,8).toUpperCase()}</b></p><hr><p>Role <b style="float:right">${profile?.role||'user'}</b></p><button type="button" onclick="saveProfile()" class="btn blue full">Save Profile</button></div><div class="panel"><h2>Security</h2><p>Password update Firebase console/auth flow se manage karo.</p></div></div>`)};window.saveProfile=async()=>{await updateDoc(doc(db,'users',user.uid),{name:pname.value});toast('Profile saved')};init();</script></body></html>
