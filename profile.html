<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Profile</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,profile,user} from './app.js';window.renderPage=()=>{if(!requireLogin())return;shell('profile',`<div class="grid2"><div class="panel"><h2>Details</h2><p>Name <b style="float:right">${profile?.name||''}</b></p><hr><p>Email <b style="float:right">${profile?.email||user.email}</b></p><hr><p>ID <b style="float:right;color:#2563eb">${user.uid.slice(0,8).toUpperCase()}</b></p><hr><p>Role <b style="float:right">${profile?.role||'user'}</b></p></div><div class="panel"><h2>Security</h2><input class="field" placeholder="Current Password"><input class="field" placeholder="New Password"><button class="btn full">UPDATE</button></div></div>`)};init();</script></body></html>
