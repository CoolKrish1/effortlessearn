<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profile</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6fb}
.top{background:#111827;color:white;padding:20px}
.card{background:white;margin:20px;padding:20px;border-radius:20px;box-shadow:0 5px 20px #0001}
p{font-size:18px}
button{width:100%;padding:14px;background:#dc2626;color:white;border:0;border-radius:10px}
</style>
</head>

<body>

<div class="top">
<h2>My Profile</h2>
</div>

<div class="card">
<p>Name: <b id="name">Loading...</b></p>
<p>Email: <b id="email">Loading...</b></p>
<p>Balance: ₹<b id="balance">0</b></p>
<p>Role: <b id="role">user</b></p>

<button onclick="logout()">Logout</button>
</div>

<script type="module">
import { auth, db } from "./firebase.js";

import { onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location.href="login.html";
    return;
  }

  const snap = await getDoc(doc(db,"users",user.uid));
  const data = snap.data();

  name.innerText = data.name || "";
  email.innerText = data.email || user.email;
  balance.innerText = data.balance || 0;
  role.innerText = data.role || "user";
});

window.logout = async()=>{
  await signOut(auth);
  location.href="login.html";
}
</script>

</body>
</html>
