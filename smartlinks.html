<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Smart Links</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><div id="modal" class="modal"><div class="modalbox"><button type="button" class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div><script type="module">
import {init,requireLogin,shell,campaigns,smartLinks,loadData,user,getGoals,money,totalMax,toast,modal} from './app.js';
import {db} from './firebase.js';
import {collection,addDoc,doc,deleteDoc,updateDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
let selected=new URLSearchParams(location.search).get('campaign')||'';
function base(){return location.origin+location.pathname.replace(/[^/]*$/,'')}
function linkOf(l){return base()+'campaign.html?id='+(l.campaignId||'')+'&slug='+(l.slug||l.id)+'&pub='+(l.publisherId||user.uid)}
function renderCard(l){const link=linkOf(l);return `<div class="smart-card" id="smart_${l.id}"><div class="smart-card-head"><div><h2>${l.campaignTitle||l.campaignId||'Smart Campaign'}</h2><p class="muted">${l.slug||l.id}</p></div><div class="actions"><button type="button" class="iconbtn" onclick="editSmart('${l.id}')">✎</button><button type="button" class="iconbtn danger" onclick="delSmart('${l.id}')">🗑</button></div></div><div class="smart-links"><div class="smart-link blueSoft"><b>1. Worker Link (P1)</b><div class="toolbar"><input class="field" value="${link}" readonly><button type="button" class="btn blue" onclick="navigator.clipboard.writeText('${link}');toast('Link copied')">Copy</button></div></div><div class="smart-link yellowSoft"><b>2. Tracking Status</b><div class="toolbar"><input class="field" value="${link}" readonly><button type="button" class="btn yellow" onclick="navigator.clipboard.writeText('${link}');toast('Link copied')">Copy</button></div></div></div></div>`}
function renderRows(list){return list.map(renderCard).join('')||'<div class="empty">No smart link found</div>'}
window.renderPage=()=>{if(!requireLogin())return;const pre=campaigns.find(x=>x.id===selected)||null;const rows=pre?smartLinks.filter(l=>l.campaignId===pre.id):smartLinks;shell('smart',`<div class="panel page-title"><div><h2>My Smart Campaigns</h2><p class="muted">Create one campaign link from the selected offer only.</p></div>${pre?`<button type="button" class="btn" onclick="openBuilder('${pre.id}')">＋ Create New</button>`:`<a class="btn blue" href="offers.html">Choose Offer</a>`}</div>${pre?`<div class="offer selected-wide"><div class="offerhead"><img src="${pre.image||''}"><div><h3>${pre.title||'Campaign'}</h3><p class="muted">Max payout ₹${money(totalMax(pre))}</p></div><span class="tag green">ACTIVE</span></div><button type="button" class="btn full" onclick="openBuilder('${pre.id}')">Create / Edit Split →</button></div>`:''}<div class="smart-list">${renderRows(rows)}</div>`)};
window.openBuilder=(id)=>{const c=campaigns.find(x=>x.id===id); if(!c)return; const goals=getGoals(c); modal(`<h2>New Campaign</h2><label class="mini">Selected Offer</label><input class="field" value="${c.title||'Campaign'}" readonly><label class="mini">Campaign Title</label><input id="title" class="field" value="${c.title||''}"><label class="mini">Custom Slug</label><input id="slug" class="field" placeholder="${(c.title||'offer').toLowerCase().replace(/[^a-z0-9]+/g,'-')}"><div class="goal-panel"><div class="toolbar"><b>Payout Calculator</b><label class="ref-toggle"><input type="checkbox" id="p2"> Enable P2 Referral</label></div>${goals.map((g,i)=>`<div class="goalbox"><h3>${g.name} <span class="tag">Max Pay ₹${money(g.maxPayout)}</span></h3><label class="mini">Worker (P1)</label><input class="field split" data-max="${g.maxPayout}" data-name="${g.name}" value="${g.userReward||0}" type="number" min="0" max="${g.maxPayout}" oninput="calcProfit(this)"><div class="profitline">Your Profit: ₹<span>${Math.max(0,g.maxPayout-g.userReward)}</span></div></div>`).join('')}</div><label class="mini">Worker Steps</label><textarea id="steps" class="field" rows="4">${c.instructions||c.steps||''}</textarea><button type="button" class="btn full" onclick="saveSmart('${c.id}')">Create Campaign</button>`)};
window.calcProfit=(el)=>{let max=Number(el.dataset.max||0), val=Math.min(max,Number(el.value||0)); if(Number(el.value)>max){el.value=max;val=max} el.closest('.goalbox').querySelector('.profitline span').textContent=Math.max(0,max-val)};
window.saveSmart=async(id)=>{const c=campaigns.find(x=>x.id===id)||{}; const gs=[...document.querySelectorAll('.split')].map((el,i)=>({id:'g'+i,name:el.dataset.name,maxPayout:Number(el.dataset.max||0),userReward:Number(el.value||0),affiliateProfit:Math.max(0,Number(el.dataset.max||0)-Number(el.value||0))})); await addDoc(collection(db,'smart_links'),{campaignId:id,campaignTitle:title.value||c.title||'',publisherId:user.uid,slug:slug.value||('link-'+Date.now()),goals:gs,enableP2:p2.checked,steps:steps.value,createdAt:Date.now()}); closeModal(); await loadData(); window.renderPage(); toast('Smart link created')};
window.editSmart=(id)=>{const l=smartLinks.find(x=>x.id===id); if(!l)return; const c=campaigns.find(x=>x.id===l.campaignId)||{}; modal(`<h2>Edit Smart Link</h2><label class="mini">Slug</label><input id="editSlug" class="field" value="${l.slug||''}">${(l.goals||getGoals(c)).map((g,i)=>`<div class="goalbox"><h3>${g.name} <span class="tag">Max ₹${money(g.maxPayout)}</span></h3><input class="field editSplit" data-max="${g.maxPayout}" data-name="${g.name}" value="${g.userReward||0}" type="number" oninput="calcProfit(this)"><div class="profitline">Your Profit: ₹<span>${Math.max(0,Number(g.maxPayout||0)-Number(g.userReward||0))}</span></div></div>`).join('')}<button type="button" class="btn full" onclick="updateSmart('${id}')">Save Changes</button>`)};
window.updateSmart=async(id)=>{const gs=[...document.querySelectorAll('.editSplit')].map((el,i)=>({id:'g'+i,name:el.dataset.name,maxPayout:Number(el.dataset.max||0),userReward:Number(el.value||0),affiliateProfit:Math.max(0,Number(el.dataset.max||0)-Number(el.value||0))})); await updateDoc(doc(db,'smart_links',id),{slug:editSlug.value,goals:gs,updatedAt:Date.now()}); closeModal(); await loadData(); window.renderPage(); toast('Updated')};
window.delSmart=async(id)=>{if(!confirm('Delete smart link?'))return; await deleteDoc(doc(db,'smart_links',id)); document.getElementById('smart_'+id)?.remove(); toast('Deleted')};
init();</script></body></html>
