<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Smart Links</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,campaigns,user,baseUrl} from './app.js';window.renderPage=()=>{if(!requireLogin())return;shell('smart',`<div class="panel"><h2>My Smart Campaigns <a href="offers.html"><button type="button" class="btn" style="float:right">Create New</button></a></h2><p class="muted">Copy worker link and share it.</p></div>${campaigns.filter(x=>x.status!=='paused').map(d=>{let link=baseUrl()+`campaign.html?id=${d.id}&pub=${user.uid}`;return `<div class="panel"><h2>${d.title}</h2><span class="tag">${d.status||'active'}</span><div class="grid2"><div class="linkbox"><b>Worker Link</b><input class="field" value="${link}" readonly><button type="button" class="btn blue" onclick="copyText('${link}')">Copy</button></div><div class="linkbox yellow"><b>Report Page</b><input class="field" value="${baseUrl()}reports.html" readonly><button type="button" class="btn orange" onclick="copyText('${baseUrl()}reports.html')">Copy</button></div></div></div>`}).join('')||'<div class="empty">No active smart links.</div>'}`)};init();</script></body></html>
