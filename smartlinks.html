<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Smart Links</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><div id="modal" class="modal"><div class="modalbox"><button type="button" class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div><script type="module">
import {init,requireLogin,shell,campaigns,smartLinks,user,money,totalMax,toast,modal,getGoals,loadData} from './app.js';
const selected=new URLSearchParams(location.search).get('campaign')||'';
function smartBase(){return location.origin+location.pathname.replace(/[^/]*$/,'')}
function linkOf(l){return smartBase()+'campaign.html?id='+(l.campaignId||'')+'&slug='+(l.slug||l.id)+'&pub='+(l.publisherId||user?.uid||'')}
function card(l){const link=linkOf(l);return `<div class="smart-card" id="smart_${l.id}"><div class="smart-card-head"><div><h2>${l.campaignTitle||l.campaignId||'Smart Campaign'}</h2><p class="muted">${l.slug||l.id}</p></div><div class="actions"><button type="button" class="iconbtn" onclick="openSmartBuilder('${l.campaignId}','${l.id}')">✎</button><button type="button" class="iconbtn danger" onclick="deleteSmartLive('${l.id}')">🗑</button></div></div><div class="smart-links"><div class="smart-link blueSoft"><b>Worker Link (P1)</b><div class="toolbar"><input class="field" value="${link}" readonly><button type="button" class="btn blue" onclick="navigator.clipboard.writeText('${link}');toast('Copied')">Copy</button></div></div><div class="smart-link yellowSoft"><b>Tracking Status</b><div class="toolbar"><input class="field" value="${link}" readonly><button type="button" class="btn yellow" onclick="navigator.clipboard.writeText('${link}');toast('Copied')">Copy</button></div></div></div></div>`}
function rows(list){return list.map(card).join('')||'<div class="empty">No smart campaign yet. Open an offer and create one.</div>'}
window.renderPage=()=>{if(!requireLogin())return;const pre=campaigns.find(x=>x.id===selected)||null;const list=pre?smartLinks.filter(l=>l.campaignId===pre.id):smartLinks;shell('smart',`<div class="panel page-title"><div><h2>My Smart Campaigns</h2><p class="muted">Manage your offer links and payout split.</p></div>${pre?`<button type="button" class="btn" onclick="openSmartBuilder('${pre.id}')">＋ Create New</button>`:`<a class="btn" href="offers.html">＋ Choose Offer</a>`}</div>${pre?`<div class="offer selected-wide"><div class="offerhead"><img src="${pre.image||''}"><div><h3>${pre.title||'Campaign'}</h3><p class="muted">Max payout ₹${money(totalMax(pre))}</p></div><span class="tag green">ACTIVE</span></div><button type="button" class="btn full" onclick="openSmartBuilder('${pre.id}')">Create / Edit Split →</button></div>`:''}<div class="smart-list">${rows(list)}</div>`)};
init();
</script></body></html>
