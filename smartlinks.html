<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Smart Links</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,campaigns} from './app.js';window.renderPage=()=>{if(!requireLogin())return;shell('smart',`<div class="panel"><h2>My Smart Campaigns <a href="offers.html"><button class="btn" style="float:right">CREATE NEW</button></a></h2><p class="muted">Create P1/P2 links & manage workers</p></div>${campaigns.map(d=>`<div class="panel"><h2>${d.title}</h2><span class="tag">${d.status||'active'}</span><div class="grid2"><div class="linkbox"><b>1. WORKER LINK (P1)</b><input class="field" value="${location.origin}${location.pathname.replace(/[^/]*$/,'')}campaign.html?id=${d.id}"><button class="btn blue" onclick="navigator.clipboard.writeText('${location.origin}${location.pathname.replace(/[^/]*$/,'')}campaign.html?id=${d.id}');alert('✅ Link Copied!')">COPY</button></div><div class="linkbox yellow"><b>3. TRACKING STATUS</b><input class="field" value="${location.origin}${location.pathname.replace(/[^/]*$/,'')}reports.html"><button class="btn orange">COPY</button></div></div></div>`).join('')}`)};init();</script></body></html>
