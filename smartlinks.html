<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Smart Links</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,campaigns,smartLinks,profile,isAdmin,loadData,user} from './app.js';import {db} from './firebase.js';import {collection,addDoc,doc,deleteDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';window.renderPage=()=>{if(!requireLogin())return;const base=location.origin+location.pathname.replace(/[^/]*$/,'');shell('smart',`<div class="panel"><h2>Smart Links</h2><p class="muted">Worker links, campaign tracking and manage links.</p></div><div class="grid2"><div class="panel"><h2>Create Smart Link</h2><select id="camp" class="field">${campaigns.map(c=>`<option value="${c.id}">${c.title||c.id}</option>`).join('')}</select><input id="slug" class="field" placeholder="Custom slug optional"><button type="button" class="btn blue full" onclick="createSmart()">Create Link</button></div><div class="panel"><h2>Your Campaign Links</h2>${campaigns.map(d=>{let link=base+'campaign.html?id='+d.id+'&pub='+(user?.uid||'');return `<div class="linkbox"><b>${d.title}</b><input class="field" value="${link}" readonly><button type="button" class="btn blue" onclick="navigator.clipboard.writeText('${link}');alert('Copied')">Copy</button></div>`}).join('')||'No campaigns'}</div></div><div class="panel"><h2>Saved Smart Links</h2><table class="table"><tr><th>Slug</th><th>Campaign</th><th>Link</th><th>Action</th></tr>${smartLinks.map(l=>{let link=base+'campaign.html?id='+(l.campaignId||l.campaign||'')+'&slug='+(l.slug||l.id);return `<tr><td>${l.slug||l.id}</td><td>${l.campaignTitle||l.campaignId||'-'}</td><td><input class="field" value="${link}" readonly></td><td><button type="button" class="btn blue" onclick="navigator.clipboard.writeText('${link}');alert('Copied')">Copy</button> ${isAdmin()?`<button type="button" class="btn red" onclick="delSmart('${l.id}')">Delete</button>`:''}</td></tr>`}).join('')||'<tr><td colspan="4">No saved smart link</td></tr>'}</table></div>`)};async function refresh(){await loadData();window.renderPage()}window.createSmart=async()=>{const c=campaigns.find(x=>x.id===camp.value)||{};await addDoc(collection(db,'smart_links'),{campaignId:camp.value,campaignTitle:c.title||'',publisherId:user.uid,slug:slug.value||('link-'+Date.now()),createdAt:Date.now()});alert('Created');refresh()};window.delSmart=async(id)=>{if(confirm('Delete smart link?')){await deleteDoc(doc(db,'smart_links',id));refresh()}};init();</script></body></html>
