<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Smart Links</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,smartLinks,api} from './app.js';const {baseUrl,safe}=api;window.renderPage=()=>{if(!requireLogin())return;shell('smart',`<div class="panel"><h2>Smart Links</h2><table class="table"><tr><th>Name</th><th>Link</th><th>Status</th><th>Copy</th></tr>${smartLinks.map(s=>{let l=baseUrl()+'campaign.html?slug='+(s.slug||s.id);return `<tr><td>${safe(s.name||s.slug||s.id)}</td><td><input class="field" value="${l}" readonly></td><td><span class="status active">${safe(s.status||'active')}</span></td><td><button type="button" class="btn blue" onclick="navigator.clipboard.writeText('${l}');alert('Copied')">Copy</button></td></tr>`}).join('')||'<tr><td colspan="4">No smart links</td></tr>'}</table></div>`)};init();</script></body></html>
