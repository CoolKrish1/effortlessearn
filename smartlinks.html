<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Smart Links</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,campaigns,smartLinks,user,createSmartLink,refresh,trackingLink,money,campaignPayout,defaultReward,profit,canManageLink,safe,modal} from './app.js';import {db} from './firebase.js';import {doc,updateDoc,deleteDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
function options(){return campaigns.map(c=>`<option value="${c.id}">${safe(c.title||c.id)} - Max ${money(campaignPayout(c))}</option>`).join('')}
window.renderPage=()=>{if(!requireLogin())return;shell('smart',`<div class="grid2"><div class="panel"><h2>Create Campaign Smart Link</h2><select id="camp" class="field" onchange="fillReward()">${options()}</select><input id="workerReward" type="number" class="field" placeholder="Worker/User Reward" oninput="calcProfit()"><input id="affProfit" class="field" placeholder="Affiliate Profit" readonly><input id="slug" class="field" placeholder="Custom slug optional"><button type="button" class="btn blue full" onclick="createSmart()">Create Tracking Link</button><p class="muted">Affiliate sirf reward/profit split edit karega. Main payout aur destination admin manage karega.</p></div><div class="panel"><h2>Commission Split Rule</h2><div class="notice"><b>Formula</b><p>Affiliate Profit = Network Max Payout - Worker Reward</p></div><p class="muted">Worker reward max payout se zyada nahi ho sakta.</p></div></div><div class="panel"><h2>Saved Smart Links</h2><div class="tableWrap"><table class="table"><tr><th>Offer</th><th>Worker Reward</th><th>Your Profit</th><th>Tracking URL</th><th>Action</th></tr>${smartLinks.map(l=>{let link=trackingLink(l.campaignId,l.publisherId||user.uid,l.id);return `<tr><td>${safe(l.campaignTitle||l.campaignId||'-')}<br><small>${safe(l.slug||l.id)}</small></td><td>${money(l.userReward||0)}</td><td>${money(l.affiliateCommission||0)}</td><td><div class="copyrow"><input class="field" value="${link}" readonly><button type="button" class="btn blue" onclick="navigator.clipboard.writeText('${link}');alert('Copied')">Copy</button></div></td><td>${canManageLink(l)?`<button type="button" class="btn orange" onclick="editSmart('${l.id}')">Edit</button> <button type="button" class="btn red" onclick="delSmart('${l.id}')">Delete</button>`:''}</td></tr>`}).join('')||'<tr><td colspan="5">No smart link found</td></tr>'}</table></div></div>`);fillReward()};
window.fillReward=()=>{const c=campaigns.find(x=>x.id===camp.value)||{};workerReward.value=defaultReward(c);calcProfit()};window.calcProfit=()=>{const c=campaigns.find(x=>x.id===camp.value)||{};affProfit.value=money(profit(c,Number(workerReward.value||0)))};
window.createSmart=async()=>{const c=campaigns.find(x=>x.id===camp.value)||{};const reward=Number(workerReward.value||0);if(reward>campaignPayout(c))return alert('Worker reward max payout se zyada nahi ho sakta');await createSmartLink(camp.value,reward,slug.value);alert('Smart link created');await refresh()};
window.editSmart=(id)=>{const l=smartLinks.find(x=>x.id===id);const c=campaigns.find(x=>x.id===l.campaignId)||{};modal(`<h2>Edit Commission Split</h2><p>${safe(l.campaignTitle||'Campaign')}</p><label>Worker/User Reward</label><input id="eReward" type="number" class="field" value="${l.userReward||0}" oninput="editProfit('${l.campaignId}')"><label>Affiliate Profit</label><input id="eProfit" class="field" value="${money(l.affiliateCommission||0)}" readonly><button type="button" class="btn green full" onclick="saveSmart('${id}','${l.campaignId}')">Save</button>`)};
window.editProfit=(cid)=>{const c=campaigns.find(x=>x.id===cid)||{};eProfit.value=money(profit(c,Number(eReward.value||0)))};
window.saveSmart=async(id,cid)=>{const c=campaigns.find(x=>x.id===cid)||{};const reward=Number(eReward.value||0);if(reward>campaignPayout(c))return alert('Max payout se zyada nahi');await updateDoc(doc(db,'smart_links',id),{userReward:reward,affiliateCommission:campaignPayout(c)-reward,updatedAt:Date.now()});closeModal();await refresh()};
window.delSmart=async(id)=>{if(confirm('Delete smart link?')){await deleteDoc(doc(db,'smart_links',id));await refresh()}};init();</script></body></html>
