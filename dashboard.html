<!DOCTYPE html>
<html>
<head>
<title>Dashboard Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
display:flex;
background:#f5f7fb;
color:#111;
}

.sidebar{
width:260px;
height:100vh;
background:#07142d;
padding:20px;
position:fixed;
overflow:auto;
}

.logo h1{
color:white;
}

.logo p{
color:#8aa4d4;
margin-bottom:25px;
}

.wallet-card{
background:#0d2247;
padding:20px;
border-radius:20px;
color:white;
margin-bottom:25px;
}

.wallet-card h2{
color:#34d399;
margin:10px 0;
}

.pubid{
border:1px solid #2f4c82;
padding:8px;
border-radius:10px;
display:inline-block;
}

.sidebar button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:12px;
background:transparent;
color:white;
text-align:left;
cursor:pointer;
}

.sidebar button:hover{
background:#295cff;
}

.main{
margin-left:260px;
width:100%;
padding:30px;
}

.topbar{
display:flex;
gap:20px;
margin-bottom:30px;
}

.topbar input{
flex:1;
padding:18px;
border:none;
border-radius:20px;
background:white;
}

.topbar select{
padding:18px;
border:none;
border-radius:20px;
background:white;
}

.section.active{
display:block;
}

.section{
display:none;
}

#campaignList{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(320px,1fr));
gap:25px;
}

.offer-card{
background:white;
padding:20px;
border-radius:24px;
box-shadow:
0 4px 20px rgba(0,0,0,.05);
}

.offer-head{
display:flex;
gap:15px;
align-items:center;
}

.offer-logo{
width:70px;
height:70px;
border-radius:16px;
object-fit:cover;
}

.card{
background:white;
padding:15px;
border-radius:16px;
margin:10px 0;
box-shadow:0 4px 15px rgba(0,0,0,.05);
color:black;
}

.badge{
background:#dcfce7;
color:#16a34a;
padding:5px 12px;
border-radius:20px;
font-size:12px;
}

.reward-box{
margin-top:20px;
padding:18px;
background:#effcf5;
border-radius:16px;
font-size:30px;
font-weight:bold;
color:#16a34a;
}

.start-btn{
width:100%;
margin-top:20px;
padding:16px;
border:none;
border-radius:16px;
background:black;
color:white;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">
<h1>CampaignHub</h1>
<p>Publisher Panel</p>
</div>

<div class="wallet-card">
<p>Wallet Balance</p>
<h2>₹<span id="balance">0</span></h2>
<div class="pubid" id="pubid">
Loading...
</div>

<button onclick="show('home')">📊 Dashboard</button>
<button onclick="show('campaigns')">🎯 All Offers</button>
<button onclick="show('history')">📄 Reports</button>
<button onclick="show('withdraw')">💰 Wallet</button>
<button onclick="show('reports')">📈 Tracking</button>
<button onclick="logout()">🚪 Logout</button>

</div>
  
<!-- MAIN -->
<div class="main">
<div class="topbar">

<input
id="searchOffer"
placeholder="Search High Paying Offers..."
onkeyup="searchOffers()"
>

<select>
<option>ALL OFFERS</option>
<option>Banking</option>
<option>Finance</option>
<option>Survey</option>
</select>

</div>

<!-- HOME -->
<div id="home" class="section active">
<h2>Welcome</h2>
<h3>Current Balance: ₹<span id="balanceHome">0</span></h3>
</div>

<!-- CAMPAIGNS -->
<div id="campaigns" class="section">
<h2>Campaigns</h2>
<div id="campaignList"></div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="section">

<h2>Withdraw Money</h2>

<div class="card">
<p>Balance: ₹<span id="balance2">0</span></p>

<input id="upi" placeholder="UPI ID"><br>
<input id="amount" type="number" placeholder="Amount"><br>
<button onclick="withdraw()">Request Withdraw</button>
</div>

<div id="withdrawList"></div>

</div>

<!-- HISTORY -->
<div id="history" class="section">
<h2>History</h2>
<div id="historyList"></div>
</div>

<!-- REPORTS -->
<div id="reports" class="section">
<h2>Reports</h2>
<div id="reportList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
collection,
getDocs,
addDoc,
query,
where
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
authDomain: "effortless-earn-7f39e.firebaseapp.com",
projectId: "effortless-earn-7f39e",
storageBucket: "effortless-earn-7f39e.appspot.com",
messagingSenderId: "554178513766",
appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

/* AUTH */
onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

currentUser = user;

loadWallet();
loadCampaigns();
loadHistory();
loadReports();
loadWithdrawHistory();

});

/* WALLET */
async function loadWallet(){
async function loadWallet(){
const snap = await getDoc(doc(db,"users",currentUser.uid));

if(snap.exists()){

const bal = snap.data().balance || 0;

document.getElementById("balance").innerText = bal;
document.getElementById("balance2").innerText = bal;
document.getElementById("balanceHome").innerText = bal;

}
}

/* CAMPAIGNS */
async function loadCampaigns(){
const snap = await getDocs(collection(db,"campaigns"));

let html="";

snap.forEach(d=>{
const c = d.data();

html += `
<div class="offer-card">

<div class="offer-head">

<img
src="${c.image || 'https://via.placeholder.com/80'}"
class="offer-logo"
>

<div>
<h3>${c.title}</h3>
<p>${c.category || 'CPA Offer'}</p>
<span class="badge">ACTIVE</span>
</div>

</div>

<div class="reward-box">
₹${c.reward}
</div>

<button
class="start-btn"
onclick="apply('${d.id}','${c.title}',${c.reward})"
>
START EARNING →
</button>

</div>
`;
});

document.getElementById("campaignList").innerHTML = html;
}

/* APPLY */
window.apply = async function(id,title,reward){

await addDoc(collection(db,"applications"),{
userId: currentUser.uid,
campaignId: id,
reward,
status:"pending",
time: Date.now()
});

/* REPORT */
await addDoc(collection(db,"reports"),{
userId: currentUser.uid,
offerName: title,
payout: reward,
status:"pending",
ip: "N/A",
worker: "P1",
trackingId: Math.random().toString(36).slice(2,10),
time: Date.now()
});

alert("Applied");
loadHistory();
loadReports();
};

/* WITHDRAW */
window.withdraw = async function(){

const upi = document.getElementById("upi").value;
const amount = Number(document.getElementById("amount").value);

const snap = await getDoc(doc(db,"users",currentUser.uid));
const balance = snap.data().balance || 0;

if(amount > balance){
alert("Insufficient Balance");
return;
}

await addDoc(collection(db,"withdrawals"),{
userId: currentUser.uid,
upi,
amount,
status:"pending",
time: Date.now()
});

/* REPORT */
const q = query(
collection(db,"reports"),
where("userId","==",currentUser.uid)
);

const snap = await getDocs(q);
userId: currentUser.uid,
offerName:"Withdraw Request",
payout:amount,
status:"pending",
ip:"N/A",
worker:"P1",
trackingId:Math.random().toString(36).slice(2,10),
time:Date.now()
});

alert("Withdraw Requested");

loadWithdrawHistory();
loadReports();
};

/* HISTORY */
async function loadHistory(){

const q = query(collection(db,"applications"),where("userId","==",currentUser.uid));

const snap = await getDocs(q);

let html="";

snap.forEach(d=>{
const h=d.data();

html += `
<div class="card">
<p>Campaign: ${h.campaignId}</p>
<p>Reward: ₹${h.reward}</p>
<p>Status: ${h.status}</p>
</div>
`;
});

document.getElementById("historyList").innerHTML = html;
}

/* REPORTS */
async function loadReports(){

const q = query(
collection(db,"reports"),
where("userId","==",currentUser.uid)
);

const snap = await getDocs(q);

let html="";

snap.forEach(d=>{
const r=d.data();

html += `
<div class="card">
<p>${r.offerName}</p>
<p>₹${r.payout}</p>
<p>${r.status}</p>
<p>${r.userId}</p>
<p>${r.worker}</p>
<p>${r.time}</p>
</div>
`;
});

document.getElementById("reportList").innerHTML = html;
}

/* WITHDRAW HISTORY */
async function loadWithdrawHistory(){

const q = query(collection(db,"withdrawals"),where("userId","==",currentUser.uid));

const snap = await getDocs(q);

let html="";

snap.forEach(d=>{
const w=d.data();

html += `
<div class="card">
<p>₹${w.amount}</p>
<p>${w.upi}</p>
<p>${w.status}</p>
</div>
`;
});

document.getElementById("withdrawList").innerHTML = html;
}

/* NAV */
window.show=function(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
};

/* LOGOUT */
window.logout=function(){
signOut(auth);
window.location.href="login.html";
};

window.searchOffers = function(){

let input =onkeyup="searchOffers()"
document.getElementById("searchOffer")
.value
.toLowerCase();

document
.querySelectorAll(".offer-card")
.forEach(card=>{

card.style.display =
card.innerText.toLowerCase()
.includes(input)
? "block"
: "none";

});

};

</script>

</body>
</html>
