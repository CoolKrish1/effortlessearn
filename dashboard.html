<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,submissions,profile,campaigns,smartLinks,clickLogs,offerCards,money} from './app.js';
window.renderPage=()=>{if(!requireLogin())return;const pending=submissions.filter(x=>(x.status||'pending')==='pending').length, approved=submissions.filter(x=>x.status==='approved').length;shell('dashboard',`<div class="banner" onclick="goTelegram()"><b>✈ JOIN TELEGRAM CHANNEL</b><br><small>Get new offers & payment updates instantly.</small></div><div class="stats"><div class="stat"><span class="muted">Revenue</span><h2>${money(profile?.balance||0)}</h2><small>Total wallet balance</small></div><div class="stat"><span class="muted">Pending Approval</span><h2>${pending}</h2><small>Verification in progress</small></div><div class="stat"><span class="muted">Conversions</span><h2>${approved}</h2><small>Approved leads</small></div><div class="stat"><span class="muted">Clicks</span><h2>${clickLogs.length}</h2><small>Total tracked clicks</small></div></div><div class="grid2"><div class="panel"><h2>How system works</h2><p>Admin max payout set karega. Affiliate worker reward set karega. Remaining amount affiliate profit hoga.</p><div class="notice"><b>Example</b><p>Network payout ₹260, Worker reward ₹90, Affiliate profit ₹170.</p></div></div><div class="panel"><h2>Quick Stats</h2><p>Campaigns: <b>${campaigns.length}</b></p><p>Smart Links: <b>${smartLinks.length}</b></p><p>Reports: <b>${submissions.length}</b></p></div></div><div class="panel"><h2>Top Offers</h2><div class="offers">${offerCards(campaigns.filter(x=>x.status!=='paused').slice(0,6))}</div></div>`)};init();</script></body></html>
