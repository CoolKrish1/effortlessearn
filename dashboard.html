<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><div id="modal" class="modal"><div class="modalbox"><button class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div><script type="module">import {init,requireLogin,shell,submissions,profile,campaigns,offerCards} from './app.js';window.renderPage=()=>{if(!requireLogin())return;let pending=submissions.filter(x=>x.status==='pending').length, approved=submissions.filter(x=>x.status==='approved').length;shell('dashboard',`<div class="banner"><b>✈ JOIN TELEGRAM CHANNEL</b><br><small>Get new offers & payment updates instantly.</small></div><div class="stats"><div class="stat"><span class="muted">Revenue ₹</span><h2>₹${profile?.balance||0}</h2><small>Total balance</small></div><div class="stat"><span class="muted">Pending Approval</span><h2>${pending}</h2><small>Verification in progress</small></div><div class="stat"><span class="muted">Conversions</span><h2>${approved}</h2><small>Approved leads</small></div><div class="stat"><span class="muted">Clicks</span><h2>${submissions.length}</h2><small>Total clicks</small></div></div><div class="panel"><h2>Top Offers</h2><br><div class="offers">${offerCards(campaigns.filter(x=>x.status!=='paused').slice(0,6))}</div></div>`);};init();</script></body></html>
