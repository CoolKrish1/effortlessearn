<!DOCTYPE html>
<html>
<head>
<title>Stable Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
background:#0b1220;
color:white;
}

.sidebar{
width:220px;
height:100vh;
background:#111827;
padding:20px;
position:fixed;
}

.sidebar button{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
cursor:pointer;
}

.main{
margin-left:240px;
padding:20px;
width:100%;
}

.section{display:none;}
.active{display:block;}

.card{
background:#1e293b;
padding:12px;
margin:8px 0;
border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Dashboard</h2>
<button onclick="show('home')">Home</button>
<button onclick="show('users')">Users</button>
<button onclick="show('withdraw')">Withdraw</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<div id="home" class="section active">
<h2>Home</h2>

<div class="card">Users: <span id="usersCount">0</span></div>
<div class="card">Withdraw: <span id="withdrawCount">0</span></div>
<div class="card">Pending: <span id="pendingCount">0</span></div>

<canvas id="chart"></canvas>
</div>

<div id="users" class="section">
<h2>Users</h2>
<div id="userList"></div>
</div>

<div id="withdraw" class="section">
<h2>Withdraw</h2>
<div id="withdrawList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyD...",
authDomain:"effortless-earn-7f39e.firebaseapp.com",
projectId:"effortless-earn-7f39e"
});

const db = getFirestore(app);
const auth = getAuth(app);

let chartInstance = null; // ✅ IMPORTANT FIX

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login.html";
return;
}

loadDashboard();
});

window.show=function(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
};

window.logout=function(){
signOut(auth);
window.location.href="login.html";
};

async function loadDashboard(){

const usersSnap = await getDocs(collection(db,"users"));
const withdrawSnap = await getDocs(collection(db,"withdrawals"));

let pending = 0;

withdrawSnap.forEach(d=>{
if(d.data().status==="pending") pending++;
});

document.getElementById("usersCount").innerText = usersSnap.size;
document.getElementById("withdrawCount").innerText = withdrawSnap.size;
document.getElementById("pendingCount").innerText = pending;

/* SAFE CHART (NO CRASH) */
if(chartInstance){
chartInstance.destroy();
}

chartInstance = new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Users","Withdraw","Pending"],
datasets:[{
data:[usersSnap.size,withdrawSnap.size,pending],
backgroundColor:["#38bdf8","#60a5fa","#facc15"]
}]
}
});

/* USERS LIST */
let uhtml="";
usersSnap.forEach(d=>{
uhtml += `<div class="card">${d.id}</div>`;
});
document.getElementById("userList").innerHTML = uhtml;

/* WITHDRAW LIST */
let whtml="";
withdrawSnap.forEach(d=>{
let x=d.data();
whtml += `<div class="card">${x.userId} - ₹${x.amount} (${x.status})</div>`;
});
document.getElementById("withdrawList").innerHTML = whtml;

}

</script>

</body>
</html>
