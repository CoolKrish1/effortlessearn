<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>

<body>

<h2>User Dashboard</h2>

<button onclick="loadCampaigns()">Load Campaigns</button>

<div id="campaignList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc } 
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
  authDomain: "effortless-earn-7f39e.firebaseapp.com",
  projectId: "effortless-earn-7f39e",
  storageBucket: "effortless-earn-7f39e.appspot.com",
  messagingSenderId: "554178513766",
  appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOAD CAMPAIGNS */
window.loadCampaigns = async function(){

const snap = await getDocs(collection(db,"campaigns"));

let html="";

snap.forEach(docSnap=>{
const c = docSnap.data();

html += `
  <div style="border:1px solid #ccc;padding:10px;margin:10px">
    <h3>${c.title}</h3>
    <p>Reward: ₹${c.reward}</p>

    <button onclick="apply('${docSnap.id}',${c.reward})">
      Apply
    </button>
  </div>
`;
});

document.getElementById("campaignList").innerHTML = html;

};

/* APPLY */
window.apply = async function(id,reward){

const user = auth.currentUser;

await addDoc(collection(db,"applications"),{
  userId:user.uid,
  campaignId:id,
  reward:reward,
  status:"pending"
});

alert("Applied Successfully");

};

</script>

</body>
</html>
