<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><div id="modal" class="modal"><div class="modalbox"><button type="button" class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div><script type="module">
import {init,requireLogin,shell,submissions,profile,campaigns,offerCards,user,api} from './app.js';
const {safe,siteSettings}=api;
window.openTelegram=()=>{const url=siteSettings.telegramUrl||'https://t.me/YOUR_CHANNEL_USERNAME'; window.open(url,'_blank','noopener')};
window.renderPage=()=>{if(!requireLogin())return;let mine=submissions.filter(x=>x.userId===user.uid||x.email===user.email);let pending=mine.filter(x=>(x.status||'pending')==='pending').length, approved=mine.filter(x=>x.status==='approved').length;let active=campaigns.filter(x=>x.status!=='paused');shell('dashboard',`
<div class="hero telegramHero" onclick="openTelegram()"><div><b>✈ JOIN TELEGRAM CHANNEL</b><span>New offers, payment updates aur instant announcements.</span></div><div class="heroAction">Open Telegram →</div></div>
<div class="stats"><div class="stat"><span>Wallet Balance</span><h2>₹${profile?.balance||0}</h2><small>Total available</small></div><div class="stat"><span>Pending Approval</span><h2>${pending}</h2><small>Verification in progress</small></div><div class="stat"><span>Approved Leads</span><h2>${approved}</h2><small>Successful conversions</small></div><div class="stat"><span>Active Offers</span><h2>${active.length}</h2><small>Live campaigns</small></div></div>
<div class="grid2"><div class="panel"><h2>Quick Actions</h2><div class="actions"><a class="btn blue" href="offers.html">All Offers</a><a class="btn green" href="wallet.html">Withdraw</a></div><div class="actions"><a class="btn light" href="smartlinks.html">Smart Links</a><a class="btn light" href="reports.html">Reports</a></div></div><div class="panel"><h2>Account Summary</h2><div class="mini"><span>Email</span><b>${safe(user.email)}</b></div><div class="mini"><span>Role</span><b>${safe(profile?.role||'user')}</b></div><div class="mini"><span>User ID</span><b>${user.uid.slice(0,10).toUpperCase()}</b></div></div></div>
<div class="panel"><h2>Top Offers</h2><p class="muted">Highest earning active campaigns</p><div class="offers">${offerCards(active.slice(0,6))}</div></div>`)};init();
</script></body></html>
