<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><div id="modal" class="modal"><div class="modalbox"><button type="button" class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div><script type="module">import {init,requireLogin,shell,submissions,profile,campaigns,offerCards,user} from './app.js';window.renderPage=()=>{if(!requireLogin())return;let mine=submissions.filter(x=>x.userId===user.uid||x.email===user.email);let pending=mine.filter(x=>(x.status||'pending')==='pending').length, approved=mine.filter(x=>x.status==='approved').length;shell('dashboard',`<div class="hero"><b>✈ Join Telegram Channel</b><span>New offers & payment updates instantly.</span></div><div class="stats"><div class="stat"><span>Revenue</span><h2>₹${profile?.balance||0}</h2></div><div class="stat"><span>Pending</span><h2>${pending}</h2></div><div class="stat"><span>Conversions</span><h2>${approved}</h2></div><div class="stat"><span>Total Leads</span><h2>${mine.length}</h2></div></div><div class="panel"><h2>Top Offers</h2><div class="offers">${offerCards(campaigns.filter(x=>x.status!=='paused').slice(0,6))}</div></div>`)};init();</script></body></html>
