<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
padding:10px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>User Dashboard</h1>

<div class="card">
<h2>Wallet Balance</h2>
<p>₹0</p>
</div>

<div class="card">
<h2>Available Campaigns</h2>
<div id="campaignList">Loading campaigns...</div>
</div>

<button onclick="logout()">Logout</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
  authDomain: "effortless-earn-7f39e.firebaseapp.com",
  projectId: "effortless-earn-7f39e",
  storageBucket: "effortless-earn-7f39e.firebasestorage.app",
  messagingSenderId: "554178513766",
  appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// 🔐 LOGIN CHECK
onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    loadCampaigns();
  } else {
    window.location.href = "signin.html";
  }
});

// 📦 LOAD CAMPAIGNS
async function loadCampaigns() {
  try {
    const querySnapshot = await getDocs(collection(db, "campaigns"));

    let html = "";

    if (querySnapshot.empty) {
      html = "<p>No campaigns found</p>";
    } else {
      querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();

        html += `
          <div style="border:1px solid #ccc;padding:10px;margin:10px 0;">
            <h3>${data.title}</h3>
            <p>Reward: ₹${data.reward}</p>
            <button onclick="participate('${docSnap.id}', ${data.reward})">
              Participate
            </button>
          </div>
        `;
      });
    }

    document.getElementById("campaignList").innerHTML = html;

  } catch (error) {
    alert("ERROR: " + error.message);
  }
}

// 🎯 PARTICIPATE FUNCTION
window.participate = async function(campaignId, reward) {
  if (!currentUser) {
    alert("Please login first");
    return;
  }

  try {
    await setDoc(doc(db, "participations", currentUser.uid + "_" + campaignId), {
      userId: currentUser.uid,
      campaignId: campaignId,
      reward: reward,
      status: "pending",
      createdAt: new Date()
    });

    alert("Campaign joined successfully!");
  } catch (error) {
    alert("Error: " + error.message);
  }
};

// 🚪 LOGOUT
window.logout = function() {
  signOut(auth)
  .then(() => {
    window.location.href = "signin.html";
  })
  .catch((error) => {
    alert(error.message);
  });
};
</script>

</body>
</html>
