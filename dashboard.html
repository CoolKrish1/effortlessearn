<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><div id="modal" class="modal"><div class="modalbox"><button type="button" class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div><script type="module">import {init,requireLogin,shell,submissions,profile,campaigns,offerCards,money} from './app.js';window.renderPage=()=>{if(!requireLogin())return;const pending=submissions.filter(x=>x.status==='pending').length,approved=submissions.filter(x=>x.status==='approved').length;const rev=submissions.filter(x=>x.status==='approved').reduce((a,b)=>a+Number(b.reward||0),0);shell('dashboard',`<div class="banner"><b>✈ Join Telegram Channel</b><br><small>New offers, payment updates and proof alerts instantly.</small></div><div class="stats"><div class="stat"><span class="muted">Revenue</span><h2>${money(profile?.balance||rev)}</h2><small>Total balance</small></div><div class="stat"><span class="muted">Pending</span><h2>${pending}</h2><small>Verification in progress</small></div><div class="stat"><span class="muted">Conversions</span><h2>${approved}</h2><small>Approved leads</small></div><div class="stat"><span class="muted">Clicks</span><h2>${submissions.length}</h2><small>Total activity</small></div></div><div class="panel"><h2>Top Offers</h2><div class="offers">${offerCards(campaigns.slice(0,6))}</div></div>`)};init();</script></body></html>
