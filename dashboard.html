<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>
<body>

<h2>User Dashboard</h2>

<button onclick="logout()">Logout</button>

<h3>Balance: ₹<span id="bal">0</span></h3>

<div id="campaigns"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
  authDomain: "effortless-earn-7f39e.firebaseapp.com",
  projectId: "effortless-earn-7f39e",
  storageBucket: "effortless-earn-7f39e.appspot.com",
  messagingSenderId: "554178513766",
  appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userID = null;

onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

userID = user.uid;

const snap = await getDoc(doc(db,"users",user.uid));
document.getElementById("bal").innerText = snap.data().balance || 0;

loadCampaigns();

});

async function loadCampaigns(){

const snap = await getDocs(collection(db,"campaigns"));

let html = "";

snap.forEach(d=>{
html += `
<div>
<h3>${d.data().title}</h3>
<p>Reward: ₹${d.data().reward}</p>
</div>`;
});

document.getElementById("campaigns").innerHTML = html;

}

window.logout = function(){
signOut(auth);
window.location.href="login.html";
};

</script>

</body>
</html>
