<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CampaignHub Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#f5f7fb;
display:flex;
color:#111827;
}

.sidebar{
width:260px;
height:100vh;
background:#07142d;
position:fixed;
left:0;
top:0;
padding:20px;
overflow:auto;
}

.logo{
margin-bottom:25px;
}

.logo h1{
color:white;
font-size:24px;
}

.logo p{
color:#9fb7dd;
font-size:13px;
}

.wallet-card{
background:#0f2247;
padding:18px;
border-radius:20px;
color:white;
margin-bottom:25px;
}

.wallet-card h2{
margin-top:10px;
color:#34d399;
}

.pubid{
margin-top:10px;
padding:8px 12px;
border:1px solid #33558f;
border-radius:10px;
display:inline-block;
font-size:13px;
}

.sidebar button{
width:100%;
padding:14px;
margin:6px 0;
border:none;
border-radius:12px;
background:transparent;
color:white;
cursor:pointer;
text-align:left;
font-size:15px;
}

.sidebar button:hover{
background:#295cff;
}

.main{
margin-left:260px;
width:100%;
padding:30px;
}

.topbar{
display:flex;
gap:15px;
margin-bottom:25px;
}

.topbar input{
flex:1;
padding:16px;
border:none;
border-radius:16px;
background:white;
}

.topbar select{
padding:16px;
border:none;
border-radius:16px;
background:white;
}

.section{
display:none;
}

.section.active{
display:block;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:25px;
}

.stat-card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 18px rgba(0,0,0,.05);
}

.stat-card h3{
font-size:14px;
color:#6b7280;
}

.stat-card h2{
margin-top:10px;
}

#campaignList{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(320px,1fr));
gap:20px;
}

.offer-card{
background:white;
border-radius:22px;
padding:20px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.offer-head{
display:flex;
gap:15px;
align-items:center;
}

.offer-logo{
width:70px;
height:70px;
object-fit:cover;
border-radius:16px;
}

.badge{
display:inline-block;
margin-top:8px;
background:#dcfce7;
color:#15803d;
padding:5px 12px;
border-radius:30px;
font-size:12px;
}

.reward-box{
margin-top:20px;
padding:16px;
background:#effcf5;
border-radius:16px;
font-size:28px;
font-weight:700;
color:#16a34a;
text-align:center;
}

.start-btn{
width:100%;
margin-top:18px;
padding:15px;
border:none;
border-radius:16px;
background:black;
color:white;
cursor:pointer;
font-weight:600;
}

.card{
background:white;
padding:18px;
border-radius:16px;
margin-top:15px;
box-shadow:0 5px 18px rgba(0,0,0,.05);
}

#withdraw input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ddd;
border-radius:12px;
}

#withdraw button{
padding:14px 20px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
cursor:pointer;
}

.history-item{
background:white;
padding:15px;
border-radius:14px;
margin-top:10px;
box-shadow:0 4px 15px rgba(0,0,0,.05);
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
<h1>CampaignHub</h1>
<p>Publisher Dashboard</p>
</div>

<div class="wallet-card">
<p>Wallet Balance</p>
<h2>₹<span id="balance">0</span></h2>

<div class="pubid" id="pubid">
Loading...
</div>
</div>

<button onclick="showSection('home')">
📊 Dashboard
</button>

<button onclick="showSection('campaigns')">
🎯 Campaigns
</button>

<button onclick="showSection('history')">
📄 History
</button>

<button onclick="showSection('withdraw')">
💰 Withdraw
</button>

<button onclick="showSection('reports')">
📈 Reports
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

<div class="main">

<div class="topbar">

<input
id="searchOffer"
placeholder="Search Campaign..."
onkeyup="searchOffers()"
>

<select>
<option>All Offers</option>
<option>Finance</option>
<option>Banking</option>
<option>Survey</option>
</select>

</div>

<div id="home" class="section active">

<div class="stats">

<div class="stat-card">
<h3>Balance</h3>
<h2>₹<span id="balanceHome">0</span></h2>
</div>

<div class="stat-card">
<h3>Total Applications</h3>
<h2 id="totalApps">0</h2>
</div>

<div class="stat-card">
<h3>Total Reports</h3>
<h2 id="totalReports">0</h2>
</div>

</div>

</div>

<div id="campaigns" class="section">

<h2>Campaigns</h2>

<br>

<div id="campaignList"></div>

</div>


<div id="withdraw" class="section">

<h2>Withdraw Money</h2>

<div class="card">

<p>
Available Balance :
₹<span id="balance2">0</span>
</p>

<br>

<input
type="text"
id="upi"
placeholder="Enter UPI ID"
>

<input
type="number"
id="amount"
placeholder="Enter Amount"
>

<button onclick="withdrawRequest()">
Request Withdraw
</button>

</div>

<div id="withdrawList"></div>

</div>

<div id="history" class="section">

<h2>Application History</h2>

<div id="historyList"></div>

</div>

<div id="reports" class="section">

<h2>Tracking Reports</h2>

<div id="reportList"></div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
collection,
getDocs,
addDoc,
query,
where
}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",

authDomain:
"effortless-earn-7f39e..appspot.com",

projectId:
"effortless-earn-7f39e",

storageBucket:
"effortless-earn-7f39e.appspot.com",

messagingSenderId:
"554178513766",

appId:
"1:554178513766:web:d8d7edf915a95349cb16a7"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

let currentUser;

/* AUTH */

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href="login.html";

return;

}

currentUser = user;

loadWallet();
loadCampaigns();
loadHistory();
loadReports();
loadWithdrawHistory();

});

/* WALLET */

async function loadWallet(){

const snap = await getDoc(
doc(db,"users",currentUser.uid)
);

if(snap.exists()){

const bal =
snap.data().balance || 0;

document.getElementById(
"balance"
).innerText = bal;

document.getElementById(
"balance2"
).innerText = bal;

document.getElementById(
"balanceHome"
).innerText = bal;

document.getElementById(
"pubid"
).innerText =
"PUB-" +
currentUser.uid.slice(0,8);

}

}

/* CAMPAIGNS */

async function loadCampaigns(){

const snap =
await getDocs(
collection(db,"campaigns")
);

let html = "";

snap.forEach(docSnap=>{

const c = docSnap.data();

html += `

<div class="offer-card">

<div class="offer-head">

<img
src="${
c.image ||
'https://via.placeholder.com/100'
}"
class="offer-logo"
>

<div>

<h3>${c.title}</h3>

<p>
${c.category || "CPA Offer"}
</p>

<span class="badge">
${c.status || "ACTIVE"}
</span>

</div>

</div>

<div class="reward-box">
₹${c.reward}
</div>

<button
class="start-btn"
onclick="
applyCampaign(
'${docSnap.id}',
'${c.title}',
${c.reward}
)
"
>

START EARNING →

</button>

</div>

`;

});

document.getElementById(
"campaignList"
).innerHTML = html;

}


/* APPLY CAMPAIGN */

window.applyCampaign =
async function(
campaignId,
title,
reward
){

await addDoc(
collection(db,"applications"),
{
userId: currentUser.uid,
campaignId: campaignId,
campaignTitle: title,
reward: reward,
status: "pending",
time: Date.now()
}
);

await addDoc(
collection(db,"reports"),
{
userId: currentUser.uid,
offerName: title,
payout: reward,
status: "pending",
worker: "P1",
trackingId:
Math.random()
.toString(36)
.slice(2,10),
ip: "N/A",
time: Date.now()
}
);

alert("Application Submitted");

loadHistory();
loadReports();

};

/* WITHDRAW */

window.withdrawRequest =
async function(){

const upi =
document.getElementById("upi")
.value;

const amount =
Number(
document.getElementById("amount")
.value
);

if(!upi || amount <= 0){

alert("Enter Valid Details");

return;

}

const snap =
await getDoc(
doc(db,"users",currentUser.uid)
);

const balance =
snap.data().balance || 0;

if(amount > balance){

alert("Insufficient Balance");

return;

}

await addDoc(
collection(db,"withdrawals"),
{
userId: currentUser.uid,
upi: upi,
amount: amount,
status: "pending",
time: Date.now()
}
);

await addDoc(
collection(db,"reports"),
{
userId: currentUser.uid,
offerName: "Withdraw Request",
payout: amount,
status: "pending",
worker: "P1",
trackingId:
Math.random()
.toString(36)
.slice(2,10),
ip: "N/A",
time: Date.now()
}
);

alert("Withdraw Request Sent");

loadWithdrawHistory();
loadReports();

};

/* HISTORY */

async function loadHistory(){

const q = query(
collection(db,"applications"),
where(
"userId",
"==",
currentUser.uid
)
);

const snap =
await getDocs(q);

document.getElementById(
"totalApps"
).innerText = snap.size;

let html = "";

snap.forEach(docSnap=>{

const h = docSnap.data();

html += `

<div class="history-item">

<h3>
${h.campaignTitle || "Campaign"}
</h3>

<br>

<p>
Reward :
₹${h.reward}
</p>

<p>
Status :
${h.status}
</p>

</div>

`;

});

document.getElementById(
"historyList"
).innerHTML = html;

}

/* REPORTS */

async function loadReports(){

const q = query(
collection(db,"reports"),
where(
"userId",
"==",
currentUser.uid
)
);

const snap =
await getDocs(q);

document.getElementById(
"totalReports"
).innerText = snap.size;

let html = "";

snap.forEach(docSnap=>{

const r = docSnap.data();

html += `

<div class="history-item">

<h3>
${r.offerName}
</h3>

<br>

<p>
Payout :
₹${r.payout}
</p>

<p>
Status :
${r.status}
</p>

<p>
Worker :
${r.worker}
</p>

<p>
Tracking :
${r.trackingId}
</p>

</div>

`;

});

document.getElementById(
"reportList"
).innerHTML = html;

}

/* WITHDRAW HISTORY */

async function
loadWithdrawHistory(){

const q = query(
collection(db,"withdrawals"),
where(
"userId",
"==",
currentUser.uid
)
);

const snap =
await getDocs(q);

let html = "";

snap.forEach(docSnap=>{

const w = docSnap.data();

html += `

<div class="history-item">

<h3>
₹${w.amount}
</h3>

<br>

<p>
UPI :
${w.upi}
</p>

<p>
Status :
${w.status}
</p>

</div>

`;

});

document.getElementById(
"withdrawList"
).innerHTML = html;

}

/* SEARCH */

window.searchOffers =
function(){

let input =
document
.getElementById(
"searchOffer"
)
.value
.toLowerCase();

document
.querySelectorAll(
".offer-card"
)
.forEach(card=>{

card.style.display =

card.innerText
.toLowerCase()
.includes(input)

? "block"

: "none";

});

};

/* NAVIGATION */

window.showSection =
function(id){

document
.querySelectorAll(".section")
.forEach(section=>{

section.classList
.remove("active");

});

document
.getElementById(id)
.classList
.add("active");

};

/* LOGOUT */

window.logout =
function(){

signOut(auth);

window.location.href =
"login.html";

};

</script>

</body>
</html>
