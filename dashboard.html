<!DOCTYPE html>
<html>
<head>
<title>User Dashboard PRO</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
background:#0b1220;
color:white;
}

/* SIDEBAR */
.sidebar{
width:240px;
height:100vh;
background:#111827;
padding:20px;
position:fixed;
}

.sidebar h2{color:#38bdf8;}

.sidebar button{
width:100%;
padding:10px;
margin:8px 0;
background:#1f2937;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.sidebar button:hover{
background:#38bdf8;
color:black;
}

/* MAIN */
.main{
margin-left:260px;
padding:20px;
width:100%;
}

/* SECTIONS */
.section{display:none;}
.active{display:block;}

/* CARDS */
.card{
background:#111827;
padding:15px;
margin:10px 0;
border-radius:10px;
border:1px solid #1f2937;
}

/* WALLET */
.wallet{
background:#0f172a;
padding:20px;
border-radius:12px;
margin-bottom:20px;
border:1px solid #1f2937;
}

.wallet h1{color:#38bdf8;}

.btn{
padding:8px 12px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
color:black;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>⚡ Dashboard</h2>

<button onclick="show('home')">Home</button>
<button onclick="show('campaigns')">Campaigns</button>
<button onclick="show('history')">History</button>
<button onclick="show('reports')">Reports</button>
<button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="home" class="section active">

<div class="wallet">
<h3>💰 Wallet Balance</h3>
<h1 id="balance">₹0</h1>
</div>

<h3>Welcome 👋</h3>

</div>

<!-- CAMPAIGNS -->
<div id="campaigns" class="section">
<h2>📢 Campaigns</h2>
<div id="campaignList"></div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
<h2>📜 History</h2>
<div id="historyList"></div>
</div>

<!-- REPORTS -->
<div id="reports" class="section">
<h2>📊 Tracking Reports</h2>
<div id="reportList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
collection,
getDocs,
addDoc,
query,
where
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
  authDomain: "effortless-earn-7f39e.firebaseapp.com",
  projectId: "effortless-earn-7f39e",
  storageBucket: "effortless-earn-7f39e.appspot.com",
  messagingSenderId: "554178513766",
  appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

/* AUTH */
onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

currentUser = user;

loadWallet();
loadCampaigns();
loadHistory();
loadReports();

});

/* WALLET */
async function loadWallet(){
const snap = await getDoc(doc(db,"users",currentUser.uid));
if(snap.exists()){
document.getElementById("balance").innerText =
"₹" + (snap.data().balance || 0);
}
}

/* CAMPAIGNS */
async function loadCampaigns(){
const snap = await getDocs(collection(db,"campaigns"));

let html="";

snap.forEach(d=>{
const c = d.data();

html += `
<div class="card">
<h3>${c.title}</h3>
<p>Reward: ₹${c.reward}</p>

<button class="btn" onclick="apply('${d.id}',${c.reward},'${c.title}')">
Apply
</button>

</div>
`;
});

document.getElementById("campaignList").innerHTML = html;
}

/* APPLY + REPORT */
window.apply = async function(id,reward,title){

const ip = await fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(d=>d.ip);

await addDoc(collection(db,"applications"),{
userId: currentUser.uid,
campaignId: id,
reward,
status:"pending"
});

/* REPORT */
await addDoc(collection(db,"reports"),{
userId: currentUser.uid,
offerName: title,
payout: reward,
status:"pending",
ip: ip,
time: Date.now(),
worker: "P1",
trackingId: Math.random().toString(36).substring(2,10)
});

alert("Applied Successfully");

loadHistory();
loadReports();
};

/* HISTORY */
async function loadHistory(){

const q = query(collection(db,"applications"), where("userId","==",currentUser.uid));

const snap = await getDocs(q);

let html="";

snap.forEach(d=>{
const h = d.data();

html += `
<div class="card">
<p>Campaign: ${h.campaignId}</p>
<p>Reward: ₹${h.reward}</p>
<p>Status: ${h.status}</p>
</div>
`;
});

document.getElementById("historyList").innerHTML = html;
}

/* REPORTS */
async function loadReports(){

const snap = await getDocs(collection(db,"reports"));

let html="";

snap.forEach(d=>{
const r = d.data();

html += `
<div class="card">
<p><b>Offer:</b> ${r.offerName}</p>
<p><b>Payout:</b> ₹${r.payout}</p>
<p><b>Status:</b> ${r.status}</p>
<p><b>User:</b> ${r.userId}</p>
<p><b>Worker:</b> ${r.worker}</p>
<p><b>IP:</b> ${r.ip}</p>
<p><b>Time:</b> ${new Date(r.time).toLocaleString()}</p>
<p><b>ID:</b> ${r.trackingId}</p>
</div>
`;
});

document.getElementById("reportList").innerHTML = html;
}

/* NAV */
window.show=function(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
};

/* LOGOUT */
window.logout=function(){
signOut(auth);
window.location.href="login.html";
};

</script>

</body>
</html>
