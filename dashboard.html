<!DOCTYPE html>
<html>
<head>
<title>Dashboard Fixed</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
background:#0b1220;
color:white;
}

.sidebar{
width:240px;
background:#111827;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar h2{color:#38bdf8;}

.sidebar button{
width:100%;
padding:10px;
margin-top:10px;
background:#1f2937;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.main{
margin-left:260px;
padding:20px;
width:100%;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin:10px 0;
}

.section{display:none;}
.active{display:block;}
</style>
</head>

<body>

<div class="sidebar">
<h2>Dashboard</h2>

<button onclick="show('home')">Home</button>
<button onclick="show('users')">Users</button>
<button onclick="show('withdraw')">Withdraw</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<div id="home" class="section active">
<h2>Overview</h2>

<div class="card">Total Users: <span id="usersCount">0</span></div>
<div class="card">Withdraw: <span id="withdrawCount">0</span></div>
<div class="card">Pending: <span id="pendingCount">0</span></div>
<div class="card">Payout: <span id="payoutCount">0</span></div>

<canvas id="chart"></canvas>
</div>

<div id="users" class="section">
<h2>Users</h2>
<div id="userList"></div>
</div>

<div id="withdraw" class="section">
<h2>Withdraw</h2>
<div id="withdrawList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyD...",
authDomain:"effortless-earn-7f39e.firebaseapp.com",
projectId:"effortless-earn-7f39e"
});

const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

/* 🔥 FIX: NO ADMIN BLOCK (temporary) */
init();

});

window.show=function(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
};

window.logout=function(){
signOut(auth);
window.location.href="login.html";
};

async function init(){
loadStats();
loadUsers();
loadWithdraw();
show("home");
}

async function loadStats(){

const users = await getDocs(collection(db,"users"));   // ✅ FIXED
const withdraw = await getDocs(collection(db,"withdrawals"));

let pending=0;
let payout=0;

withdraw.forEach(d=>{
let x=d.data();
if(x.status==="pending") pending++;
if(x.status==="approved") payout+=Number(x.amount);
});

document.getElementById("usersCount").innerText=users.size;
document.getElementById("withdrawCount").innerText=withdraw.size;
document.getElementById("pendingCount").innerText=pending;
document.getElementById("payoutCount").innerText=payout;

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Users","Withdraw","Pending","Payout"],
datasets:[{
data:[users.size,withdraw.size,pending,payout]
}]
}
});
}

async function loadUsers(){
const snap=await getDocs(collection(db,"users")); // ✅ FIXED
let html="";
snap.forEach(d=>{
html+=`<div class="card">${d.id}</div>`;
});
document.getElementById("userList").innerHTML=html;
}

async function loadWithdraw(){
const snap=await getDocs(collection(db,"withdrawals"));
let html="";
snap.forEach(d=>{
let x=d.data();
html+=`<div class="card">${x.userId} - ₹${x.amount}</div>`;
});
document.getElementById("withdrawList").innerHTML=html;
}

</script>

</body>
</html>
