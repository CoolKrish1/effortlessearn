<!DOCTYPE html>
<html>
<head>
<title>Pro Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
background:#0b1220;
color:white;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:#111827;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar h2{
color:#38bdf8;
}

.sidebar button{
width:100%;
padding:10px;
margin-top:10px;
background:#1f2937;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.sidebar button:hover{
background:#38bdf8;
color:black;
}

/* MAIN */
.main{
margin-left:260px;
padding:20px;
width:100%;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
}

.card h3{
color:#38bdf8;
}

/* TABLE */
table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>⚡ Panel</h2>

<button onclick="show('home')">Dashboard</button>
<button onclick="show('users')">Users</button>
<button onclick="show('withdraw')">Withdraw</button>
<button onclick="show('campaigns')">Campaigns</button>

<button onclick="logout()">Logout</button>
</div>

<div class="main">

<!-- HOME -->
<div id="home">

<div class="cards">
<div class="card">
<h3>Total Users</h3>
<p id="usersCount">0</p>
</div>

<div class="card">
<h3>Withdrawals</h3>
<p id="withdrawCount">0</p>
</div>

<div class="card">
<h3>Pending</h3>
<p id="pendingCount">0</p>
</div>

<div class="card">
<h3>Payout</h3>
<p id="payoutCount">0</p>
</div>
</div>

<canvas id="chart"></canvas>

</div>

<!-- USERS -->
<div id="users" style="display:none;">
<h2>Users</h2>
<div id="userList"></div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" style="display:none;">
<h2>Withdraw</h2>
<div id="withdrawList"></div>
</div>

<!-- CAMPAIGNS -->
<div id="campaigns" style="display:none;">
<h2>Campaigns</h2>
<div id="campaignList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyD...",
authDomain:"effortless-earn-7f39e.firebaseapp.com",
projectId:"effortless-earn-7f39e"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

/* 🔐 LOGIN GUARD */
onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login.html";
}
});

/* LOGOUT */
window.logout=function(){
signOut(auth);
window.location.href="login.html";
};

/* NAV */
window.show=function(id){
document.querySelectorAll(".main > div").forEach(d=>d.style.display="none");
document.getElementById(id).style.display="block";
};

/* STATS */
async function loadStats(){

const users=await getDocs(collection(db,"wallets"));
const withdraw=await getDocs(collection(db,"withdrawals"));

let pending=0,payout=0;

withdraw.forEach(d=>{
let x=d.data();
if(x.status==="pending") pending++;
if(x.status==="approved") payout+=Number(x.amount);
});

document.getElementById("usersCount").innerText=users.size;
document.getElementById("withdrawCount").innerText=withdraw.size;
document.getElementById("pendingCount").innerText=pending;
document.getElementById("payoutCount").innerText=payout;

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Users","Withdraw","Pending","Payout"],
datasets:[{
data:[users.size,withdraw.size,pending,payout],
backgroundColor:["#38bdf8","#6366f1","#facc15","#22c55e"]
}]
}
});
}

/* USERS */
async function loadUsers(){
const snap=await getDocs(collection(db,"wallets"));
let html="";
snap.forEach(d=>{
html+=`<div class="card">${d.id} - ₹${d.data().balance}</div>`;
});
document.getElementById("userList").innerHTML=html;
}

/* WITHDRAW */
async function loadWithdraw(){
const snap=await getDocs(collection(db,"withdrawals"));
let html="";
snap.forEach(d=>{
let x=d.data();
html+=`
<div class="card">
<p>${x.userId}</p>
<p>₹${x.amount}</p>
<p>${x.status}</p>
</div>`;
});
document.getElementById("withdrawList").innerHTML=html;
}

/* CAMPAIGNS */
async function loadCampaigns(){
const snap=await getDocs(collection(db,"campaigns"));
let html="";
snap.forEach(d=>{
html+=`<div class="card">${d.data().title}</div>`;
});
document.getElementById("campaignList").innerHTML=html;
}

loadStats();
loadUsers();
loadWithdraw();
loadCampaigns();

</script>

</body>
</html>
