<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Offers</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,campaigns,offerCards} from './app.js';
window.renderPage=()=>{if(!requireLogin())return;shell('offers',`<div class="panel"><h2>All Offers</h2><div class="toolbar"><input id="q" class="field" style="max-width:360px" placeholder="Search offer" oninput="renderFiltered()"><select id="status" class="field" style="max-width:180px" onchange="renderFiltered()"><option value="">All</option><option value="active">Active</option><option value="paused">Paused</option></select></div><div id="offerList" class="offers"></div></div>`);window.renderFiltered()};window.renderFiltered=()=>{const q=(document.getElementById('q')?.value||'').toLowerCase(), st=document.getElementById('status')?.value||'';const list=campaigns.filter(c=>(!st||(c.status||'active')===st)&&(`${c.title||''} ${c.category||''}`.toLowerCase().includes(q)));document.getElementById('offerList').innerHTML=offerCards(list)};init();</script></body></html>
