<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Offers</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><div id="modal" class="modal"><div class="modalbox"><button type="button" class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div><script type="module">import {init,requireLogin,shell,campaigns,offerCards} from './app.js';window.renderPage=()=>{if(!requireLogin())return;shell('offers',`<div class="panel"><h2>All Active Offers</h2><p class="muted">Firebase campaigns collection se auto load.</p><div class="offers">${offerCards(campaigns.filter(x=>x.status!=='paused'))}</div></div>`)};init();</script></body></html>
