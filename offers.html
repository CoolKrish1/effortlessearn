<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Offers</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><div id="modal" class="modal"><div class="modalbox"><button class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div><script type="module">import {init,requireLogin,shell,campaigns,offerCards} from './app.js';window.renderPage=()=>{if(!requireLogin())return;shell('offers',`<div class="toolbar"><input id="search" oninput="filterOffers()" class="field" placeholder="Search High Paying Offers..."><select id="cat" onchange="filterOffers()" class="field"><option value="">ALL OFFERS</option><option>Banking</option><option>Survey</option><option>Crypto</option><option>Install</option><option>Shopping</option><option>Demat</option></select></div><div id="offerGrid" class="offers">${offerCards(campaigns.filter(x=>x.status!=='paused'))}</div>`);};window.filterOffers=()=>{let s=search.value.toLowerCase(),c=cat.value;offerGrid.innerHTML=offerCards(campaigns.filter(x=>(x.status!=='paused')&&(x.title||'').toLowerCase().includes(s)&&(!c||x.category===c)));};init();</script></body></html>
