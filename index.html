<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Effortless CPA SPA</title>
<style>
:root{--bg:#f4f6fb;--dark:#111827;--dark2:#0b1020;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#f97316;--muted:#7b8496}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#111827}button,input,select,textarea{font-family:inherit}a{text-decoration:none}.hidden{display:none!important}
.btn{border:0;border-radius:12px;background:#111827;color:white;padding:14px 20px;font-weight:900;cursor:pointer}.btn.blue{background:var(--blue)}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.orange{background:var(--orange)}.btn.light{background:#eef2ff;color:#1e40af}.btn.full{width:100%}
.field{width:100%;padding:15px;border:1px solid #e7eaf1;border-radius:12px;background:#fbfcff;margin:8px 0;outline:none}
.topnav{height:82px;background:white;display:flex;align-items:center;justify-content:space-between;padding:0 30px;box-shadow:0 3px 18px #00000010;position:sticky;top:0;z-index:5}.brand{font-weight:900;font-size:25px}.brand span{color:var(--blue)}.topnav a{font-weight:800;color:#111827;margin-left:25px}
.landing{min-height:560px;text-align:center;display:grid;place-items:center;background:linear-gradient(#fff,#eef6ff);padding:45px 18px}.landing h1{font-size:64px;line-height:1.05;margin:22px 0}.grad{background:linear-gradient(90deg,#2563eb,#a855f7);-webkit-background-clip:text;color:transparent}.pill{display:inline-block;background:#dbeafe;color:#1e40af;border-radius:999px;padding:11px 20px;font-size:12px;font-weight:900;letter-spacing:1px}.landing p{font-size:21px;color:#6b7280}
.darksec{background:#111827;color:white;padding:85px 30px}.darksec h2{font-size:42px}.darksec p{color:#9ca3af;font-size:19px;max-width:720px;line-height:1.6}
.authwrap{min-height:100vh;display:grid;place-items:center;background:#eef3ff;padding:20px}.authbox{background:white;width:min(520px,94vw);padding:40px;border-top:5px solid var(--blue);border-radius:10px;text-align:center;box-shadow:0 25px 80px #0001}.smalllink{color:#1d4ed8;font-weight:800;cursor:pointer}
.app{display:flex;min-height:100vh}.sidebar{width:285px;background:linear-gradient(180deg,var(--dark),var(--dark2));color:white;position:fixed;left:0;top:0;bottom:0;padding:28px 20px;overflow:auto}.side-logo{font-size:30px;font-weight:900}.side-logo span{color:#3b82f6}.sub{font-size:11px;color:#94a3b8;letter-spacing:2px;margin:5px 0 25px}.walletbox{background:#162034;border:1px solid #2c374b;border-radius:18px;padding:21px;margin-bottom:24px}.walletbox small{color:#94a3b8}.walletbox h1{color:#4ade80;margin:10px 0;font-size:34px}.idbadge{display:inline-block;border:1px solid #334155;border-radius:8px;padding:8px 10px;color:#cbd5e1;font-size:12px}.menu a{display:flex;gap:12px;align-items:center;color:#aeb6c4;padding:15px;border-radius:8px;margin:4px 0;font-weight:800}.menu a.active,.menu a:hover{background:var(--blue);color:white}.main{margin-left:285px;width:calc(100% - 285px);padding:32px}
.banner{background:var(--blue);color:white;border-radius:16px;padding:22px 28px;margin-bottom:26px;box-shadow:0 10px 25px #2563eb33}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}.stat{background:white;border-radius:22px;padding:22px;border-bottom:5px solid var(--green);box-shadow:0 10px 28px #00000010}.stat:nth-child(2){border-color:var(--orange)}.stat:nth-child(3){border-color:#a855f7}.stat:nth-child(4){border-color:var(--blue)}.stat h2{font-size:32px;margin:10px 0}.muted{color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.8px}
.panel{background:white;border-radius:24px;padding:26px;box-shadow:0 10px 28px #00000010;margin-bottom:24px}.toolbar{display:flex;gap:15px;margin-bottom:24px}.toolbar input{flex:1}.toolbar select{width:220px}.offers{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}.offer{background:white;border-radius:24px;padding:22px;box-shadow:0 10px 28px #00000010}.offerhead{display:flex;gap:15px;align-items:flex-start}.offer img{width:78px;height:78px;object-fit:cover;border-radius:18px;background:#f1f5f9}.tag{background:#dcfce7;color:#15803d;border-radius:9px;padding:7px 11px;font-size:12px;font-weight:900}.earn{background:#f0fdf4;border:1px solid #dcfce7;color:#15803d;border-radius:12px;padding:15px;margin:20px 0;display:flex;justify-content:space-between;font-weight:900}
.table{width:100%;border-collapse:collapse;background:white;border-radius:20px;overflow:hidden;box-shadow:0 10px 28px #00000010}th,td{padding:17px;border-bottom:1px solid #eef0f4;text-align:left}th{font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:.8px}.status{padding:7px 12px;border-radius:999px;font-size:12px;font-weight:900}.pending{background:#fff7ed;color:#c2410c}.approved{background:#dcfce7;color:#15803d}.rejected{background:#fee2e2;color:#b91c1c}.paused{background:#f1f5f9;color:#475569}.active{background:#dbeafe;color:#1d4ed8}
.modal{position:fixed;inset:0;background:#020617aa;display:none;align-items:center;justify-content:center;padding:18px;z-index:99}.modal.show{display:flex}.modalbox{background:white;border-radius:30px;width:min(780px,94vw);max-height:92vh;overflow:auto;padding:34px}.close{float:right;border:0;background:#f1f5f9;width:42px;height:42px;border-radius:50%;font-size:24px}.preview{width:100%;height:245px;object-fit:cover;border-radius:18px;background:#eef2ff}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:22px}.linkbox{background:#eff6ff;border:1px solid #bfdbfe;border-radius:16px;padding:16px;margin:12px 0}.yellow{background:#fffbeb;border-color:#fde68a}.worker{max-width:560px;margin:28px auto}.cash{background:linear-gradient(135deg,#10b981,#065f46);color:#facc15;text-align:center;border-radius:24px;padding:36px;font-size:58px;font-weight:900}.notice{background:#fff1f2;border:1px dashed #fca5a5;border-radius:22px;padding:24px;margin-top:24px}.adminform{display:grid;grid-template-columns:1fr 1fr;gap:14px}.adminform .wide{grid-column:1/-1}
@media(max-width:950px){.sidebar{position:static;width:100%;height:auto}.app{display:block}.main{margin:0;width:100%;padding:18px}.stats,.offers,.grid2,.adminform{grid-template-columns:1fr}.toolbar{display:block}.toolbar select{width:100%;margin-top:10px}.landing h1{font-size:42px}.topnav{height:auto;padding:15px;display:block}.topnav a{display:inline-block;margin:12px 12px 0 0}}
</style>
</head>
<body>
<div id="root"></div>
<div id="modal" class="modal"><div class="modalbox"><button class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div>

<script type="module">
import { auth, db, storage } from "./firebase.js";
import { createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, addDoc, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const root=document.getElementById("root");
let user=null, profile=null, campaigns=[], submissions=[], withdraws=[], users=[];
window.closeModal=()=>document.getElementById("modal").classList.remove("show");
function openModal(html){document.getElementById("modalContent").innerHTML=html;document.getElementById("modal").classList.add("show")}
async function loadData(){
  try{
    campaigns=(await getDocs(collection(db,"campaigns"))).docs.map(d=>({id:d.id,...d.data()}));
    submissions=(await getDocs(collection(db,"submissions"))).docs.map(d=>({id:d.id,...d.data()}));
    withdraws=(await getDocs(collection(db,"withdraws"))).docs.map(d=>({id:d.id,...d.data()}));
    users=(await getDocs(collection(db,"users"))).docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){console.log(e)}
}
onAuthStateChanged(auth,async(u)=>{
  user=u;
  if(u){
    let s=await getDoc(doc(db,"users",u.uid));
    profile=s.exists()?s.data():{email:u.email,balance:0,role:"user"};
  } else profile=null;
  await loadData();
  route();
});
window.onhashchange=route;
function go(hash){location.hash=hash}
function route(){
  let page=location.hash.replace("#","")||"home";
  if(page.startsWith("work-")) return renderWorker(page.replace("work-",""));
  if(!user && !["home","login","register"].includes(page)) page="login";
  if(page==="home") return renderLanding();
  if(page==="login") return renderLogin();
  if(page==="register") return renderRegister();
  if(page==="dashboard") return renderDashboard();
  if(page==="offers") return renderOffers();
  if(page==="smart") return renderSmart();
  if(page==="reports") return renderReports();
  if(page==="wallet") return renderWallet();
  if(page==="postback") return renderPostback();
  if(page==="profile") return renderProfile();
  if(page==="support") return renderSupport();
  if(page==="admin") return renderAdmin();
  renderDashboard();
}
function renderLanding(){
  root.innerHTML=`<div class="topnav"><div class="brand">🛡 EFFORTLESS<span>NETWORK</span></div><div><a href="#login">Log In</a><a href="#register"><button class="btn blue">JOIN NOW</button></a></div></div>
  <section class="landing"><div><span class="pill">🚀 #1 CPA NETWORK • 2026 EDITION</span><h1>Monetize Traffic With<br><span class="grad">Premium CPA Offers.</span></h1><p>Connect with top-tier brands. Daily UPI Payouts • Real-time Tracking.</p><button onclick="location.hash='login'" class="btn">START EARNING →</button></div></section>
  <section class="darksec"><p style="color:#60a5fa;font-weight:900;letter-spacing:2px">FOR BRANDS & ADVERTISERS</p><h2>Scale With Performance Marketing.</h2><p>Only pay for real results. CPI, CPL, CPA tracking with publisher panel, smart links and approval workflow.</p><button class="btn green">Chat on WhatsApp</button></section>`;
}
function renderLogin(){
  root.innerHTML=`<div class="authwrap"><div class="authbox"><div style="font-size:46px">🛡</div><h1>PARTNER LOGIN</h1><p class="muted">SECURE GATEWAY • 2026 EDITION</p><input id="email" class="field" placeholder="Email Address"><input id="pass" type="password" class="field" placeholder="Password"><button onclick="loginUser()" class="btn blue full">🔒 ACCESS DASHBOARD</button><p>New Publisher? <span onclick="location.hash='register'" class="smalllink">Create Account</span></p></div></div>`;
}
function renderRegister(){
  root.innerHTML=`<div class="authwrap"><div class="authbox"><div style="font-size:46px">🛡</div><h1>CREATE ACCOUNT</h1><input id="name" class="field" placeholder="Full Name"><input id="email" class="field" placeholder="Email Address"><input id="pass" type="password" class="field" placeholder="Password"><button onclick="registerUser()" class="btn blue full">JOIN NOW</button><p>Already have account? <span onclick="location.hash='login'" class="smalllink">Login</span></p></div></div>`;
}
window.loginUser=async()=>{try{await signInWithEmailAndPassword(auth,email.value,pass.value);location.hash="dashboard"}catch(e){alert(e.message)}}
window.registerUser=async()=>{try{let r=await createUserWithEmailAndPassword(auth,email.value,pass.value);await setDoc(doc(db,"users",r.user.uid),{name:name.value,email:email.value,balance:0,role:"user",createdAt:Date.now()});location.hash="dashboard"}catch(e){alert(e.message)}}
window.logoutUser=async()=>{await signOut(auth);location.hash="home"}
function nav(active){
  const items=[["dashboard","▦","DASHBOARD"],["offers","▣","ALL OFFERS"],["smart","🔗","SMART LINKS"],["reports","▤","REPORTS"],["wallet","₹","WALLET"],["postback","⚙","POSTBACK"],["profile","♙","PROFILE"],["support","?","SUPPORT"],["admin","🛠","ADMIN"]];
  return items.map(i=>`<a href="#${i[0]}" class="${active===i[0]?'active':''}"><span>${i[1]}</span>${i[2]}<span style="margin-left:auto">›</span></a>`).join("")+`<a href="#" onclick="logoutUser()"><span>↪</span>LOGOUT</a>`;
}
function shell(active,content){
  root.innerHTML=`<div class="app"><aside class="sidebar"><div class="side-logo">EFFORTLESS<span>CPA</span></div><div class="sub">PUBLISHER PANEL</div><div class="walletbox"><small>WALLET BALANCE</small><h1>₹${profile?.balance||0}</h1><span class="idbadge">ID: ${user?.uid?.slice(0,8).toUpperCase()||"PUB"}</span></div><div class="menu">${nav(active)}</div></aside><main class="main">${content}</main></div>`;
}
function offerCards(list){
  return list.length?list.map(d=>`<div class="offer"><div class="offerhead"><img src="${d.image||''}"><div><h3>${d.title||''}</h3><p class="muted">${d.category||'CPA'} • CPA</p></div><span class="tag" style="margin-left:auto">${d.status||'active'}</span></div><div class="earn"><span>TOTAL EARNINGS</span><span>₹${d.reward||0}</span></div><button onclick="openOffer('${d.id}')" class="btn full">START EARNING →</button></div>`).join(""):`<div class="panel">No offers found. Admin se offer add karo.</div>`;
}
function renderDashboard(){
  let pending=submissions.filter(x=>x.status==="pending").length, approved=submissions.filter(x=>x.status==="approved").length;
  shell("dashboard",`<div class="banner"><b>✈ JOIN TELEGRAM CHANNEL</b><br><small>Get new offers & payment updates instantly.</small></div><div class="stats"><div class="stat"><span class="muted">Revenue ₹</span><h2>₹${profile?.balance||0}</h2><small>Total balance</small></div><div class="stat"><span class="muted">Pending Approval</span><h2>${pending}</h2><small>Verification in progress</small></div><div class="stat"><span class="muted">Conversions</span><h2>${approved}</h2><small>Approved leads</small></div><div class="stat"><span class="muted">Clicks</span><h2>${submissions.length}</h2><small>Total clicks</small></div></div><div class="panel"><h2>Top Offers</h2><br><div class="offers">${offerCards(campaigns.filter(x=>x.status!=="paused").slice(0,6))}</div></div>`);
}
function renderOffers(){
  shell("offers",`<div class="toolbar"><input id="search" oninput="filterOffers()" class="field" placeholder="Search High Paying Offers..."><select id="cat" onchange="filterOffers()" class="field"><option value="">ALL OFFERS</option><option>Banking</option><option>Survey</option><option>Crypto</option><option>Install</option><option>Shopping</option><option>Demat</option></select></div><div id="offerGrid" class="offers">${offerCards(campaigns.filter(x=>x.status!=="paused"))}</div>`);
}
window.filterOffers=()=>{let s=search.value.toLowerCase(),c=cat.value;offerGrid.innerHTML=offerCards(campaigns.filter(x=>(x.status!=="paused")&&(x.title||"").toLowerCase().includes(s)&&(!c||x.category===c)))}
window.openOffer=id=>{
  let d=campaigns.find(x=>x.id===id);
  openModal(`<img class="preview" src="${d.image||''}"><h1>${d.title}</h1><p><span class="tag">${d.category}</span> <b style="color:#16a34a">Total Potential: ₹${d.reward}</b></p><div class="panel" style="color:#7f1d1d"><b>IMPORTANT TERMS & CONDITIONS:</b><p>${(d.steps||'Complete all steps.').replaceAll("\\n","<br>")}</p></div><div class="linkbox"><b>YOUR SMART TRACKING LINK</b><input class="field" value="${location.origin}${location.pathname}#work-${d.id}" readonly></div><input id="upi" class="field" placeholder="UPI ID for cashback"><input id="proof" type="file" class="field" accept="image/*"><textarea id="note" class="field" placeholder="Note"></textarea><button onclick="submitTask('${d.id}')" class="btn green full">SUBMIT TASK</button>`);
}
window.submitTask=async id=>{
  let proofUrl="", f=proof.files[0];
  if(f){let r=ref(storage,"proof/"+Date.now()+"-"+f.name);await uploadBytes(r,f);proofUrl=await getDownloadURL(r)}
  await addDoc(collection(db,"submissions"),{campaign:id,campaignTitle:campaigns.find(x=>x.id===id)?.title||"",userId:user.uid,email:user.email,upi:upi.value,note:note.value,proof:proofUrl,status:"pending",time:Date.now()});
  alert("Task submitted. Admin approval pending."); closeModal(); await loadData(); renderReports();
}
function renderSmart(){
  shell("smart",`<div class="panel"><h2>My Smart Campaigns <button onclick="location.hash='offers'" class="btn" style="float:right">CREATE NEW</button></h2><p class="muted">Create P1/P2 links & manage workers</p></div>${campaigns.map(d=>`<div class="panel"><h2>${d.title}</h2><span class="tag">${d.status||'active'}</span><div class="grid2"><div class="linkbox"><b>1. WORKER LINK (P1)</b><input class="field" value="${location.origin}${location.pathname}#work-${d.id}"><button class="btn blue" onclick="navigator.clipboard.writeText('${location.origin}${location.pathname}#work-${d.id}');alert('✅ Link Copied!')">COPY</button></div><div class="linkbox yellow"><b>3. TRACKING STATUS</b><input class="field" value="${location.origin}${location.pathname}#reports"><button class="btn orange">COPY</button></div></div></div>`).join("")}`);
}
function renderReports(){
  shell("reports",`<div class="toolbar"><button class="btn">📊 ALL REPORTS</button><button class="btn light">🎯 PAID / APPROVED</button><button class="btn orange">⏳ PENDING CHECK</button></div><div class="panel"><h2>TRACKING HISTORY</h2></div><table class="table"><tr><th>Time</th><th>Offer Name</th><th>Payout</th><th>Status</th><th>UPI</th><th>Proof</th></tr>${submissions.map(s=>`<tr><td>${new Date(s.time||Date.now()).toLocaleString()}</td><td>${s.campaignTitle||s.campaign}</td><td>-</td><td><span class="status ${s.status||'pending'}">${s.status||'pending'}</span></td><td>${s.upi||'-'}</td><td>${s.proof?`<a href="${s.proof}" target="_blank">View</a>`:'-'}</td></tr>`).join("")||`<tr><td colspan="6" style="text-align:center;padding:60px">No Records Found.</td></tr>`}</table>`);
}
function renderWallet(){
  shell("wallet",`<div class="banner" style="background:#24439a"><b>🛡 SECURE PAYMENT GATEWAY</b><br>Payments are processed within 3-7 business days.</div><div class="grid2"><div class="panel"><h2>Request Payout</h2><div style="background:#111827;color:white;border-radius:20px;text-align:center;padding:30px"><span class="muted">AVAILABLE BALANCE</span><h1>₹${profile?.balance||0}</h1><span class="tag">MIN WITHDRAW: ₹100</span></div><input id="wname" class="field" placeholder="Enter Name"><input id="wupi" class="field" placeholder="Enter UPI ID"><input id="wamount" type="number" class="field" placeholder="Amount"><button onclick="requestWithdraw()" class="btn full">WITHDRAW MONEY →</button></div><div class="panel"><h2>Payouts</h2>${withdraws.map(w=>`<div class="panel"><h2>₹${w.amount}</h2><p>${w.name} • ${w.upi}</p><span class="status ${w.status||'pending'}">${w.status||'pending'}</span></div>`).join("")||"No payouts"}</div></div>`);
}
window.requestWithdraw=async()=>{await addDoc(collection(db,"withdraws"),{userId:user.uid,name:wname.value,upi:wupi.value,amount:Number(wamount.value),status:"pending",time:Date.now()});alert("Withdraw requested");await loadData();renderWallet()}
function renderPostback(){shell("postback",`<div class="panel"><h2>Global Postback URL</h2><div class="toolbar"><input class="field" placeholder="https://domain.com/callback?click_id={click_id}&payout={payout}&status={event_id}"><button class="btn">SAVE</button></div><div class="grid2"><div class="linkbox">{click_id}: Publisher Click ID</div><div class="linkbox">{event_id}: Goal Token</div><div class="linkbox">{payout}: Publisher Profit</div><div class="linkbox">{p1_upi}: Worker UPI</div></div></div>`)}
function renderProfile(){shell("profile",`<div class="grid2"><div class="panel"><h2>Details</h2><p>Name <b style="float:right">${profile?.name||""}</b></p><hr><p>Email <b style="float:right">${profile?.email||user.email}</b></p><hr><p>ID <b style="float:right;color:#2563eb">${user.uid.slice(0,8).toUpperCase()}</b></p><hr><p>Role <b style="float:right">${profile?.role||"user"}</b></p></div><div class="panel"><h2>Security</h2><input class="field" placeholder="Current Password"><input class="field" placeholder="New Password"><button class="btn full">UPDATE</button></div></div>`)}
function renderSupport(){shell("support",`<div class="panel"><h2>Support Ticket</h2><input id="subject" class="field" placeholder="Subject"><textarea id="message" class="field" rows="6" placeholder="Message"></textarea><button onclick="sendTicket()" class="btn blue">SUBMIT TICKET</button></div>`)}
window.sendTicket=async()=>{await addDoc(collection(db,"support"),{userId:user.uid,email:user.email,subject:subject.value,message:message.value,status:"open",time:Date.now()});alert("Ticket submitted")}
function renderAdmin(){
  if(profile?.role!=="admin"){shell("admin",`<div class="panel"><h2>Admin Only</h2><p>Firestore users me apne account ka role = admin karo.</p></div>`);return;}
  shell("admin",`<div class="panel"><h2>Admin Panel</h2><p>Add offers, approve leads and withdrawals.</p></div><div class="grid2"><div class="panel"><h2>Add Campaign</h2><div class="adminform"><input id="atitle" class="field" placeholder="Campaign Title"><input id="areward" type="number" class="field" placeholder="Reward"><select id="acat" class="field"><option>Banking</option><option>Survey</option><option>Crypto</option><option>Install</option><option>Shopping</option><option>Demat</option></select><input id="aimg" type="file" accept="image/*" class="field"><textarea id="asteps" class="field wide" placeholder="Terms / Worker Instructions"></textarea><button onclick="addCampaign()" class="btn blue wide">ADD CAMPAIGN</button></div></div><div class="panel"><h2>Stats</h2><div class="stats"><div class="stat"><span class="muted">Campaigns</span><h2>${campaigns.length}</h2></div><div class="stat"><span class="muted">Leads</span><h2>${submissions.length}</h2></div><div class="stat"><span class="muted">Withdraws</span><h2>${withdraws.length}</h2></div><div class="stat"><span class="muted">Users</span><h2>${users.length}</h2></div></div></div></div><div class="panel"><h2>Lead Approval</h2><table class="table"><tr><th>Offer</th><th>UPI</th><th>Status</th><th>Action</th></tr>${submissions.map(s=>`<tr><td>${s.campaignTitle||s.campaign}</td><td>${s.upi||"-"}</td><td>${s.status}</td><td><button class="btn green" onclick="lead('${s.id}','approved')">Approve</button> <button class="btn red" onclick="lead('${s.id}','rejected')">Reject</button></td></tr>`).join("")}</table></div><div class="panel"><h2>Withdraw Approval</h2><table class="table"><tr><th>Name</th><th>UPI</th><th>Amount</th><th>Status</th><th>Action</th></tr>${withdraws.map(w=>`<tr><td>${w.name}</td><td>${w.upi}</td><td>₹${w.amount}</td><td>${w.status}</td><td><button class="btn green" onclick="withdraw('${w.id}','approved')">Approve</button> <button class="btn red" onclick="withdraw('${w.id}','rejected')">Reject</button></td></tr>`).join("")}</table></div><div class="panel"><h2>Manage Campaigns</h2><div class="offers">${offerCards(campaigns)}</div></div>`);
}
window.addCampaign=async()=>{let f=aimg.files[0];if(!f){alert("Upload image");return}let r=ref(storage,"campaigns/"+Date.now()+"-"+f.name);await uploadBytes(r,f);let url=await getDownloadURL(r);await addDoc(collection(db,"campaigns"),{title:atitle.value,reward:Number(areward.value),category:acat.value,steps:asteps.value,image:url,status:"active",createdAt:Date.now()});alert("Campaign added");await loadData();renderAdmin()}
window.lead=async(id,status)=>{await updateDoc(doc(db,"submissions",id),{status,updatedAt:Date.now()});alert("Updated");await loadData();renderAdmin()}
window.withdraw=async(id,status)=>{await updateDoc(doc(db,"withdraws",id),{status,updatedAt:Date.now()});alert("Updated");await loadData();renderAdmin()}
function renderWorker(id){
  let d=campaigns.find(x=>x.id===id);
  if(!d){root.innerHTML="<div class='panel'>Offer not found</div>";return}
  root.innerHTML=`<div class="worker"><div style="display:flex;gap:16px;align-items:center;margin:25px 0"><img src="${d.image}" style="width:82px;height:82px;border-radius:18px;object-fit:cover"><div><h2>${d.title}</h2><b style="color:#059669">VERIFIED TASK PORTAL</b></div></div><div class="panel"><div class="cash">₹${d.reward}</div><div class="panel"><b>STEPS TO FOLLOW</b><p>${(d.steps||"Complete task").replaceAll("\\n","<br>")}</p><input class="field" placeholder="UPI ID"><button class="btn green full">CONFIRM & START TASK ✨</button></div></div><div class="notice"><b>IMPORTANT NOTICE</b><p>Read all steps. One IP/device one time. Wrong UPI may reject payout.</p></div></div>`;
}
route();
</script>
