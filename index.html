<!DOCTYPE html>
<html>
<head>
<title>Auth System</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e293b;
padding:25px;
border-radius:12px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
cursor:pointer;
}

.loginBtn{background:#38bdf8;}
.registerBtn{background:#22c55e;}

.toggle{
margin-top:10px;
cursor:pointer;
color:#38bdf8;
}
</style>
</head>

<body>

<div class="box">

<h2 id="title">Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="loginBtn" onclick="login()">Login</button>
<button class="registerBtn" onclick="register()" style="display:none;">Create Account</button>

<p class="toggle" onclick="toggle()">Switch to Register</p>

<p id="msg"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
  authDomain: "effortless-earn-7f39e.firebaseapp.com",
  projectId: "effortless-earn-7f39e",
  storageBucket: "effortless-earn-7f39e.firebasestorage.app",
  messagingSenderId: "554178513766",
  appId: "1:554178513766:web:d8d7edf915a95349cb16a7",
  measurementId: "G-FLV8NJM726"
};

const auth = getAuth(app);
const db = getFirestore(app);

let mode = "login";

/* TOGGLE UI */
window.toggle = function(){

if(mode === "login"){
mode = "register";
document.getElementById("title").innerText="Register";
document.querySelector(".loginBtn").style.display="none";
document.querySelector(".registerBtn").style.display="block";
document.querySelector(".toggle").innerText="Switch to Login";
}
else{
mode = "login";
document.getElementById("title").innerText="Login";
document.querySelector(".loginBtn").style.display="block";
document.querySelector(".registerBtn").style.display="none";
document.querySelector(".toggle").innerText="Switch to Register";
}

};

/* REGISTER */
window.register = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

const userCred = await createUserWithEmailAndPassword(auth,email,password);

await setDoc(doc(db,"users",userCred.user.uid),{
email:email,
role:"user"
});

document.getElementById("msg").innerText="Account Created ✔";

}catch(err){
document.getElementById("msg").innerText=err.message;
}

};

/* LOGIN */
window.login = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

const userCred = await signInWithEmailAndPassword(auth,email,password);

const snap = await getDoc(doc(db,"users",userCred.user.uid));

if(!snap.exists()){
document.getElementById("msg").innerText="User not found";
return;
}

const role = snap.data().role;

if(role === "admin"){
window.location.href="admin.html";
}else{
window.location.href="dashboard.html";
}

}catch(err){
document.getElementById("msg").innerText=err.message;
}

};

</script>

</body>
</html>
