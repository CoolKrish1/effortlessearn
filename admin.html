<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h1{
margin-bottom:20px;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
margin-right:10px;
border:none;
cursor:pointer;
border-radius:5px;
}

.approve{
background:green;
color:white;
}

.reject{
background:red;
color:white;
}

.status{
font-weight:bold;
}
</style>
</head>

<body>

<h1>🔥 Admin Withdraw Panel (Single Page)</h1>

<div id="list">Loading requests...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
getDoc,
increment
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
 authDomain: "effortless-earn-7f39e.firebaseapp.com",
 projectId: "effortless-earn-7f39e",
 storageBucket: "effortless-earn-7f39e.firebasestorage.app",
 messagingSenderId: "554178513766",
 appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//
// LOAD REQUESTS
//
async function loadRequests(){

  const snap = await getDocs(collection(db,"withdrawals"));

  let html = "";

  snap.forEach(docSnap => {

    const data = docSnap.data();

    html += `
      <div class="card">
        <p><b>User ID:</b> ${data.userId}</p>
        <p><b>Amount:</b> ₹${data.amount}</p>
        <p><b>UPI:</b> ${data.upi}</p>
        <p><b>Status:</b> <span class="status">${data.status}</span></p>

        ${data.status === "pending" ? `
          <button class="approve" onclick="approve('${docSnap.id}')">Approve</button>
          <button class="reject" onclick="reject('${docSnap.id}')">Reject</button>
        ` : `<p>Processed</p>`}
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "No requests found";
}

//
// APPROVE
//
window.approve = async function(id){

  const ref = doc(db,"withdrawals",id);
  const snap = await getDoc(ref);

  const data = snap.data();

  const walletRef = doc(db,"wallets",data.userId);

  // mark approved
  await updateDoc(ref,{
    status:"approved"
  });

  // deduct wallet
  await updateDoc(walletRef,{
    balance:increment(-data.amount)
  });

  alert("Approved ✅");
  loadRequests();
};

//
// REJECT
//
window.reject = async function(id){

  await updateDoc(doc(db,"withdrawals",id),{
    status:"rejected"
  });

  alert("Rejected ❌");
  loadRequests();
};

loadRequests();

</script>

</body>
</html>
