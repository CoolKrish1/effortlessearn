<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h1{ margin-bottom:20px; }

.tabs button{
padding:10px;
margin-right:10px;
cursor:pointer;
border:none;
background:#333;
color:white;
border-radius:5px;
}

.tab{
display:none;
margin-top:20px;
}

.active{
display:block;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.stat{
font-size:20px;
font-weight:bold;
}

button.action{
padding:8px 12px;
margin-right:10px;
border:none;
cursor:pointer;
border-radius:5px;
}

.approve{ background:green;color:white; }
.reject{ background:red;color:white; }
</style>
</head>

<body>

<h1>🔥 Admin Control Panel</h1>

<div class="tabs">
<button onclick="openTab('dashboard')">📊 Dashboard</button>
<button onclick="openTab('withdraw')">💰 Withdraw Requests</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab active">

<div class="grid">

<div class="card">
<h3>Total Users</h3>
<p class="stat" id="users">0</p>
</div>

<div class="card">
<h3>Total Withdrawals</h3>
<p class="stat" id="withdrawals">0</p>
</div>

<div class="card">
<h3>Total Payout</h3>
<p class="stat" id="payout">₹0</p>
</div>

<div class="card">
<h3>Pending Requests</h3>
<p class="stat" id="pending">0</p>
</div>

</div>

</div>

<!-- WITHDRAW -->
<div id="withdraw" class="tab">

<div id="list">Loading...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
getDoc,
increment
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
 authDomain: "effortless-earn-7f39e.firebaseapp.com",
 projectId: "effortless-earn-7f39e",
 storageBucket: "effortless-earn-7f39e.firebasestorage.app",
 messagingSenderId: "554178513766",
 appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//
// TAB SWITCH
//
window.openTab = function(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
};

//
// LOAD STATS
//
async function loadStats(){

  const usersSnap = await getDocs(collection(db,"wallets"));
  const withdrawSnap = await getDocs(collection(db,"withdrawals"));

  let payout = 0;
  let pending = 0;

  withdrawSnap.forEach(d=>{
    const data = d.data();

    if(data.status === "approved"){
      payout += Number(data.amount);
    }

    if(data.status === "pending"){
      pending++;
    }
  });

  document.getElementById("users").innerText = usersSnap.size;
  document.getElementById("withdrawals").innerText = withdrawSnap.size;
  document.getElementById("payout").innerText = "₹" + payout;
  document.getElementById("pending").innerText = pending;
}

//
// LOAD WITHDRAWALS
//
async function loadWithdrawals(){

  const snap = await getDocs(collection(db,"withdrawals"));

  let html = "";

  snap.forEach(docSnap=>{

    const data = docSnap.data();

    html += `
      <div class="card">
        <p><b>User:</b> ${data.userId}</p>
        <p><b>Amount:</b> ₹${data.amount}</p>
        <p><b>UPI:</b> ${data.upi}</p>
        <p><b>Status:</b> ${data.status}</p>

        ${data.status==="pending" ? `
          <button class="action approve" onclick="approve('${docSnap.id}')">Approve</button>
          <button class="action reject" onclick="reject('${docSnap.id}')">Reject</button>
        ` : ``}
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "No requests";
}

//
// APPROVE
//
window.approve = async function(id){

  const ref = doc(db,"withdrawals",id);
  const snap = await getDoc(ref);

  const data = snap.data();

  const walletRef = doc(db,"wallets",data.userId);

  await updateDoc(ref,{status:"approved"});
  await updateDoc(walletRef,{balance:increment(-data.amount)});

  alert("Approved");
  loadWithdrawals();
  loadStats();
};

//
// REJECT
//
window.reject = async function(id){

  await updateDoc(doc(db,"withdrawals",id),{
    status:"rejected"
  });

  alert("Rejected");
  loadWithdrawals();
  loadStats();
};

loadStats();
loadWithdrawals();

</script>

</body>
</html>
