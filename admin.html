<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,profile,campaigns,submissions,withdraws,users,smartLinks,settings,loadData,offerCards,isAdmin} from './app.js';import {db,storage} from './firebase.js';import {collection,addDoc,doc,setDoc,updateDoc,deleteDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';import {ref,uploadBytes,getDownloadURL} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';
window.renderPage=()=>{if(!requireLogin())return;if(!isAdmin()){shell('admin',`<div class="panel"><h2>Admin Only</h2><p>Normal user ke dashboard me admin button hidden rahega. Apne user document me role = admin set karo.</p></div>`);return;}shell('admin',`<div class="stats"><div class="stat"><span class="muted">Campaigns</span><h2>${campaigns.length}</h2></div><div class="stat"><span class="muted">Leads</span><h2>${submissions.length}</h2></div><div class="stat"><span class="muted">Withdraws</span><h2>${withdraws.length}</h2></div><div class="stat"><span class="muted">Users</span><h2>${users.length}</h2></div></div><div class="grid2"><div class="panel"><h2>Add Campaign</h2><input id="atitle" class="field" placeholder="Campaign Title"><input id="areward" type="number" class="field" placeholder="User Reward"><input id="adestination" class="field" placeholder="Destination URL"><select id="acat" class="field"><option>Banking</option><option>Survey</option><option>Crypto</option><option>Install</option><option>Shopping</option><option>Demat</option></select><input id="aimg" type="file" accept="image/*" class="field"><textarea id="asteps" class="field" placeholder="Terms / Instructions"></textarea><button type="button" onclick="addCampaign()" class="btn blue full">Add Campaign</button></div><div class="panel"><h2>Website Settings</h2><input id="telegram" class="field" value="${settings.telegramUrl||''}" placeholder="Telegram URL"><button type="button" onclick="saveSettings()" class="btn tg full">Save Telegram Link</button></div></div><div class="panel"><h2>Users Manage</h2><table class="table"><tr><th>User</th><th>Balance</th><th>Role</th><th>Actions</th></tr>${users.map(u=>`<tr><td>${u.name||'-'}<br><small>${u.email||u.id}</small></td><td>₹${u.balance||0}</td><td>${u.role||'user'}</td><td><input id="bal_${u.id}" type="number" class="field" style="max-width:120px" placeholder="Amount"><button type="button" class="btn green" onclick="addBal('${u.id}')">Add</button> <button type="button" class="btn orange" onclick="setBal('${u.id}')">Set</button> <button type="button" class="btn blue" onclick="roleUser('${u.id}','${(u.role||'user')==='admin'?'user':'admin'}')">Make ${(u.role||'user')==='admin'?'User':'Admin'}</button></td></tr>`).join('')||'<tr><td colspan="4">No users found</td></tr>'}</table></div><div class="panel"><h2>Lead Approval</h2><table class="table"><tr><th>Offer/User</th><th>UPI</th><th>Reward</th><th>Status</th><th>Action</th></tr>${submissions.map(s=>`<tr><td>${s.campaignTitle||s.campaignId||s.campaign}<br><small>${s.email||s.userId||s.publisherId||'-'}</small></td><td>${s.upi||'-'}</td><td>₹${s.reward||0}</td><td><span class="status ${s.status||'pending'}">${s.status||'pending'}</span></td><td><button type="button" class="btn green" onclick="lead('${s.id}','${s._collection}','approved','${s.userId||s.publisherId||''}',${Number(s.reward||0)})">Approve</button> <button type="button" class="btn red" onclick="lead('${s.id}','${s._collection}','rejected','',0)">Reject</button> <button type="button" class="btn red" onclick="delDoc('${s.id}','${s._collection}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="5">No leads found</td></tr>'}</table></div><div class="panel"><h2>Withdraw Approval</h2><table class="table"><tr><th>User</th><th>UPI</th><th>Amount</th><th>Status</th><th>Action</th></tr>${withdraws.map(w=>`<tr><td>${w.name||w.email||w.userId}</td><td>${w.upi||'-'}</td><td>₹${w.amount||0}</td><td><span class="status ${w.status||'pending'}">${w.status||'pending'}</span></td><td><button type="button" class="btn green" onclick="upd('${w.id}','${w._collection}','approved')">Approve</button> <button type="button" class="btn red" onclick="upd('${w.id}','${w._collection}','rejected')">Reject</button> <button type="button" class="btn red" onclick="delDoc('${w.id}','${w._collection}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="5">No withdraws</td></tr>'}</table></div><div class="panel"><h2>Smart Links</h2><table class="table"><tr><th>Slug</th><th>URL</th><th>Action</th></tr>${smartLinks.map(l=>`<tr><td>${l.slug||l.id}</td><td>${l.url||l.destinationUrl||l.campaignId||'-'}</td><td><button type="button" class="btn red" onclick="delDoc('${l.id}','smart_links')">Delete</button></td></tr>`).join('')||'<tr><td colspan="3">No smart links found</td></tr>'}</table></div><div class="panel"><h2>Manage Campaigns</h2><div class="offers">${offerCards(campaigns,true)}</div></div>`)};
async function refresh(){await loadData();window.renderPage()}
window.saveSettings=async()=>{await setDoc(doc(db,'settings','main'),{telegramUrl:telegram.value},{merge:true});localStorage.setItem('telegramUrl',telegram.value);alert('Saved');refresh()};
window.addCampaign=async()=>{let url='',f=aimg.files[0];if(f){let r=ref(storage,'campaigns/'+Date.now()+'-'+f.name);await uploadBytes(r,f);url=await getDownloadURL(r)}await addDoc(collection(db,'campaigns'),{title:atitle.value,reward:Number(areward.value),userReward:Number(areward.value),destinationUrl:adestination.value,category:acat.value,steps:asteps.value,image:url,status:'active',createdAt:Date.now()});alert('Campaign added');refresh()};
window.lead=async(id,col,status,uid,reward)=>{await updateDoc(doc(db,col,id),{status,updatedAt:Date.now()});if(status==='approved'&&uid&&reward){const u=users.find(x=>x.id===uid);await setDoc(doc(db,'users',uid),{balance:Number(u?.balance||0)+Number(reward)},{merge:true});}alert('Updated');refresh()};
window.upd=async(id,col,status)=>{await updateDoc(doc(db,col,id),{status,updatedAt:Date.now()});alert('Updated');refresh()};
window.delDoc=async(id,col)=>{if(confirm('Delete permanently?')){await deleteDoc(doc(db,col,id));alert('Deleted');refresh()}};
window.addBal=async(uid)=>{let u=users.find(x=>x.id===uid),a=Number(document.getElementById('bal_'+uid).value||0);await setDoc(doc(db,'users',uid),{balance:Number(u?.balance||0)+a},{merge:true});refresh()};
window.setBal=async(uid)=>{let a=Number(document.getElementById('bal_'+uid).value||0);await setDoc(doc(db,'users',uid),{balance:a},{merge:true});refresh()};
window.roleUser=async(uid,role)=>{await setDoc(doc(db,'users',uid),{role},{merge:true});refresh()};
window.toggleCampaign=async(id,status)=>{await updateDoc(doc(db,'campaigns',id),{status});refresh()};
window.deleteCampaign=async(id)=>{if(confirm('Campaign delete?')){await deleteDoc(doc(db,'campaigns',id));refresh()}};init();</script></body></html>
