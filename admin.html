<!DOCTYPE html>
<html>
<head>
<title>Admin Panel PRO</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
background:#0b1220;
color:white;
}

.sidebar{
width:240px;
height:100vh;
background:#111827;
padding:20px;
position:fixed;
}

.sidebar button{
width:100%;
padding:10px;
margin:8px 0;
background:#1f2937;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.main{
margin-left:260px;
padding:20px;
width:100%;
}

.section{display:none;}
.active{display:block;}

.card{
background:#111827;
padding:15px;
margin:10px 0;
border-radius:10px;
border:1px solid #1f2937;
}

.btn{
padding:6px 10px;
margin-right:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Admin</h2>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('users')">Users</button>
<button onclick="show('withdraw')">Withdraw</button>
<button onclick="show('campaigns')">Campaigns</button>
<button onclick="show('reports')">Reports</button>
</div>

<div class="main">

<div id="dashboard" class="section active">
<h2>📊 Dashboard</h2>
<div id="stats"></div>
</div>

<div id="users" class="section">
<h2>Users</h2>
<div id="userList"></div>
</div>

<div id="withdraw" class="section">
<h2>Withdraw Requests</h2>
<div id="withdrawList"></div>
</div>

<div id="campaigns" class="section">
<h2>Campaigns</h2>
<div id="campaignList"></div>
</div>

<div id="reports" class="section">
<h2>Reports</h2>
<div id="reportList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
increment,
addDoc
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
authDomain: "effortless-earn-7f39e.firebaseapp.com",
projectId: "effortless-earn-7f39e",
storageBucket: "effortless-earn-7f39e.appspot.com",
messagingSenderId: "554178513766",
appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* NAV */
window.show=(id)=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
};

/* DASHBOARD */
async function loadStats(){

const users=await getDocs(collection(db,"users"));
const withdraw=await getDocs(collection(db,"withdrawals"));
const reports=await getDocs(collection(db,"reports"));

let pending=0;
let payout=0;

withdraw.forEach(d=>{
let x=d.data();
if(x.status==="pending") pending++;
if(x.status==="approved") payout+=Number(x.amount);
});

document.getElementById("stats").innerHTML=`
<div class="card">Users: ${users.size}</div>
<div class="card">Withdraw: ${withdraw.size}</div>
<div class="card">Reports: ${reports.size}</div>
<div class="card">Pending: ${pending}</div>
<div class="card">Payout: ₹${payout}</div>
`;
}

/* USERS */
async function loadUsers(){
const snap=await getDocs(collection(db,"users"));

let html="";
snap.forEach(d=>{
html+=`<div class="card">${d.id}</div>`;
});

document.getElementById("userList").innerHTML=html;
}

/* WITHDRAW */
async function loadWithdraw(){
const snap=await getDocs(collection(db,"withdrawals"));

let html="";

snap.forEach(d=>{
let w=d.data();

html+=`
<div class="card">
<p>${w.userId}</p>
<p>₹${w.amount}</p>
<p>${w.status}</p>

<button onclick="approve('${d.id}','${w.userId}',${w.amount})">Approve</button>
<button onclick="reject('${d.id}')">Reject</button>
</div>
`;
});

document.getElementById("withdrawList").innerHTML=html;
}

/* =========================
   🔥 PATCH ADDED (IMPORTANT)
========================= */

/* FRAUD LOG (SAFE ADD) */
async function logFraud(userId,reason){

try{
await addDoc(collection(db,"fraud_logs"),{
userId,
reason,
time:Date.now(),
status:"flagged"
});
}catch(e){
console.log("fraud log error",e);
}

}

/* APPROVE */
window.approve=async function(id,userId,amount){

await updateDoc(doc(db,"withdrawals",id),{
status:"approved"
});

/* balance cut */
await updateDoc(doc(db,"users",userId),{
balance: increment(-amount)
});

/* report add */
await addDoc(collection(db,"reports"),{
type:"WITHDRAW_APPROVED",
userId,
amount,
status:"success",
time:Date.now()
});

/* optional fraud check */
logFraud(userId,"withdraw approved");

alert("Approved");
loadWithdraw();
loadStats();
loadReports();
};

/* REJECT */
window.reject=async function(id){

await updateDoc(doc(db,"withdrawals",id),{
status:"rejected"
});

await addDoc(collection(db,"reports"),{
type:"WITHDRAW_REJECTED",
withdrawId:id,
status:"failed",
time:Date.now()
});

alert("Rejected");
loadWithdraw();
loadReports();
};

/* CAMPAIGNS */
async function loadCampaigns(){
const snap=await getDocs(collection(db,"campaigns"));

let html="";

snap.forEach(d=>{
html+=`<div class="card">${d.data().title}</div>`;
});

document.getElementById("campaignList").innerHTML=html;
}

/* REPORTS */
async function loadReports(){
const snap=await getDocs(collection(db,"reports"));

let html="";

snap.forEach(d=>{
let r=d.data();

html+=`
<div class="card">
<p>${r.type}</p>
<p>${r.offerName || ""}</p>
<p>${r.userId || ""}</p>
<p>₹${r.amount || r.payout || 0}</p>
<p>${r.status}</p>
</div>
`;
});

document.getElementById("reportList").innerHTML=html;
}

/* INIT */
loadStats();
loadUsers();
loadWithdraw();
loadCampaigns();
loadReports();

/* 👇 YAHAN ADD KARNA HAI */

await addDoc(collection(db,"fraud_logs"),{
userId:"test123",
reason:"manual test",
time:Date.now()
});

</script>

</body>
</html>
