<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">
import {init,requireLogin,shell,profile,campaigns,submissions,withdraws,users,support,loadData,offerCards,money,safe,toast,setLeadStatus} from './app.js';
import {db,storage} from './firebase.js';
import {collection,addDoc,doc,updateDoc,deleteDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import {ref,uploadBytes,getDownloadURL} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';
window.renderPage=()=>{if(!requireLogin())return;if(profile?.role!=='admin'){shell('admin',`<div class="panel"><h2>Admin Only</h2><p>Firestore users collection me apne account ka <b>role</b> = <b>admin</b> set karo.</p></div>`);return;}const totalRev=submissions.filter(x=>x.status==='approved').reduce((a,b)=>a+Number(b.reward||0),0),profit=submissions.filter(x=>x.status==='approved').reduce((a,b)=>a+Number(b.profit||0),0);shell('admin',`<div class="banner"><b>Advanced Admin Control</b><br><small>Offers, leads, withdrawals, users and support access in one place.</small></div><div class="stats"><div class="stat"><span class="muted">Campaigns</span><h2>${campaigns.length}</h2></div><div class="stat"><span class="muted">Leads</span><h2>${submissions.length}</h2></div><div class="stat"><span class="muted">Revenue</span><h2>${money(totalRev)}</h2></div><div class="stat"><span class="muted">Profit</span><h2>${money(profit)}</h2></div></div><div class="grid2"><div class="panel"><h2>Add Campaign</h2><div class="adminform"><input id="atitle" class="field" placeholder="Campaign Title"><input id="areward" type="number" class="field" placeholder="User Reward"><input id="apayout" type="number" class="field" placeholder="Company Payout"><input id="aslug" class="field" placeholder="Slug / Tracking ID"><input id="aurl" class="field wide" placeholder="Destination URL"><select id="acat" class="field"><option>Banking</option><option>Survey</option><option>Crypto</option><option>Install</option><option>Shopping</option><option>Demat</option><option>Gaming</option><option>Finance</option></select><select id="astatus" class="field"><option>active</option><option>paused</option></select><input id="aimg" type="file" accept="image/*" class="field wide"><textarea id="asteps" class="field wide" rows="5" placeholder="Terms / Worker Instructions"></textarea><button type="button" onclick="addCampaign()" class="btn blue wide">Add Campaign</button></div></div><div class="panel"><h2>Quick Tools</h2><div class="grid2"><button type="button" class="btn light" onclick="location.reload()">Refresh Data</button><button type="button" class="btn orange" onclick="exportCSV()">Export Leads CSV</button></div><p class="muted">Note: 50k/day load ke liye Firestore rules, indexes, hosting cache aur pagination important hai. Is code me full data ke bajay limit/pagination style loading rakha hai.</p></div></div><div class="panel"><h2>Lead Approval</h2><div class="tablewrap"><table class="table"><tr><th>Offer</th><th>Email</th><th>UPI</th><th>Payout</th><th>Status</th><th>Proof</th><th>Action</th></tr>${submissions.map(s=>`<tr><td>${safe(s.campaignTitle||s.campaign)}</td><td>${safe(s.email)}</td><td>${safe(s.upi||'-')}</td><td>${money(s.reward)}</td><td><span class="status ${safe(s.status||'pending')}">${safe(s.status||'pending')}</span></td><td>${s.proof?`<a target="_blank" href="${s.proof}">View</a>`:'-'}</td><td><button type="button" class="btn green" onclick="lead('${s.id}','approved')">Approve</button> <button type="button" class="btn red" onclick="lead('${s.id}','rejected')">Reject</button></td></tr>`).join('')}</table></div></div><div class="grid2"><div class="panel"><h2>Withdraw Approval</h2><div class="tablewrap"><table class="table"><tr><th>Name</th><th>UPI</th><th>Amount</th><th>Status</th><th>Action</th></tr>${withdraws.map(w=>`<tr><td>${safe(w.name)}</td><td>${safe(w.upi)}</td><td>${money(w.amount)}</td><td><span class="status ${safe(w.status||'pending')}">${safe(w.status||'pending')}</span></td><td><button type="button" class="btn green" onclick="withdraw('${w.id}','approved')">Approve</button> <button type="button" class="btn red" onclick="withdraw('${w.id}','rejected')">Reject</button></td></tr>`).join('')}</table></div></div><div class="panel"><h2>Users</h2><div class="tablewrap"><table class="table"><tr><th>Name</th><th>Email</th><th>Balance</th><th>Role</th></tr>${users.map(u=>`<tr><td>${safe(u.name)}</td><td>${safe(u.email)}</td><td>${money(u.balance)}</td><td>${safe(u.role||'user')}</td></tr>`).join('')}</table></div></div></div><div class="panel"><h2>Manage Campaigns</h2><div class="offers">${campaigns.map(d=>`<div class="offer"><div class="offerhead"><img src="${safe(d.image||'')}"><div><h3>${safe(d.title)}</h3><p class="muted">${safe(d.category)}</p></div></div><div class="earn"><span>Reward</span><span>${money(d.reward)}</span></div><button type="button" class="btn orange full" onclick="toggleCampaign('${d.id}','${d.status==='paused'?'active':'paused'}')">${d.status==='paused'?'Activate':'Pause'}</button><button type="button" class="btn red full" style="margin-top:8px" onclick="removeCampaign('${d.id}')">Delete</button></div>`).join('')}</div></div>`)};
window.addCampaign=async()=>{try{let f=aimg.files[0],url='';if(f){let r=ref(storage,'campaigns/'+Date.now()+'-'+f.name);await uploadBytes(r,f);url=await getDownloadURL(r)}await addDoc(collection(db,'campaigns'),{title:atitle.value.trim(),reward:Number(areward.value||0),companyPayout:Number(apayout.value||0),profit:Number(apayout.value||0)-Number(areward.value||0),category:acat.value,slug:aslug.value.trim(),destinationUrl:aurl.value.trim(),steps:asteps.value,image:url,status:astatus.value,createdAt:Date.now()});toast('Campaign added');setTimeout(()=>location.reload(),700)}catch(e){toast(e.message,'red')}};
window.lead=async(id,status)=>{try{await setLeadStatus(id,status);toast('Lead updated');setTimeout(()=>location.reload(),700)}catch(e){toast(e.message,'red')}};
window.withdraw=async(id,status)=>{await updateDoc(doc(db,'withdraws',id),{status,updatedAt:Date.now()});toast('Withdraw updated');setTimeout(()=>location.reload(),700)};
window.toggleCampaign=async(id,status)=>{await updateDoc(doc(db,'campaigns',id),{status,updatedAt:Date.now()});location.reload()};
window.removeCampaign=async(id)=>{if(confirm('Delete campaign?')){await deleteDoc(doc(db,'campaigns',id));location.reload()}};
window.exportCSV=()=>{let csv='Offer,Email,UPI,Reward,Status,Time\n'+submissions.map(s=>[s.campaignTitle,s.email,s.upi,s.reward,s.status,new Date(s.time||0).toLocaleString()].map(x=>`"${String(x||'').replaceAll('"','""')}"`).join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='leads.csv';a.click()};
init();</script></body></html>
