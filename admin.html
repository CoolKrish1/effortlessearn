<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><div id="modal" class="modal"><div class="modalbox"><button type="button" class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div><script type="module">
import {init,requireLogin,shell,profile,campaigns,submissions,withdraws,users,smartLinks,settings,loadData,offerCards,isAdmin,getGoals,money,toast,modal} from './app.js';
import {db,storage} from './firebase.js';import {collection,addDoc,doc,setDoc,updateDoc,deleteDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';import {ref,uploadBytes,getDownloadURL} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';
async function refresh(){await loadData();window.renderPage()}
function rowsLeads(){return submissions.map(s=>`<tr><td><b>${s.campaignTitle||s.campaignId||s.campaign}</b><br><small>${s.goalName||'-'} • ${s.email||s.userId||s.publisherId||'-'}</small></td><td>${s.upi||'-'}</td><td>₹${money(s.reward||0)}<br><small>Profit ₹${money(s.affiliateProfit||0)}</small></td><td><span class="status ${s.status||'pending'}">${s.status||'pending'}</span></td><td><button type="button" class="btn green" onclick="lead('${s.id}','${s._collection}','approved','${s.userId||s.publisherId||''}',${Number(s.reward||0)})">Approve</button> <button type="button" class="btn red" onclick="lead('${s.id}','${s._collection}','rejected','',0)">Reject</button> <button type="button" class="btn red" onclick="delDoc('${s.id}','${s._collection}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="5">No leads found</td></tr>'}
window.renderPage=()=>{if(!requireLogin())return;if(!isAdmin()){shell('admin',`<div class="panel"><h2>Admin only</h2></div>`);return;}shell('admin',`<div class="stats"><div class="stat"><span class="muted">Campaigns</span><h2>${campaigns.length}</h2></div><div class="stat"><span class="muted">Leads</span><h2>${submissions.length}</h2></div><div class="stat"><span class="muted">Withdraws</span><h2>${withdraws.length}</h2></div><div class="stat"><span class="muted">Users</span><h2>${users.length}</h2></div></div><div class="grid2"><div class="panel"><h2>Add Multi-Task Campaign</h2><input id="atitle" class="field" placeholder="Campaign Title"><input id="adestination" class="field" placeholder="Destination URL"><select id="acat" class="field"><option>Banking</option><option>Survey</option><option>Crypto</option><option>Install</option><option>Shopping</option><option>Demat</option></select><input id="aimg" type="file" accept="image/*" class="field"><textarea id="agoals" class="field" rows="4" placeholder="Goals: one per line\nInstall & Login | 0\nRetention 5 Days | 260"></textarea><textarea id="asteps" class="field" rows="4" placeholder="Terms / Worker Instructions"></textarea><button type="button" onclick="addCampaign()" class="btn blue full">Add Campaign</button></div><div class="panel"><h2>Website Settings</h2><input id="telegram" class="field" value="${settings.telegramUrl||''}" placeholder="Telegram URL"><button type="button" onclick="saveSettings()" class="btn tg full">Save Telegram Link</button></div></div><div class="panel"><h2>Users Manage</h2><div class="tablewrap"><table class="table"><tr><th>User</th><th>Balance</th><th>Role</th><th>Actions</th></tr>${users.map(u=>`<tr><td>${u.name||'-'}<br><small>${u.email||u.id}</small></td><td>₹${money(u.balance||0)}</td><td>${u.role||'user'}</td><td><input id="bal_${u.id}" type="number" class="field" style="max-width:120px" placeholder="Amount"><button type="button" class="btn green" onclick="addBal('${u.id}')">Add</button> <button type="button" class="btn orange" onclick="setBal('${u.id}')">Set</button> <button type="button" class="btn blue" onclick="roleUser('${u.id}','${(u.role||'user')==='admin'?'user':'admin'}')">Make ${(u.role||'user')==='admin'?'User':'Admin'}</button></td></tr>`).join('')||'<tr><td colspan="4">No users found</td></tr>'}</table></div></div><div class="panel"><h2>Lead Approval</h2><div class="tablewrap"><table class="table"><tbody id="leadRows"><tr><th>Offer/User</th><th>UPI</th><th>Reward</th><th>Status</th><th>Action</th></tr>${rowsLeads()}</tbody></table></div></div><div class="panel"><h2>Withdraw Approval</h2><div class="tablewrap"><table class="table"><tr><th>User</th><th>UPI</th><th>Amount</th><th>Status</th><th>Action</th></tr>${withdraws.map(w=>`<tr><td>${w.name||w.email||w.userId}</td><td>${w.upi||'-'}</td><td>₹${money(w.amount||0)}</td><td><span class="status ${w.status||'pending'}">${w.status||'pending'}</span></td><td><button type="button" class="btn green" onclick="upd('${w.id}','${w._collection}','approved')">Approve</button> <button type="button" class="btn red" onclick="upd('${w.id}','${w._collection}','rejected')">Reject</button> <button type="button" class="btn red" onclick="delDoc('${w.id}','${w._collection}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="5">No withdraws</td></tr>'}</table></div></div><div class="panel"><h2>Smart Links</h2><div class="tablewrap"><table class="table"><tr><th>Slug</th><th>Campaign</th><th>Action</th></tr>${smartLinks.map(l=>`<tr><td>${l.slug||l.id}</td><td>${l.campaignTitle||l.campaignId||'-'}</td><td><button type="button" class="btn red" onclick="delDoc('${l.id}','smart_links')">Delete</button></td></tr>`).join('')||'<tr><td colspan="3">No smart links found</td></tr>'}</table></div></div><div class="panel"><h2>Manage Campaigns</h2><div class="offers">${offerCards(campaigns,true)}</div></div>`) };
function parseGoals(text){return String(text||'').split('\n').map((line,i)=>{let [name,max]=line.split('|').map(x=>x?.trim());return name?{id:'g'+i,name,maxPayout:Number(max||0),userReward:0,affiliateProfit:Number(max||0)}:null}).filter(Boolean)}
window.saveSettings=async()=>{await setDoc(doc(db,'settings','main'),{telegramUrl:telegram.value},{merge:true});localStorage.setItem('telegramUrl',telegram.value);toast('Saved');refresh()};
window.addCampaign=async()=>{let url='',f=aimg.files[0];if(f){let r=ref(storage,'campaigns/'+Date.now()+'-'+f.name);await uploadBytes(r,f);url=await getDownloadURL(r)}let goals=parseGoals(agoals.value);if(!goals.length)goals=[{id:'g0',name:'Task Complete',maxPayout:0,userReward:0,affiliateProfit:0}];await addDoc(collection(db,'campaigns'),{title:atitle.value,destinationUrl:adestination.value,category:acat.value,steps:asteps.value,instructions:asteps.value,image:url,status:'active',goals,createdAt:Date.now()});toast('Campaign added');refresh()};
window.editCampaignAdmin=(id)=>{const c=campaigns.find(x=>x.id===id); if(!c)return; modal(`<h2>Edit Campaign</h2><input id="etitle" class="field" value="${c.title||''}"><input id="edestination" class="field" value="${c.destinationUrl||''}" placeholder="Destination URL"><textarea id="egoals" class="field" rows="5">${getGoals(c).map(g=>`${g.name} | ${g.maxPayout}`).join('\n')}</textarea><textarea id="esteps" class="field" rows="4">${c.steps||c.instructions||''}</textarea><button type="button" class="btn full" onclick="saveCampaignAdmin('${id}')">Save</button>`)};
window.saveCampaignAdmin=async(id)=>{await updateDoc(doc(db,'campaigns',id),{title:etitle.value,destinationUrl:edestination.value,goals:parseGoals(egoals.value),steps:esteps.value,instructions:esteps.value,updatedAt:Date.now()});closeModal();toast('Campaign updated');refresh()};
window.lead=async(id,col,status,uid,reward)=>{await updateDoc(doc(db,col,id),{status,updatedAt:Date.now()});if(status==='approved'&&uid&&reward){const u=users.find(x=>x.id===uid);await setDoc(doc(db,'users',uid),{balance:Number(u?.balance||0)+Number(reward)},{merge:true});}toast('Updated');refresh()};
window.upd=async(id,col,status)=>{await updateDoc(doc(db,col,id),{status,updatedAt:Date.now()});toast('Updated');refresh()};
window.delDoc=async(id,col)=>{if(confirm('Delete permanently?')){await deleteDoc(doc(db,col,id));toast('Deleted');refresh()}};
window.addBal=async(uid)=>{let u=users.find(x=>x.id===uid),a=Number(document.getElementById('bal_'+uid).value||0);await setDoc(doc(db,'users',uid),{balance:Number(u?.balance||0)+a},{merge:true});refresh()};
window.setBal=async(uid)=>{let a=Number(document.getElementById('bal_'+uid).value||0);await setDoc(doc(db,'users',uid),{balance:a},{merge:true});refresh()};
window.roleUser=async(uid,role)=>{await setDoc(doc(db,'users',uid),{role},{merge:true});refresh()};
window.toggleCampaign=async(id,status)=>{await updateDoc(doc(db,'campaigns',id),{status});refresh()};
window.deleteCampaign=async(id)=>{if(confirm('Campaign delete?')){await deleteDoc(doc(db,'campaigns',id));refresh()}};
init();</script></body></html>
