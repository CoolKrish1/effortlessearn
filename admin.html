<!DOCTYPE html>
<html>
<head>
<title>FULL ADMIN DASHBOARD</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:#111;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
cursor:pointer;
background:#333;
color:white;
border-radius:5px;
}

.sidebar button:hover{
background:#555;
}

/* CONTENT */
.content{
flex:1;
background:#f5f5f5;
padding:20px;
overflow:auto;
}

.page{
display:none;
}

.active{
display:block;
}

/* CARD */
.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* BUTTONS */
.approve{
background:green;
color:white;
padding:8px;
border:none;
cursor:pointer;
margin-right:5px;
}

.reject{
background:red;
color:white;
padding:8px;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🔥 Admin Panel</h2>

<button onclick="show('dashboard')">📊 Dashboard</button>
<button onclick="show('withdraw')">💰 Withdraw</button>
<button onclick="show('users')">👤 Users</button>
<button onclick="show('wallets')">💳 Wallets</button>
<button onclick="show('campaigns')">📦 Campaigns</button>

</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
<h2>📊 Dashboard</h2>

<div class="card">
<p>Total Users: <span id="totalUsers">0</span></p>
<p>Total Withdrawals: <span id="totalWithdraw">0</span></p>
<p>Total Payout: ₹<span id="totalPayout">0</span></p>
<p>Pending Requests: <span id="pending">0</span></p>
</div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="page">
<h2>💰 Withdraw Requests</h2>
<div id="withdrawList">Loading...</div>
</div>

<!-- USERS -->
<div id="users" class="page">
<h2>👤 Users</h2>
<div id="userList">Loading...</div>
</div>

<!-- WALLETS -->
<div id="wallets" class="page">
<h2>💳 Wallets</h2>
<div id="walletList">Loading...</div>
</div>

<!-- CAMPAIGNS -->
<div id="campaigns" class="page">
<h2>📦 Campaigns</h2>
<div id="campaignList">Loading...</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
getDoc,
increment
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyD...",
 authDomain: "effortless-earn-7f39e.firebaseapp.com",
 projectId: "effortless-earn-7f39e",
 storageBucket: "effortless-earn-7f39e.firebasestorage.app",
 messagingSenderId: "554178513766",
 appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//
// PAGE SWITCH
//
window.show = function(page){

  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('active');
  });

  document.getElementById(page).classList.add('active');
};

//
// LOAD DASHBOARD STATS
//
async function loadStats(){

  const users = await getDocs(collection(db,"wallets"));
  const withdraw = await getDocs(collection(db,"withdrawals"));

  let payout = 0;
  let pending = 0;

  withdraw.forEach(d=>{
    const data = d.data();

    if(data.status==="approved"){
      payout += Number(data.amount);
    }

    if(data.status==="pending"){
      pending++;
    }
  });

  document.getElementById("totalUsers").innerText = users.size;
  document.getElementById("totalWithdraw").innerText = withdraw.size;
  document.getElementById("totalPayout").innerText = payout;
  document.getElementById("pending").innerText = pending;
}

//
// WITHDRAW LIST
//
async function loadWithdraw(){

  const snap = await getDocs(collection(db,"withdrawals"));

  let html="";

  snap.forEach(d=>{

    const data = d.data();

    html += `
      <div class="card">
        <p><b>User:</b> ${data.userId}</p>
        <p><b>Amount:</b> ₹${data.amount}</p>
        <p><b>UPI:</b> ${data.upi}</p>
        <p><b>Status:</b> ${data.status}</p>

        ${data.status==="pending" ? `
          <button class="approve" onclick="approve('${d.id}')">Approve</button>
          <button class="reject" onclick="reject('${d.id}')">Reject</button>
        ` : ``}
      </div>
    `;
  });

  document.getElementById("withdrawList").innerHTML = html;
}

//
// USERS
//
async function loadUsers(){

  const snap = await getDocs(collection(db,"wallets"));

  let html="";

  snap.forEach(d=>{
    const data = d.data();

    html += `
      <div class="card">
        <p><b>User ID:</b> ${d.id}</p>
        <p><b>Balance:</b> ₹${data.balance}</p>
      </div>
    `;
  });

  document.getElementById("userList").innerHTML = html;
}

//
// WALLET VIEW
//
async function loadWallets(){

  const snap = await getDocs(collection(db,"wallets"));

  let html="";

  snap.forEach(d=>{
    const data = d.data();

    html += `
      <div class="card">
        <p><b>User:</b> ${d.id}</p>
        <p><b>Balance:</b> ₹${data.balance}</p>
      </div>
    `;
  });

  document.getElementById("walletList").innerHTML = html;
}

//
// CAMPAIGNS VIEW
//
async function loadCampaigns(){

  const snap = await getDocs(collection(db,"campaigns"));

  let html="";

  snap.forEach(d=>{
    const data = d.data();

    html += `
      <div class="card">
        <p><b>Title:</b> ${data.title}</p>
        <p><b>Reward:</b> ₹${data.reward}</p>
        <p><b>Status:</b> ${data.status}</p>
      </div>
    `;
  });

  document.getElementById("campaignList").innerHTML = html;
}

//
// APPROVE
//
window.approve = async function(id){

  const ref = doc(db,"withdrawals",id);
  const snap = await getDoc(ref);

  const data = snap.data();

  const walletRef = doc(db,"wallets",data.userId);

  await updateDoc(ref,{status:"approved"});
  await updateDoc(walletRef,{balance:increment(-data.amount)});

  loadWithdraw();
  loadStats();
};

//
// REJECT
//
window.reject = async function(id){

  await updateDoc(doc(db,"withdrawals",id),{
    status:"rejected"
  });

  loadWithdraw();
  loadStats();
};

loadStats();
loadWithdraw();
loadUsers();
loadWallets();
loadCampaigns();

</script>

</body>
</html>
