<!DOCTYPE html>
<html>
<head>
<title>Admin Panel PRO MAX</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
background:#0b1220;
color:white;
}

.sidebar{
width:240px;
height:100vh;
background:#111827;
padding:20px;
position:fixed;
}

.sidebar button{
width:100%;
padding:10px;
margin:8px 0;
background:#1f2937;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.main{
margin-left:260px;
padding:20px;
width:100%;
}

.section{display:none;}
.active{display:block;}

.card{
background:#111827;
padding:15px;
margin:10px 0;
border-radius:10px;
border:1px solid #1f2937;
}

input{
padding:8px;
margin:5px 0;
width:200px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Admin Panel</h2>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('users')">Users</button>
<button onclick="show('withdraw')">Withdraw</button>
<button onclick="show('campaigns')">Campaigns</button>
<button onclick="show('applications')">Applications</button>
<button onclick="show('reports')">Reports</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<!-- USERS -->
<div id="users" class="section">
<h2>Users</h2>
<div id="userList"></div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="section">
<h2>Withdraw Requests</h2>
<div id="withdrawList"></div>
</div>

<!-- CAMPAIGNS -->
<div id="campaigns" class="section">
<h2>Campaign Management</h2>

<div class="card">
<h3>Add Campaign</h3>
<input id="title" placeholder="Title">
<input id="reward" placeholder="Reward">
<button onclick="addCampaign()">Add</button>
</div>

<div id="campaignList"></div>
</div>

<!-- APPLICATIONS -->
<div id="applications" class="section">
<h2>Campaign Applications</h2>
<div id="appList"></div>
</div>

<!-- REPORTS -->
<div id="reports" class="section">
<h2>Reports</h2>
<div id="reportList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
increment,
addDoc
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
authDomain: "effortless-earn-7f39e.firebaseapp.com",
projectId: "effortless-earn-7f39e",
storageBucket: "effortless-earn-7f39e.appspot.com",
messagingSenderId: "554178513766",
appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* NAV */
window.show=(id)=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
};

/* DASHBOARD */
async function loadStats(){

const users=await getDocs(collection(db,"users"));
const withdraw=await getDocs(collection(db,"withdrawals"));
const reports=await getDocs(collection(db,"reports"));
const apps=await getDocs(collection(db,"campaign_apps"));

let pending=0;
let payout=0;

withdraw.forEach(d=>{
let x=d.data();
if(x.status==="pending") pending++;
if(x.status==="approved") payout+=Number(x.amount);
});

document.getElementById("stats").innerHTML=`
<div class="card">Users: ${users.size}</div>
<div class="card">Withdraw: ${withdraw.size}</div>
<div class="card">Campaign Apps: ${apps.size}</div>
<div class="card">Reports: ${reports.size}</div>
<div class="card">Pending: ${pending}</div>
<div class="card">Payout: ₹${payout}</div>
`;
}

/* USERS */
async function loadUsers(){
const snap=await getDocs(collection(db,"users"));

let html="";
snap.forEach(d=>{
html+=`<div class="card">${d.id}</div>`;
});

document.getElementById("userList").innerHTML=html;
}

/* WITHDRAW */
async function loadWithdraw(){
const snap=await getDocs(collection(db,"withdrawals"));

let html="";

snap.forEach(d=>{
let w=d.data();

html+=`
<div class="card">
<p>User: ${w.userId}</p>
<p>₹${w.amount}</p>
<p>${w.status}</p>

<button onclick="approveWithdraw('${d.id}','${w.userId}',${w.amount})">Approve</button>
<button onclick="rejectWithdraw('${d.id}')">Reject</button>
</div>
`;
});

document.getElementById("withdrawList").innerHTML=html;
}

/* CAMPAIGN ADD */
window.addCampaign = async function(){

const title=document.getElementById("title").value;
const reward=document.getElementById("reward").value;

await addDoc(collection(db,"campaigns"),{
title,
reward,
status:"active",
time:Date.now()
});

alert("Campaign Added");
loadCampaigns();
};

/* CAMPAIGN LIST */
async function loadCampaigns(){

const snap=await getDocs(collection(db,"campaigns"));

let html="";

snap.forEach(d=>{
html+=`<div class="card">${d.data().title} - ₹${d.data().reward}</div>`;
});

document.getElementById("campaignList").innerHTML=html;
}

/* USER APPLICATIONS */
async function loadApplications(){

const snap=await getDocs(collection(db,"campaign_apps"));

let html="";

snap.forEach(d=>{
let a=d.data();

html+=`
<div class="card">
<p>User: ${a.userId}</p>
<p>Campaign: ${a.campaignTitle}</p>
<p>Status: ${a.status}</p>

<button onclick="approveApp('${d.id}','${a.userId}',${a.reward})">Approve</button>
<button onclick="rejectApp('${d.id}')">Reject</button>
</div>
`;
});

document.getElementById("appList").innerHTML=html;
}

/* APPROVE CAMPAIGN */
window.approveApp = async function(id,userId,reward){

await updateDoc(doc(db,"campaign_apps",id),{
status:"approved"
});

await updateDoc(doc(db,"users",userId),{
balance: increment(reward)
});

await addDoc(collection(db,"reports"),{
type:"CAMPAIGN_APPROVED",
userId,
amount:reward,
status:"success",
time:Date.now()
});

loadApplications();
loadStats();
};

/* REJECT CAMPAIGN */
window.rejectApp = async function(id){

await updateDoc(doc(db,"campaign_apps",id),{
status:"rejected"
});

await addDoc(collection(db,"reports"),{
type:"CAMPAIGN_REJECTED",
appId:id,
status:"failed",
time:Date.now()
});

loadApplications();
};

/* WITHDRAW APPROVE */
window.approveWithdraw = async function(id,userId,amount){

await updateDoc(doc(db,"withdrawals",id),{
status:"approved"
});

await updateDoc(doc(db,"users",userId),{
balance: increment(-amount)
});

await addDoc(collection(db,"reports"),{
type:"WITHDRAW_APPROVED",
userId,
amount,
status:"success",
time:Date.now()
});

loadWithdraw();
loadStats();
};

/* WITHDRAW REJECT */
window.rejectWithdraw = async function(id){

await updateDoc(doc(db,"withdrawals",id),{
status:"rejected"
});

await addDoc(collection(db,"reports"),{
type:"WITHDRAW_REJECTED",
withdrawId:id,
status:"failed",
time:Date.now()
});

loadWithdraw();
};

/* REPORTS */
async function loadReports(){

const snap=await getDocs(collection(db,"reports"));

let html="";

snap.forEach(d=>{
let r=d.data();

html+=`
<div class="card">
<p>${r.type}</p>
<p>${r.userId || ""}</p>
<p>₹${r.amount || 0}</p>
<p>${r.status}</p>
</div>
`;
});

document.getElementById("reportList").innerHTML=html;
}

/* INIT */
loadStats();
loadUsers();
loadWithdraw();
loadCampaigns();
loadApplications();
loadReports();

</script>

</body>
</html>
