<!DOCTYPE html>
<html>
<head>
<title>Admin Hub</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

nav button{
padding:10px;
margin-right:10px;
cursor:pointer;
}

.tab{
display:none;
}

.active{
display:block;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
}

.approve{background:green;color:white;}
.reject{background:red;color:white;}
</style>
</head>

<body>

<h1>🔥 Admin Hub System</h1>

<nav>
<button onclick="showTab('dashboard')">📊 Dashboard</button>
<button onclick="showTab('withdraw')">💰 Withdraw</button>
<button onclick="showTab('users')">👤 Users</button>
</nav>

<!-- DASHBOARD -->
<div id="dashboard" class="tab active">
  <h2>Analytics</h2>

  <div class="card">
    <p>Total Users: <span id="usersCount">0</span></p>
    <p>Total Withdrawals: <span id="withdrawCount">0</span></p>
    <p>Total Payout: ₹<span id="payout">0</span></p>
  </div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="tab">
  <h2>Withdraw Requests</h2>
  <div id="withdrawList">Loading...</div>
</div>

<!-- USERS -->
<div id="users" class="tab">
  <h2>User History</h2>
  <div id="userList">Loading...</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
getDoc,
increment
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyDxd...",
 authDomain: "effortless-earn-7f39e.firebaseapp.com",
 projectId: "effortless-earn-7f39e",
 storageBucket: "effortless-earn-7f39e.firebasestorage.app",
 messagingSenderId: "554178513766",
 appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//
// TAB SWITCH
//
window.showTab = function(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
};

//
// LOAD STATS
//
async function loadStats(){

  const users = await getDocs(collection(db,"wallets"));
  const withdraw = await getDocs(collection(db,"withdrawals"));

  let payout = 0;

  withdraw.forEach(d=>{
    if(d.data().status==="approved"){
      payout += Number(d.data().amount);
    }
  });

  document.getElementById("usersCount").innerText = users.size;
  document.getElementById("withdrawCount").innerText = withdraw.size;
  document.getElementById("payout").innerText = payout;
}

//
// WITHDRAW LOAD
//
async function loadWithdraw(){

  const snap = await getDocs(collection(db,"withdrawals"));

  let html="";

  snap.forEach(d=>{

    const data = d.data();

    html += `
      <div class="card">
        <p>User: ${data.userId}</p>
        <p>Amount: ₹${data.amount}</p>
        <p>Status: ${data.status}</p>

        ${data.status==="pending" ? `
          <button class="approve" onclick="approve('${d.id}')">Approve</button>
          <button class="reject" onclick="reject('${d.id}')">Reject</button>
        ` : ``}
      </div>
    `;
  });

  document.getElementById("withdrawList").innerHTML = html;
}

//
// APPROVE
//
window.approve = async function(id){

  const ref = doc(db,"withdrawals",id);
  const snap = await getDoc(ref);

  const data = snap.data();

  const walletRef = doc(db,"wallets",data.userId);

  await updateDoc(ref,{status:"approved"});
  await updateDoc(walletRef,{balance:increment(-data.amount)});

  loadWithdraw();
  loadStats();
};

//
// REJECT
//
window.reject = async function(id){

  await updateDoc(doc(db,"withdrawals",id),{
    status:"rejected"
  });

  loadWithdraw();
  loadStats();
};

loadStats();
loadWithdraw();

</script>

</body>
</html>
