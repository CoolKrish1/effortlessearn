<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><div id="modal" class="modal"><div class="modalbox"><button type="button" class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div><script type="module">
import {init,requireLogin,shell,profile,campaigns,submissions,withdraws,users,smartLinks,revenueShare,offerCards,api} from './app.js';
import {ref,uploadBytes,getDownloadURL} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';
const {db,storage,collection,addDoc,doc,updateDoc,deleteDoc,increment,refresh,baseUrl,safe}=api;
window.renderPage=()=>{if(!requireLogin())return;if(profile?.role!=='admin'){shell('admin',`<div class="panel"><h2>Admin Only</h2><p>Firestore users → apne UID document me <b>role</b> = <b>admin</b> karo.</p></div>`);return;}
shell('admin',`<div class="hero"><b>Advanced Admin Control</b><span>Campaigns, leads, smart links, users, payout sab ek jagah.</span></div><div class="stats"><div class="stat"><span>Campaigns</span><h2>${campaigns.length}</h2></div><div class="stat"><span>Leads</span><h2>${submissions.length}</h2></div><div class="stat"><span>Withdrawals</span><h2>${withdraws.length}</h2></div><div class="stat"><span>Users</span><h2>${users.length}</h2></div></div><div class="grid2"><div class="panel"><h2>Add Campaign</h2><input id="atitle" class="field" placeholder="Campaign title"><input id="areward" type="number" class="field" placeholder="User reward ₹"><input id="apayout" type="number" class="field" placeholder="Company payout ₹"><select id="acat" class="field"><option>Banking</option><option>Shopping</option><option>Survey</option><option>App Install</option><option>Demat</option><option>Other</option></select><input id="aurl" class="field" placeholder="Destination URL"><input id="aimg" type="file" accept="image/*" class="field"><textarea id="asteps" class="field" rows="5" placeholder="Steps / terms"></textarea><button type="button" onclick="addCampaign()" class="btn blue full">Add Campaign</button></div><div class="panel"><h2>Create Smart Link</h2><input id="sname" class="field" placeholder="Smart link name"><input id="sslug" class="field" placeholder="Slug e.g. earn-offer"><input id="sdest" class="field" placeholder="Destination URL"><button type="button" onclick="addSmart()" class="btn green full">Create Smart Link</button><hr><h3>Revenue Share</h3>${revenueShare.map(r=>`<div class="mini"><b>${safe(r.slug||r.trackingId||r.id)}</b><span>Reward ₹${r.userReward||0} • Profit ₹${r.profit||0}</span></div>`).join('')||'<p class="muted">No revenue_share data</p>'}</div></div><div class="panel"><h2>Lead Approval</h2><table class="table"><tr><th>Offer</th><th>User</th><th>Reward</th><th>Status</th><th>Action</th></tr>${submissions.map(s=>`<tr><td>${safe(s.campaignTitle||s.campaignId||s.campaign||'-')}</td><td>${safe(s.email||s.userId||'-')}</td><td>₹${s.userReward||s.reward||0}</td><td><span class="status ${s.status||'pending'}">${s.status||'pending'}</span></td><td><button type="button" class="btn green" onclick="lead('${s._col}','${s.id}','approved','${s.userId||''}',${Number(s.userReward||s.reward||0)})">Approve</button> <button type="button" class="btn red" onclick="lead('${s._col}','${s.id}','rejected','${s.userId||''}',0)">Reject</button></td></tr>`).join('')}</table></div><div class="panel"><h2>Smart Links</h2><table class="table"><tr><th>Name</th><th>Link</th><th>Destination</th><th>Action</th></tr>${smartLinks.map(s=>`<tr><td>${safe(s.name||s.slug||s.id)}</td><td><input class="field" value="${baseUrl()}campaign.html?slug=${safe(s.slug||s.id)}" readonly></td><td>${safe(s.destinationUrl||s.url||'-')}</td><td><button type="button" class="btn red" onclick="deleteSmart('${s.id}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="4">No smart links</td></tr>'}</table></div><div class="panel"><h2>Withdraw Approval</h2><table class="table"><tr><th>Name</th><th>UPI</th><th>Amount</th><th>Status</th><th>Action</th></tr>${withdraws.map(w=>`<tr><td>${safe(w.name||w.email||'-')}</td><td>${safe(w.upi||'-')}</td><td>₹${w.amount||0}</td><td><span class="status ${w.status||'pending'}">${w.status||'pending'}</span></td><td><button type="button" class="btn green" onclick="withdraw('${w._col}','${w.id}','approved')">Approve</button> <button type="button" class="btn red" onclick="withdraw('${w._col}','${w.id}','rejected')">Reject</button></td></tr>`).join('')}</table></div><div class="panel"><h2>Manage Campaigns</h2><div class="offers">${offerCards(campaigns,true)}</div></div>`)};
window.addCampaign=async()=>{let url='';let f=aimg.files[0]; if(f){let r=ref(storage,'campaigns/'+Date.now()+'-'+f.name);await uploadBytes(r,f);url=await getDownloadURL(r)} await addDoc(collection(db,'campaigns'),{title:atitle.value,reward:Number(areward.value),userReward:Number(areward.value),companyPayout:Number(apayout.value||0),category:acat.value,destinationUrl:aurl.value,steps:asteps.value,image:url,status:'active',createdAt:Date.now()}); alert('Campaign added'); refresh()};
window.lead=async(col,id,status,uid,reward)=>{await updateDoc(doc(db,col,id),{status,updatedAt:Date.now()}); if(status==='approved'&&uid&&reward>0) await updateDoc(doc(db,'users',uid),{balance:increment(reward)}); alert('Updated'); refresh()};
window.withdraw=async(col,id,status)=>{await updateDoc(doc(db,col,id),{status,updatedAt:Date.now()}); alert('Updated'); refresh()};
window.addSmart=async()=>{await addDoc(collection(db,'smart_links'),{name:sname.value,slug:sslug.value||Date.now().toString(36),destinationUrl:sdest.value,status:'active',createdAt:Date.now()}); alert('Smart link created'); refresh()};
window.deleteSmart=async(id)=>{if(confirm('Delete smart link?')){await deleteDoc(doc(db,'smart_links',id)); refresh()}};
window.toggleCampaign=async(id,status)=>{await updateDoc(doc(db,'campaigns',id),{status}); refresh()};
window.deleteCampaign=async(id)=>{if(confirm('Delete campaign?')){await deleteDoc(doc(db,'campaigns',id)); refresh()}};
init();</script></body></html>
