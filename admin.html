<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex, nofollow"><title>Admin</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><div id="modal" class="modal"><div class="modalbox"><button type="button" class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div><script type="module">
import {init,requireLogin,shell,campaigns,submissions,withdraws,users,smartLinks,settings,loadData,offerCards,isAdmin,getGoals,money,toast,modal,compactDate,downloadCSV} from './app.js';
import {db,storage} from './firebase.js';
import {collection,addDoc,doc,setDoc,updateDoc,deleteDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import {ref,uploadBytes,getDownloadURL} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';
const safe=v=>String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
async function refresh(){await loadData();window.renderPage()}

function fileToDataUrl(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result);
    r.onerror=reject;
    r.readAsDataURL(file);
  });
}
function compressImage(file, maxSize=520, quality=.72){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const scale=Math.min(1,maxSize/Math.max(img.width,img.height));
      const canvas=document.createElement('canvas');
      canvas.width=Math.max(1,Math.round(img.width*scale));
      canvas.height=Math.max(1,Math.round(img.height*scale));
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Image read failed'))};
    img.src=url;
  });
}
async function uploadCampaignImage(file){
  if(!file) return '';
  // Reliable mode: compress in browser and store as Data URL, so Firebase Storage rules cannot block campaign creation.
  try{
    const dataUrl=await compressImage(file);
    toast('Image added');
    return dataUrl;
  }catch(e){
    console.warn('Image compression failed:',e?.message||e);
  }
  // Optional fallback: try Storage only if compression failed. Campaign will still save without image if this fails.
  try{
    const r=ref(storage,'campaigns/'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_'));
    await uploadBytes(r,file);
    return await getDownloadURL(r);
  }catch(e){
    console.warn('Storage upload failed:', e?.message||e);
    toast('Image skipped. Campaign saved.');
    return '';
  }
}

function parseGoals(text){
  return String(text||'').split('\n').map((line,i)=>{
    const parts=line.split('|').map(x=>x.trim());
    if(!parts[0]) return null;
    const max=Number(parts[1]||0), worker=Number(parts[2]||0);
    return {id:'g'+i,name:parts[0],maxPayout:max,userReward:worker,affiliateProfit:Math.max(0,max-worker)};
  }).filter(Boolean)
}
function userNameById(uid){const u=users.find(x=>x.id===uid);return u?.name||u?.email||uid||'-'}
function leadsRows(){return submissions.map(s=>{const uid=s.publisherId||s.affiliateId||s.userId||s.uid||'';return `<tr><td><b>${safe(s.campaignTitle||s.offerName||s.campaignId||'-')}</b><small>${safe(s.goalName||'Task')}</small></td><td><b>${safe(s.name||s.workerName||userNameById(uid))}</b><small>${safe(s.email||uid||'-')}</small></td><td>${safe(s.upi||s.p1||'-')}</td><td><b>${compactDate(s.time||s.createdAt)}</b><small>${safe(s.clickId||'')}</small></td><td>₹${money(s.reward||0)}<small>Profit ₹${money(s.affiliateProfit||0)}</small></td><td><span class="status ${safe(s.status||'pending')}">${safe(s.status||'pending')}</span></td><td><div class="actions"><button type="button" class="btn green" onclick="lead('${s.id}','${s._collection}','approved','${uid}',${Number(s.affiliateProfit||s.profit||0)})">Approve</button><button type="button" class="btn red" onclick="lead('${s.id}','${s._collection}','rejected','',0)">Reject</button><button type="button" class="btn light" onclick="delDoc('${s.id}','${s._collection}')">Delete</button></div></td></tr>`}).join('')||'<tr><td colspan="7">No leads found</td></tr>'}
function withdrawRows(){return withdraws.map(w=>`<tr><td><b>${safe(w.name||w.email||userNameById(w.userId||w.uid||w.publisherId)||'-')}</b><small>${safe(w.email||w.userId||w.uid||'')}</small></td><td>${safe(w.upi||'-')}</td><td><b>${compactDate(w.time||w.createdAt)}</b><small>${safe(w.method||'UPI')}</small></td><td>₹${money(w.amount||0)}</td><td><span class="status ${safe(w.status||'pending')}">${safe(w.status||'pending')}</span><small>${w.balanceDeducted?'Deducted':'Pending deduct'}</small></td><td><div class="actions"><button type="button" class="btn green" onclick="withdrawAction('${w.id}','${w._collection}','approved')">Approve</button><button type="button" class="btn red" onclick="withdrawAction('${w.id}','${w._collection}','rejected')">Reject/Refund</button><button type="button" class="btn light" onclick="delDoc('${w.id}','${w._collection}')">Delete</button></div></td></tr>`).join('')||'<tr><td colspan="6">No withdrawals</td></tr>'}

function adminTotals(){
  const approved=submissions.filter(x=>String(x.status||'').toLowerCase()==='approved');
  const pending=submissions.filter(x=>String(x.status||'pending').toLowerCase()==='pending');
  const revenue=approved.reduce((a,x)=>a+Number(x.payout||x.maxPayout||0),0);
  const worker=approved.reduce((a,x)=>a+Number(x.reward||0),0);
  const profit=approved.reduce((a,x)=>a+Number(x.affiliateProfit||x.profit||0),0);
  return {approved:approved.length,pending:pending.length,revenue,worker,profit};
}
window.exportAdminCSV=(type)=>{
  let rows=[];
  if(type==='leads'){
    rows=[['Time','Offer','Event','Worker UPI','Publisher','Reward','Profit','Status','Click ID']];
    submissions.forEach(x=>rows.push([compactDate(x.time||x.createdAt),x.campaignTitle||x.offerName||x.campaignId||'',x.goalName||'',x.upi||'',x.publisherId||x.userId||'',x.reward||0,x.affiliateProfit||x.profit||0,x.status||'pending',x.clickId||'']));
  }else if(type==='withdrawals'){
    rows=[['Time','User','UPI','Amount','Status']];
    withdraws.forEach(x=>rows.push([compactDate(x.time||x.createdAt),x.email||x.userId||'',x.upi||'',x.amount||0,x.status||'pending']));
  }else{
    rows=[['User','Email','Balance','Role']];
    users.forEach(x=>rows.push([x.name||'',x.email||x.id||'',x.balance||0,x.role||'user']));
  }
  downloadCSV(type+'-'+Date.now()+'.csv',rows);
};

function smartRows(){return smartLinks.map(l=>`<tr><td><b>${safe(l.campaignTitle||l.offerName||'-')}</b><small>${safe(l.slug||l.id)}</small></td><td>₹${money((l.goals||[]).reduce((a,g)=>a+Number(g.userReward||0),0))}</td><td>₹${money((l.goals||[]).reduce((a,g)=>a+Number(g.affiliateProfit||0),0))}</td><td><button type="button" class="btn red" onclick="delDoc('${l.id}','smart_links')">Delete</button></td></tr>`).join('')||'<tr><td colspan="4">No smart links</td></tr>'}
window.renderPage=()=>{
 if(!requireLogin())return;
 if(!isAdmin()){shell('admin',`<div class="panel"><h2>Admin only</h2><p class="muted">Your account is not admin.</p></div>`);return;}
 const t=adminTotals();
 shell('admin',`
 <div class="stats"><div class="stat"><span class="muted">Campaigns</span><h2>${campaigns.length}</h2><small>Live offers</small></div><div class="stat"><span class="muted">Pending Leads</span><h2>${t.pending}</h2><small>Need review</small></div><div class="stat"><span class="muted">Approved</span><h2>${t.approved}</h2><small>Auto/manual</small></div><div class="stat"><span class="muted">Profit</span><h2>₹${money(t.profit)}</h2><small>Affiliate profit</small></div></div>
 <div class="grid2"><div class="panel admin-create"><h2>Add Campaign</h2><input id="atitle" class="field" placeholder="Campaign title"><input id="adestination" class="field" placeholder="PathakCPA Smart Tracking Link / Destination URL"><input id="aimageurl" class="field" placeholder="Image URL optional"><select id="acat" class="field"><option>Banking</option><option>Install</option><option>Shopping</option><option>Survey</option><option>Demat</option><option>Other</option></select><input id="aimg" type="file" accept="image/*" class="field"><textarea id="agoals" class="field" rows="4" placeholder="Goal | Max payout | Worker reward optional\nInstall & Login | 0 | 0\nRetention 5 Days | 260 | 90"></textarea><textarea id="asteps" class="field" rows="3" placeholder="Instructions / terms"></textarea><button type="button" id="addCampaignBtn" onclick="addCampaign()" class="btn blue full">Add Campaign</button></div><div class="panel"><h2>Settings</h2><input id="telegram" class="field" value="${safe(settings.telegramUrl||'')}" placeholder="Telegram URL"><button type="button" onclick="saveSettings()" class="btn tg full">Save Telegram</button></div></div>
 <div class="panel"><div class="panel-head"><h2>Users</h2><button type="button" class="btn light" onclick="exportAdminCSV('users')">Export</button></div><div class="tablewrap"><table class="table compact-table"><tr><th>User</th><th>Balance</th><th>Role</th><th>Actions</th></tr>${users.map(u=>`<tr><td><b>${safe(u.name||'-')}</b><small>${safe(u.email||u.id)}</small></td><td>₹${money(u.balance||0)}</td><td>${safe(u.role||'user')}</td><td><input id="bal_${u.id}" type="number" class="field mini-field" placeholder="Amount"><button type="button" class="btn green" onclick="addBal('${u.id}')">Add</button><button type="button" class="btn orange" onclick="setBal('${u.id}')">Set</button><button type="button" class="btn blue" onclick="roleUser('${u.id}','${(u.role||'user')==='admin'?'user':'admin'}')">${(u.role||'user')==='admin'?'Make User':'Make Admin'}</button></td></tr>`).join('')||'<tr><td colspan="4">No users</td></tr>'}</table></div></div>
 <div class="panel"><div class="panel-head"><h2>Leads</h2><button type="button" class="btn light" onclick="exportAdminCSV('leads')">Export</button></div><div class="tablewrap"><table class="table compact-table"><tr><th>Offer</th><th>Name/User</th><th>UPI</th><th>Time</th><th>Reward</th><th>Status</th><th>Action</th></tr>${leadsRows()}</table></div></div>
 <div class="panel"><div class="panel-head"><h2>Withdrawals</h2><button type="button" class="btn light" onclick="exportAdminCSV('withdrawals')">Export</button></div><div class="tablewrap"><table class="table compact-table"><tr><th>User</th><th>UPI</th><th>Time</th><th>Amount</th><th>Status</th><th>Action</th></tr>${withdrawRows()}</table></div></div>
 <div class="panel"><h2>Smart Links</h2><div class="tablewrap"><table class="table compact-table"><tr><th>Campaign</th><th>Worker</th><th>Profit</th><th>Action</th></tr>${smartRows()}</table></div></div>
 <div class="panel"><h2>Campaigns</h2><div class="offers">${offerCards(campaigns,true)}</div></div>`)
};
window.saveSettings=async()=>{try{await setDoc(doc(db,'settings','main'),{telegramUrl:document.getElementById('telegram')?.value||''},{merge:true});localStorage.setItem('telegramUrl',document.getElementById('telegram')?.value||'');toast('Saved');await refresh()}catch(e){toast(e.message||'Save failed')}};
window.addCampaign=async()=>{const btn=document.getElementById('addCampaignBtn');try{if(btn){btn.disabled=true;btn.textContent='Saving...'}const title=document.getElementById('atitle')?.value?.trim()||'';if(!title){toast('Title required');return}let image=document.getElementById('aimageurl')?.value?.trim()||'';const file=document.getElementById('aimg')?.files?.[0];if(!image && file){image=await uploadCampaignImage(file)}let goals=parseGoals(document.getElementById('agoals')?.value||'');if(!goals.length)goals=[{id:'g0',name:'Task Complete',maxPayout:0,userReward:0,affiliateProfit:0}];await addDoc(collection(db,'campaigns'),{title,destinationUrl:document.getElementById('adestination')?.value?.trim()||'',trackingUrl:document.getElementById('adestination')?.value?.trim()||'',category:document.getElementById('acat')?.value||'Other',image,imageUrl:image,logo:image,steps:document.getElementById('asteps')?.value||'',instructions:document.getElementById('asteps')?.value||'',status:'active',goals,createdAt:Date.now()});toast('Campaign added');await refresh()}catch(e){console.error(e);toast(e.message||'Campaign add failed')}finally{if(btn){btn.disabled=false;btn.textContent='Add Campaign'}}};
window.editCampaignAdmin=(id)=>{const c=campaigns.find(x=>x.id===id);if(!c)return;modal(`<h2>Edit Campaign</h2><input id="etitle" class="field" value="${safe(c.title||'')}"><input id="edestination" class="field" value="${safe(c.destinationUrl||c.trackingUrl||c.url||c.offerUrl||'')}" placeholder="PathakCPA Smart Tracking Link / Destination URL"><input id="eimage" class="field" value="${safe(c.image||'')}" placeholder="Image URL"><textarea id="egoals" class="field" rows="5">${getGoals(c).map(g=>`${g.name} | ${g.maxPayout} | ${g.userReward}`).join('\n')}</textarea><textarea id="esteps" class="field" rows="4">${safe(c.steps||c.instructions||'')}</textarea><button type="button" class="btn full" onclick="saveCampaignAdmin('${id}')">Save</button>`)};
window.saveCampaignAdmin=async(id)=>{try{await updateDoc(doc(db,'campaigns',id),{title:document.getElementById('etitle')?.value||'',destinationUrl:document.getElementById('edestination')?.value||'',trackingUrl:document.getElementById('edestination')?.value||'',image:document.getElementById('eimage')?.value||'',imageUrl:document.getElementById('eimage')?.value||'',logo:document.getElementById('eimage')?.value||'',goals:parseGoals(document.getElementById('egoals')?.value||''),steps:document.getElementById('esteps')?.value||'',instructions:document.getElementById('esteps')?.value||'',updatedAt:Date.now()});window.closeModal();toast('Updated');await refresh()}catch(e){toast(e.message||'Update failed')}};
window.lead=async(id,col,status,uid,reward)=>{try{await updateDoc(doc(db,col,id),{status,updatedAt:Date.now()});if(status==='approved'&&uid&&reward){const u=users.find(x=>x.id===uid);await setDoc(doc(db,'users',uid),{balance:Number(u?.balance||0)+Number(reward)},{merge:true})}toast('Updated');await refresh()}catch(e){toast(e.message||'Update failed')}};
window.upd=async(id,col,status)=>{try{await updateDoc(doc(db,col,id),{status,updatedAt:Date.now()});toast('Updated');await refresh()}catch(e){toast(e.message||'Update failed')}};
window.withdrawAction=async(id,col,status)=>{
  try{
    const w=withdraws.find(x=>x.id===id);
    if(!w){toast('Withdrawal not found');return}
    const uid=w.userId||w.uid||w.publisherId;
    const amount=Number(w.amount||0);
    const currentStatus=String(w.status||'pending').toLowerCase();
    let patch={status,updatedAt:Date.now()};
    if(status==='approved' && !w.balanceDeducted && uid){
      const u=users.find(x=>x.id===uid);
      await setDoc(doc(db,'users',uid),{balance:Math.max(0,Number(u?.balance||0)-amount)},{merge:true});
      patch.balanceDeducted=true; patch.deductedOnApprove=true;
    }
    if(status==='rejected' && w.balanceDeducted && !w.refunded && uid && currentStatus!=='rejected'){
      const u=users.find(x=>x.id===uid);
      await setDoc(doc(db,'users',uid),{balance:Number(u?.balance||0)+amount},{merge:true});
      patch.refunded=true; patch.refundedAt=Date.now();
    }
    await updateDoc(doc(db,col,id),patch);
    toast(status==='rejected'?'Rejected / refunded':'Withdrawal approved');
    await refresh();
  }catch(e){console.error(e);toast(e?.message||'Withdraw update failed')}
};
window.delDoc=async(id,col)=>{try{if(!confirm('Delete?'))return;await deleteDoc(doc(db,col,id));toast('Deleted');await refresh()}catch(e){toast(e.message||'Delete failed')}};
window.addBal=async(uid)=>{let u=users.find(x=>x.id===uid),a=Number(document.getElementById('bal_'+uid).value||0);await setDoc(doc(db,'users',uid),{balance:Number(u?.balance||0)+a},{merge:true});await refresh()};
window.setBal=async(uid)=>{let a=Number(document.getElementById('bal_'+uid).value||0);await setDoc(doc(db,'users',uid),{balance:a},{merge:true});await refresh()};
window.roleUser=async(uid,role)=>{await setDoc(doc(db,'users',uid),{role},{merge:true});await refresh()};
window.toggleCampaign=async(id,status)=>{await updateDoc(doc(db,'campaigns',id),{status});await refresh()};
window.deleteCampaign=async(id)=>{if(confirm('Delete campaign?')){await deleteDoc(doc(db,'campaigns',id));await refresh()}};
init();
</script></body></html>
