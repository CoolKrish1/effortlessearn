<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,isAdmin,campaigns,submissions,withdraws,users,smartLinks,clickLogs,settings,refresh,money,safe,uploadFile,campaignPayout,defaultReward,profit,offerCards,modal} from './app.js';import {db} from './firebase.js';import {collection,addDoc,doc,setDoc,updateDoc,deleteDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
window.renderPage=()=>{if(!requireLogin())return;if(!isAdmin()){shell('admin',`<div class="panel"><h2>Admin Only</h2><p>Admin access ke liye Firestore users/{yourUID} me role = admin set karo.</p></div>`);return;}shell('admin',`<div class="stats"><div class="stat"><span class="muted">Campaigns</span><h2>${campaigns.length}</h2></div><div class="stat"><span class="muted">Users</span><h2>${users.length}</h2></div><div class="stat"><span class="muted">Leads</span><h2>${submissions.length}</h2></div><div class="stat"><span class="muted">Clicks</span><h2>${clickLogs.length}</h2></div></div><div class="grid2"><div class="panel"><h2>Add Campaign</h2><input id="atitle" class="field" placeholder="Campaign Title"><input id="apayout" type="number" class="field" placeholder="Network Max Payout e.g. 260"><input id="areward" type="number" class="field" placeholder="Default Worker Reward e.g. 90"><input id="adestination" class="field" placeholder="Destination URL"><select id="acat" class="field"><option>Banking</option><option>Survey</option><option>Install</option><option>Shopping</option><option>Demat</option><option>Other</option></select><input id="aimg" type="file" accept="image/*" class="field"><textarea id="asteps" class="field" placeholder="Terms / Steps / Instructions"></textarea><button type="button" onclick="addCampaign()" class="btn blue full">Add Campaign</button></div><div class="panel"><h2>Website Settings</h2><input id="siteName" class="field" value="${safe(settings.siteName||'EffortlessEarn')}" placeholder="Site Name"><input id="telegram" class="field" value="${safe(settings.telegramUrl||'')}" placeholder="Telegram URL"><button type="button" onclick="saveSettings()" class="btn tg full">Save Settings</button><div class="notice"><b>Admin Control</b><p>Admin campaign max payout, users, leads, withdrawals, smart links sab manage karega.</p></div></div></div><div class="panel"><h2>Manage Campaigns</h2><div class="offers">${offerCards(campaigns,true)}</div></div><div class="panel"><h2>Users Manage</h2><div class="tableWrap"><table class="table"><tr><th>User</th><th>Balance</th><th>Role</th><th>Actions</th></tr>${users.map(u=>`<tr><td>${safe(u.name||'-')}<br><small>${safe(u.email||u.id)}</small></td><td>${money(u.balance||0)}</td><td>${safe(u.role||'affiliate')}</td><td><input id="bal_${u.id}" type="number" class="field" style="max-width:120px" placeholder="Amount"><button type="button" class="btn green" onclick="addBal('${u.id}')">Add</button> <button type="button" class="btn orange" onclick="setBal('${u.id}')">Set</button> <button type="button" class="btn blue" onclick="roleUser('${u.id}','${(u.role||'affiliate')==='admin'?'affiliate':'admin'}')">Make ${(u.role||'affiliate')==='admin'?'Affiliate':'Admin'}</button> <button type="button" class="btn red" onclick="delUserDoc('${u.id}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="4">No users</td></tr>'}</table></div></div><div class="panel"><h2>Lead Approval</h2><div class="tableWrap"><table class="table"><tr><th>Offer/User</th><th>Worker Reward</th><th>Affiliate Profit</th><th>Status</th><th>Action</th></tr>${submissions.map(s=>`<tr><td>${safe(s.campaignTitle||s.campaignId||'-')}<br><small>${safe(s.email||s.userId||s.publisherId||'-')}</small></td><td>${money(s.userReward||s.reward||0)}</td><td>${money(s.affiliateCommission||0)}</td><td><span class="status ${s.status||'pending'}">${safe(s.status||'pending')}</span></td><td><button type="button" class="btn green" onclick="lead('${s.id}','${s._collection}','approved','${s.publisherId||s.userId||''}',${Number(s.userReward||s.reward||0)},${Number(s.affiliateCommission||0)})">Approve</button> <button type="button" class="btn red" onclick="lead('${s.id}','${s._collection}','rejected','',0,0)">Reject</button> <button type="button" class="btn red" onclick="delDoc('${s.id}','${s._collection}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="5">No leads</td></tr>'}</table></div></div><div class="panel"><h2>Withdraw Approval</h2><div class="tableWrap"><table class="table"><tr><th>User</th><th>UPI</th><th>Amount</th><th>Status</th><th>Action</th></tr>${withdraws.map(w=>`<tr><td>${safe(w.name||w.email||w.userId)}</td><td>${safe(w.upi||'-')}</td><td>${money(w.amount||0)}</td><td><span class="status ${w.status||'pending'}">${safe(w.status||'pending')}</span></td><td><button type="button" class="btn green" onclick="withdraw('${w.id}','${w._collection}','approved')">Approve</button> <button type="button" class="btn red" onclick="withdraw('${w.id}','${w._collection}','rejected')">Reject</button> <button type="button" class="btn red" onclick="delDoc('${w.id}','${w._collection}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="5">No withdrawals</td></tr>'}</table></div></div><div class="panel"><h2>Smart Links Manage</h2><div class="tableWrap"><table class="table"><tr><th>Offer</th><th>Owner</th><th>Worker Reward</th><th>Profit</th><th>Action</th></tr>${smartLinks.map(l=>`<tr><td>${safe(l.campaignTitle||l.campaignId||'-')}<br><small>${safe(l.slug||l.id)}</small></td><td>${safe(l.email||l.publisherId||'-')}</td><td>${money(l.userReward||0)}</td><td>${money(l.affiliateCommission||0)}</td><td><button type="button" class="btn red" onclick="delDoc('${l.id}','smart_links')">Delete</button></td></tr>`).join('')||'<tr><td colspan="5">No links</td></tr>'}</table></div></div>`)};
window.saveSettings=async()=>{await setDoc(doc(db,'settings','main'),{siteName:siteName.value,telegramUrl:telegram.value},{merge:true});localStorage.setItem('telegramUrl',telegram.value);alert('Saved');await refresh()};
window.addCampaign=async()=>{const payout=Number(apayout.value||0), reward=Number(areward.value||0);if(!atitle.value||!payout)return alert('Title aur payout required');if(reward>payout)return alert('Default reward payout se zyada nahi ho sakta');const image=await uploadFile(aimg.files[0],'campaigns');await addDoc(collection(db,'campaigns'),{title:atitle.value,networkPayout:payout,companyPayout:payout,userReward:reward,reward,affiliateCommission:payout-reward,destinationUrl:adestination.value,category:acat.value,steps:asteps.value,image,status:'active',createdAt:Date.now()});alert('Campaign added');await refresh()};
window.editCampaign=(id)=>{const c=campaigns.find(x=>x.id===id);modal(`<h2>Edit Campaign</h2><input id="etitle" class="field" value="${safe(c.title||'')}"><input id="epayout" type="number" class="field" value="${campaignPayout(c)}"><input id="ereward" type="number" class="field" value="${defaultReward(c)}"><input id="edest" class="field" value="${safe(c.destinationUrl||'')}"><textarea id="esteps" class="field">${safe(c.steps||'')}</textarea><select id="estatus" class="field"><option ${c.status!=='paused'?'selected':''}>active</option><option ${c.status==='paused'?'selected':''}>paused</option></select><button type="button" class="btn green full" onclick="saveCampaign('${id}')">Save Campaign</button>`)};
window.saveCampaign=async(id)=>{const payout=Number(epayout.value||0), reward=Number(ereward.value||0);if(reward>payout)return alert('Reward payout se zyada nahi');await updateDoc(doc(db,'campaigns',id),{title:etitle.value,networkPayout:payout,companyPayout:payout,userReward:reward,reward,affiliateCommission:payout-reward,destinationUrl:edest.value,steps:esteps.value,status:estatus.value,updatedAt:Date.now()});closeModal();await refresh()};
window.lead=async(id,col,status,pubId,userReward,affCommission)=>{await updateDoc(doc(db,col,id),{status,updatedAt:Date.now()});if(status==='approved'&&pubId){const u=users.find(x=>x.id===pubId);const add=Number(userReward||0)+Number(affCommission||0);await setDoc(doc(db,'users',pubId),{balance:Number(u?.balance||0)+add},{merge:true});await addDoc(collection(db,'transactions'),{userId:pubId,type:'lead_approved',amount:add,userReward,affiliateCommission:affCommission,leadId:id,createdAt:Date.now()});}alert('Updated');await refresh()};
window.withdraw=async(id,col,status)=>{await updateDoc(doc(db,col,id),{status,updatedAt:Date.now()});alert('Updated');await refresh()};
window.addBal=async(id)=>{const u=users.find(x=>x.id===id),a=Number(document.getElementById('bal_'+id).value||0);await setDoc(doc(db,'users',id),{balance:Number(u?.balance||0)+a},{merge:true});await refresh()};window.setBal=async(id)=>{const a=Number(document.getElementById('bal_'+id).value||0);await setDoc(doc(db,'users',id),{balance:a},{merge:true});await refresh()};window.roleUser=async(id,role)=>{await setDoc(doc(db,'users',id),{role},{merge:true});await refresh()};window.delDoc=async(id,col)=>{if(confirm('Delete permanently?')){await deleteDoc(doc(db,col,id));await refresh()}};window.deleteCampaign=async(id)=>{if(confirm('Campaign delete?')){await deleteDoc(doc(db,'campaigns',id));await refresh()}};window.delUserDoc=async(id)=>{if(confirm('Delete user document? Auth account delete nahi hoga.')){await deleteDoc(doc(db,'users',id));await refresh()}};window.toggleCampaign=async(id,status)=>{await updateDoc(doc(db,'campaigns',id),{status});await refresh()};init();</script></body></html>
