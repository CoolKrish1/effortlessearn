<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,profile,campaigns,submissions,withdraws,users,loadData,offerCards} from './app.js';import {db,storage} from './firebase.js';import {collection,addDoc,doc,updateDoc,deleteDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';import {ref,uploadBytes,getDownloadURL} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';window.renderPage=()=>{if(!requireLogin())return;if(profile?.role!=='admin'){shell('admin',`<div class="panel"><h2>Admin Only</h2><p>Firestore users me apne account ka role = admin karo.</p></div>`);return;}shell('admin',`<div class="panel"><h2>Admin Panel</h2><p>Add offers, approve leads and withdrawals.</p></div><div class="grid2"><div class="panel"><h2>Add Campaign</h2><div class="adminform"><input id="atitle" class="field" placeholder="Campaign Title"><input id="areward" type="number" class="field" placeholder="Reward"><select id="acat" class="field"><option>Banking</option><option>Survey</option><option>Crypto</option><option>Install</option><option>Shopping</option><option>Demat</option></select><input id="aimg" type="file" accept="image/*" class="field"><textarea id="asteps" class="field wide" placeholder="Terms / Worker Instructions"></textarea><button onclick="addCampaign()" class="btn blue wide">ADD CAMPAIGN</button></div></div><div class="panel"><h2>Stats</h2><div class="stats"><div class="stat"><span class="muted">Campaigns</span><h2>${campaigns.length}</h2></div><div class="stat"><span class="muted">Leads</span><h2>${submissions.length}</h2></div><div class="stat"><span class="muted">Withdraws</span><h2>${withdraws.length}</h2></div><div class="stat"><span class="muted">Users</span><h2>${users.length}</h2></div></div></div></div><div class="panel"><h2>Lead Approval</h2><table class="table"><tr><th>Offer</th><th>UPI</th><th>Status</th><th>Action</th></tr>${submissions.map(s=>`<tr><td>${s.campaignTitle||s.campaign}</td><td>${s.upi||'-'}</td><td>${s.status}</td><td><button class="btn green" onclick="lead('${s.id}','approved')">Approve</button> <button class="btn red" onclick="lead('${s.id}','rejected')">Reject</button></td></tr>`).join('')}</table></div><div class="panel"><h2>Withdraw Approval</h2><table class="table"><tr><th>Name</th><th>UPI</th><th>Amount</th><th>Status</th><th>Action</th></tr>${withdraws.map(w=>`<tr><td>${w.name}</td><td>${w.upi}</td><td>₹${w.amount}</td><td>${w.status}</td><td><button class="btn green" onclick="withdraw('${w.id}','approved')">Approve</button> <button class="btn red" onclick="withdraw('${w.id}','rejected')">Reject</button></td></tr>`).join('')}</table></div><div class="panel"><h2>Manage Campaigns</h2><div class="offers">${offerCards(campaigns)}</div></div>`)};window.addCampaign=async()=>{let f=aimg.files[0];if(!f){alert('Upload image');return}let r=ref(storage,'campaigns/'+Date.now()+'-'+f.name);await uploadBytes(r,f);let url=await getDownloadURL(r);await addDoc(collection(db,'campaigns'),{title:atitle.value,reward:Number(areward.value),category:acat.value,steps:asteps.value,image:url,status:'active',createdAt:Date.now()});alert('Campaign added');location.reload()};window.lead=async(id,status)=>{await updateDoc(doc(db,'submissions',id),{status,updatedAt:Date.now()});alert('Updated');location.reload()};window.withdraw=async(id,status)=>{await updateDoc(doc(db,'withdraws',id),{status,updatedAt:Date.now()});alert('Updated');location.reload()};init();</script></body></html>
