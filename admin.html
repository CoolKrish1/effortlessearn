<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>

<body>

<h2>Admin Panel</h2>

<button onclick="loadApps()">Load Applications</button>

<div id="appList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, increment } 
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "effortless-earn-7f39e.firebaseapp.com",
  projectId: "effortless-earn-7f39e",
  storageBucket: "effortless-earn-7f39e.appspot.com",
  messagingSenderId: "554178513766",
  appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOAD APPLICATIONS */
window.loadApps = async function(){

const snap = await getDocs(collection(db,"applications"));

let html="";

snap.forEach(docSnap=>{
const a = docSnap.data();

html += `
  <div style="border:1px solid black;padding:10px;margin:10px">
    <p>User: ${a.userId}</p>
    <p>Reward: ₹${a.reward}</p>
    <p>Status: ${a.status}</p>

    <button onclick="approve('${docSnap.id}')">Approve</button>
    <button onclick="reject('${docSnap.id}')">Reject</button>
  </div>
`;
});

document.getElementById("appList").innerHTML = html;

};

/* APPROVE */
window.approve = async function(id){

const ref = doc(db,"applications",id);
const snap = await getDoc(ref);

const data = snap.data();

await updateDoc(ref,{
status:"approved"
});

const userRef = doc(db,"users",data.userId);

await updateDoc(userRef,{
balance: increment(data.reward)
});

alert("Approved + Money Added");

};

/* REJECT */
window.reject = async function(id){

await updateDoc(doc(db,"applications",id),{
status:"rejected"
});

alert("Rejected");

};

</script>

</body>
</html>
