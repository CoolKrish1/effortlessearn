<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#111;
color:white;
padding:20px;
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
cursor:pointer;
background:#333;
color:white;
border-radius:5px;
}

.sidebar button:hover{
background:#555;
}

/* CONTENT */
.content{
flex:1;
background:#f5f5f5;
padding:20px;
overflow:auto;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button.approve{
background:green;
color:white;
padding:8px;
border:none;
cursor:pointer;
}

button.reject{
background:red;
color:white;
padding:8px;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Admin</h2>

<button onclick="showPage('dashboard')">📊 Dashboard</button>
<button onclick="showPage('withdraw')">💰 Withdraw</button>
<button onclick="showPage('users')">👤 Users</button>

</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<h2>📊 Dashboard</h2>

<div class="card">
<p>Total Users: <span id="usersCount">0</span></p>
<p>Total Withdrawals: <span id="withdrawCount">0</span></p>
<p>Total Payout: ₹<span id="payout">0</span></p>
</div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="page" style="display:none;">
<h2>💰 Withdraw Requests</h2>
<div id="withdrawList">Loading...</div>
</div>

<!-- USERS -->
<div id="users" class="page" style="display:none;">
<h2>👤 Users</h2>
<div id="userList">Loading...</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
getDoc,
increment
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyD...",
 authDomain: "effortless-earn-7f39e.firebaseapp.com",
 projectId: "effortless-earn-7f39e",
 storageBucket: "effortless-earn-7f39e.firebasestorage.app",
 messagingSenderId: "554178513766",
 appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//
// PAGE SWITCH
//
window.showPage = function(page){

  document.querySelectorAll('.page').forEach(p=>{
    p.style.display = "none";
  });

  document.getElementById(page).style.display = "block";
};

//
// LOAD DASHBOARD
//
async function loadDashboard(){

  const users = await getDocs(collection(db,"wallets"));
  const withdraw = await getDocs(collection(db,"withdrawals"));

  let payout = 0;

  withdraw.forEach(d=>{
    if(d.data().status==="approved"){
      payout += Number(d.data().amount);
    }
  });

  document.getElementById("usersCount").innerText = users.size;
  document.getElementById("withdrawCount").innerText = withdraw.size;
  document.getElementById("payout").innerText = payout;
}

//
// LOAD WITHDRAW
//
async function loadWithdraw(){

  const snap = await getDocs(collection(db,"withdrawals"));

  let html = "";

  snap.forEach(d=>{

    const data = d.data();

    html += `
      <div class="card">
        <p>User: ${data.userId}</p>
        <p>Amount: ₹${data.amount}</p>
        <p>Status: ${data.status}</p>

        ${data.status==="pending" ? `
          <button class="approve" onclick="approve('${d.id}')">Approve</button>
          <button class="reject" onclick="reject('${d.id}')">Reject</button>
        ` : ``}
      </div>
    `;
  });

  document.getElementById("withdrawList").innerHTML = html;
}

//
// APPROVE
//
window.approve = async function(id){

  const ref = doc(db,"withdrawals",id);
  const snap = await getDoc(ref);

  const data = snap.data();

  const walletRef = doc(db,"wallets",data.userId);

  await updateDoc(ref,{status:"approved"});
  await updateDoc(walletRef,{balance:increment(-data.amount)});

  loadWithdraw();
  loadDashboard();
};

//
// REJECT
//
window.reject = async function(id){

  await updateDoc(doc(db,"withdrawals",id),{
    status:"rejected"
  });

  loadWithdraw();
};

loadDashboard();
loadWithdraw();

</script>

</body>
</html>
