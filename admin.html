<!DOCTYPE html>
<html>
<head>
<title>Pro CPA Admin Panel</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:260px;
height:100vh;
background:#0f172a;
padding:20px;
position:fixed;
}

.logo{
font-size:22px;
font-weight:bold;
color:#38bdf8;
margin-bottom:20px;
}

.menu button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px;
background:#111827;
color:white;
cursor:pointer;
text-align:left;
transition:0.2s;
}

.menu button i{
margin-right:10px;
}

.menu button:hover{
background:#2563eb;
}

/* TOP BAR */
.topbar{
margin-left:260px;
padding:15px 25px;
background:#0f172a;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
align-items:center;
}

.topbar h2{
margin:0;
}

/* MAIN */
.main{
margin-left:260px;
padding:20px;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.card{
background:#111827;
padding:18px;
border-radius:14px;
border:1px solid #1e293b;
box-shadow:0 0 10px rgba(56,189,248,0.08);
}

.card h3{
margin:0;
color:#38bdf8;
}

.card p{
font-size:24px;
margin-top:10px;
}

/* SECTION BOX */
.box{
margin-top:20px;
background:#111827;
padding:20px;
border-radius:14px;
border:1px solid #1e293b;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #1e293b;
}

th{
color:#38bdf8;
text-align:left;
}

/* ICON GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.grid div{
background:#111827;
padding:15px;
border-radius:12px;
border:1px solid #1e293b;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">⚡ CPA PANEL</div>

<div class="menu">
<button onclick="show('dashboard')"><i class="fa fa-chart-line"></i> Dashboard</button>
<button onclick="show('users')"><i class="fa fa-users"></i> Users</button>
<button onclick="show('offers')"><i class="fa fa-bullhorn"></i> Offers</button>
<button onclick="show('earnings')"><i class="fa fa-dollar-sign"></i> Earnings</button>
<button onclick="show('withdraw')"><i class="fa fa-wallet"></i> Withdraw</button>
<button onclick="show('settings')"><i class="fa fa-gear"></i> Settings</button>
</div>
</div>

<!-- TOPBAR -->
<div class="topbar">
<h2>Admin Dashboard</h2>
<div>🔥 Live System</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">

<div class="cards">
<div class="card"><h3>Total Users</h3><p id="u">0</p></div>
<div class="card"><h3>Earnings</h3><p id="e">₹0</p></div>
<div class="card"><h3>Pending</h3><p id="p">0</p></div>
<div class="card"><h3>Withdraw</h3><p id="w">0</p></div>
</div>

<div class="box">
<canvas id="chart"></canvas>
</div>

</div>

<!-- USERS -->
<div id="users" style="display:none;">
<div class="box">
<h3>Users List</h3>
<div id="userList"></div>
</div>
</div>

<!-- OFFERS -->
<div id="offers" style="display:none;">
<div class="box">
<h3>Offers / Campaigns</h3>
<div id="offerList"></div>
</div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" style="display:none;">
<div class="box">
<h3>Withdraw Requests</h3>
<div id="withdrawList"></div>
</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyD...",
authDomain:"effortless-earn-7f39e.firebaseapp.com",
projectId:"effortless-earn-7f39e"
});

const db = getFirestore(app);

window.show=(id)=>{
document.querySelectorAll(".main > div").forEach(d=>d.style.display="none");
document.getElementById(id).style.display="block";
};

/* STATS */
async function load(){

const users=await getDocs(collection(db,"wallets"));
const withdraw=await getDocs(collection(db,"withdrawals"));

let pending=0,total=0;

withdraw.forEach(d=>{
let x=d.data();
if(x.status==="pending") pending++;
if(x.status==="approved") total+=Number(x.amount);
});

document.getElementById("u").innerText=users.size;
document.getElementById("e").innerText="₹"+total;
document.getElementById("p").innerText=pending;
document.getElementById("w").innerText=withdraw.size;

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:["Users","Earnings","Pending","Withdraw"],
datasets:[{
data:[users.size,total,pending,withdraw.size],
borderColor:"#38bdf8"
}]
}
});
}

load();

</script>

</body>
</html>
