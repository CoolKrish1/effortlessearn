<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>Admin Panel</h2>

<p>Users: <span id="usersCount">0</span></p>
<p>Withdraw: <span id="withdrawCount">0</span></p>
<p>Pending: <span id="pendingCount">0</span></p>
<p>Payout: <span id="payoutCount">0</span></p>

<canvas id="chart"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
authDomain: "effortless-earn-7f39e.firebaseapp.com",
projectId: "effortless-earn-7f39e",
storageBucket: "effortless-earn-7f39e.appspot.com",
messagingSenderId: "554178513766",
appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function load(){

const users = await getDocs(collection(db,"users"));
const withdraw = await getDocs(collection(db,"withdrawals"));

let pending = 0;
let payout = 0;

withdraw.forEach(d=>{
let x = d.data();
if(x.status==="pending") pending++;
if(x.status==="approved") payout += Number(x.amount);
});

document.getElementById("usersCount").innerText = users.size;
document.getElementById("withdrawCount").innerText = withdraw.size;
document.getElementById("pendingCount").innerText = pending;
document.getElementById("payoutCount").innerText = payout;

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Users","Withdraw","Pending","Payout"],
datasets:[{data:[users.size,withdraw.size,pending,payout]}]
}
});

}

load();

</script>

</body>
</html>
