<script type="module">

import {
auth,
db,
storage
}

from "./firebase.js";

import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {

collection,
addDoc,
getDocs,
doc,
getDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {

ref,
uploadBytes,
getDownloadURL

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

onAuthStateChanged(
auth,

async(user)=>{

if(!user){

location.href=
"login.html";

return;

}

const snap=

await getDoc(

doc(
db,
"users",
user.uid
)

);

const data=
snap.data();

if(
!data ||

data.role!=="admin"
){

alert(
"Admin only"
);

location.href=
"index.html";

return;

}

loadCampaigns();

}

);

async function loadCampaigns(){

const snap=

await getDocs(

collection(
db,
"campaigns"
)

);

campaignCount.innerText=
snap.size;

let html="";

snap.forEach(docu=>{

let d=
docu.data();

html+=`

<div class="item">

<img src="${d.image}">

<h3>

${d.title}

</h3>

<p>

${d.category}

</p>

<b>

₹${d.reward}

</b>

</div>

`;

});

campaignList.innerHTML=
html;

}

window.addCampaign=
async()=>{

let file=
image.files[0];

if(!file){

alert(
"Upload image"
);

return;

}

let imageRef=

ref(
storage,
"campaigns/"+Date.now()
);

await uploadBytes(
imageRef,
file
);

let url=

await getDownloadURL(
imageRef
);

await addDoc(

collection(
db,
"campaigns"
),

{

title:
title.value,

reward:
Number(
reward.value
),

category:
category.value,

steps:
steps.value,

image:url,

status:
"active",

createdAt:
Date.now()

}

);

alert(
"Campaign Added"
);

location.reload();

}

</script>
