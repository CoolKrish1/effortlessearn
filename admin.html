<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
</head>
<body>

<h2>Admin Panel</h2>

<div id="users"></div>
<div id="withdraw"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyD...",
authDomain:"effortless-earn-7f39e.firebaseapp.com",
projectId:"effortless-earn-7f39e"
});

const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{
if(!user){
location.href="login.html";
}
load();
});

async function load(){

const users = await getDocs(collection(db,"users"));
document.getElementById("users").innerHTML =
"<h3>Users</h3>" + users.size;

const w = await getDocs(collection(db,"withdrawals"));
document.getElementById("withdraw").innerHTML =
"<h3>Withdraw</h3>" + w.size;

}

</script>

</body>
</html>
