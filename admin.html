<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex, nofollow"><title>Admin</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><div id="modal" class="modal"><div class="modalbox"><button type="button" class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div><script type="module">
import {init,requireLogin,shell,campaigns,submissions,withdraws,users,smartLinks,settings,loadData,offerCards,isAdmin,getGoals,money,toast,modal,compactDate,downloadCSV} from './app.js';
import {db,storage} from './firebase.js';
import {collection,addDoc,doc,setDoc,updateDoc,deleteDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import {ref,uploadBytes,getDownloadURL} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

const safe=v=>String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
async function refresh(){await loadData();window.renderPage()}
const ADMIN_PAGE_SIZE=10;
let adminTab='overview';
let adminPages={users:1,leads:1,withdraws:1,smart:1,campaigns:1};
let filters={q:'',leadStatus:'all',userStatus:'all',withdrawStatus:'all',campaignStatus:'all',leadOffer:'all'};

function statusOf(x,def='pending'){return String(x?.status||def).toLowerCase()}
function userStatus(u){return u.role==='admin'?'approved':String(u.status||(u.approved===false?'pending':'approved')).toLowerCase()}
function safeDocId(v){return String(v||'').replace(/[^a-zA-Z0-9_-]/g,'_')}
function userNameById(uid){const u=users.find(x=>x.id===uid);return u?.name||u?.email||uid||'-'}
function getUid(x){return x?.publisherId||x?.affiliateId||x?.userId||x?.uid||''}
function matchText(obj,q){if(!q) return true; q=q.toLowerCase(); return JSON.stringify(obj||{}).toLowerCase().includes(q)}
function filteredUsers(){return users.filter(u=>(filters.userStatus==='all'||userStatus(u)===filters.userStatus)).filter(u=>matchText({name:u.name,email:u.email,id:u.id,role:u.role,status:userStatus(u)},filters.q))}
function filteredLeads(){return submissions.filter(x=>(filters.leadStatus==='all'||statusOf(x)===filters.leadStatus)).filter(x=>filters.leadOffer==='all'||String(x.campaignTitle||x.offerName||x.campaignId||'')===filters.leadOffer).filter(x=>matchText(x,filters.q)).sort((a,b)=>(b.time||b.createdAt||0)-(a.time||a.createdAt||0))}
function filteredWithdraws(){return withdraws.filter(x=>(filters.withdrawStatus==='all'||statusOf(x)===filters.withdrawStatus)).filter(x=>matchText(x,filters.q)).sort((a,b)=>(b.time||b.createdAt||0)-(a.time||a.createdAt||0))}
function filteredCampaigns(){return campaigns.filter(x=>(filters.campaignStatus==='all'||statusOf(x,'active')===filters.campaignStatus)).filter(x=>matchText({title:x.title,category:x.category,status:x.status,id:x.id},filters.q)).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))}
function filteredSmart(){return smartLinks.filter(x=>matchText(x,filters.q)).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))}
function sliceAdmin(key,arr){const total=Math.max(1,Math.ceil(arr.length/ADMIN_PAGE_SIZE));if(adminPages[key]>total)adminPages[key]=total;if(adminPages[key]<1)adminPages[key]=1;const start=(adminPages[key]-1)*ADMIN_PAGE_SIZE;return arr.slice(start,start+ADMIN_PAGE_SIZE)}
function adminPager(key,arr){const total=Math.max(1,Math.ceil(arr.length/ADMIN_PAGE_SIZE));const cur=Math.min(adminPages[key]||1,total);return `<div class="mini-pager"><button type="button" class="btn light" ${cur<=1?'disabled':''} onclick="adminPage('${key}',-1)">← Prev</button><span>Page ${cur}/${total} • ${arr.length} rows</span><button type="button" class="btn light" ${cur>=total?'disabled':''} onclick="adminPage('${key}',1)">Next →</button></div>`}
window.adminPage=(key,step)=>{adminPages[key]=(adminPages[key]||1)+step;window.renderPage&&window.renderPage()};
window.setAdminTab=(tab)=>{adminTab=tab;Object.keys(adminPages).forEach(k=>adminPages[k]=1);window.renderPage()};
window.setAdminFilter=(k,v)=>{filters[k]=v;Object.keys(adminPages).forEach(p=>adminPages[p]=1);window.renderPage()};
window.setAdminSearch=(v)=>{filters.q=v};
window.runAdminSearch=()=>{filters.q=document.getElementById('adminSearchInput')?.value||filters.q;Object.keys(adminPages).forEach(p=>adminPages[p]=1);window.renderPage&&window.renderPage()};
window.clearAdminSearch=()=>{filters.q='';Object.keys(adminPages).forEach(p=>adminPages[p]=1);window.renderPage&&window.renderPage()};

function compressImage(file, maxSize=520, quality=.72){return new Promise((resolve,reject)=>{const img=new Image();const url=URL.createObjectURL(file);img.onload=()=>{const scale=Math.min(1,maxSize/Math.max(img.width,img.height));const canvas=document.createElement('canvas');canvas.width=Math.max(1,Math.round(img.width*scale));canvas.height=Math.max(1,Math.round(img.height*scale));canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);URL.revokeObjectURL(url);resolve(canvas.toDataURL('image/jpeg',quality))};img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Image read failed'))};img.src=url})}
async function uploadCampaignImage(file){if(!file)return '';try{const dataUrl=await compressImage(file);toast('Image added');return dataUrl}catch(e){console.warn(e)}try{const r=ref(storage,'campaigns/'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_'));await uploadBytes(r,file);return await getDownloadURL(r)}catch(e){toast('Image skipped. Campaign saved.');return ''}}
function parseGoals(text){return String(text||'').split('\n').map((line,i)=>{const p=line.split('|').map(x=>x.trim());if(!p[0])return null;const max=Number(p[1]||0),worker=Number(p[2]||0);return {id:'g'+i,name:p[0],maxPayout:max,userReward:worker,affiliateProfit:Math.max(0,max-worker)}}).filter(Boolean)}
function adminTotals(){const approved=submissions.filter(x=>statusOf(x)==='approved');const pending=submissions.filter(x=>statusOf(x)==='pending');const rejected=submissions.filter(x=>statusOf(x)==='rejected');const pW=withdraws.filter(x=>statusOf(x)==='pending');const paidW=withdraws.filter(x=>statusOf(x)==='approved');const revenue=approved.reduce((a,x)=>a+Number(x.payout||x.maxPayout||0),0);const worker=approved.reduce((a,x)=>a+Number(x.reward||0),0);const profit=approved.reduce((a,x)=>a+Number(x.affiliateProfit||x.profit||0),0);return {approved:approved.length,pending:pending.length,rejected:rejected.length,pendingWithdraw:pW.length,paidWithdraw:paidW.length,revenue,worker,profit,totalBalance:users.reduce((a,u)=>a+Number(u.balance||0),0)}}

function adminLeadStats(arr){
  const total=arr.length;
  const approved=arr.filter(x=>statusOf(x)==='approved').length;
  const pending=arr.filter(x=>statusOf(x)==='pending').length;
  const rejected=arr.filter(x=>statusOf(x)==='rejected').length;
  const payout=arr.filter(x=>statusOf(x)==='approved').reduce((a,x)=>a+Number(x.reward||x.payout||0),0);
  return {total,approved,pending,rejected,payout};
}
function leadOfferOptions(){
  const names=[...new Set(submissions.map(x=>String(x.campaignTitle||x.offerName||x.campaignId||'').trim()).filter(Boolean))].sort();
  return `<select class="field smallSelect" onchange="setAdminFilter('leadOffer',this.value)"><option value="all">ALL OFFERS</option>${names.map(n=>`<option value="${safe(n)}" ${filters.leadOffer===n?'selected':''}>${safe(n)}</option>`).join('')}</select>`;
}
function leadStatsCards(arr){const s=adminLeadStats(arr);return `<div class="admin-report-stats"><div><span>Total</span><b>${s.total}</b></div><div><span>Approved</span><b>${s.approved}</b></div><div><span>Pending</span><b>${s.pending}</b></div><div><span>Rejected</span><b>${s.rejected}</b></div><div><span>Payout</span><b>₹${money(s.payout)}</b></div></div>`}
function adminNav(){const tabs=[['overview','Overview','📊'],['campaigns','Campaigns','🎯'],['leads','Leads','✅'],['users','Users','👥'],['withdraws','Withdrawals','₹'],['smart','Smart Links','🔗'],['settings','Settings','⚙']];return `<div class="admin-tabs-pro">${tabs.map(t=>`<button type="button" class="${adminTab===t[0]?'active':''}" onclick="setAdminTab('${t[0]}')"><span>${t[2]}</span>${t[1]}</button>`).join('')}</div>`}
function adminTop(){return `<div class="admin-hero"><div><h1>Admin Control Center</h1><p>Manage offers, leads, users, payouts and tracking from one place.</p></div><div class="admin-searchbar"><input id="adminSearchInput" class="field" value="${safe(filters.q)}" oninput="setAdminSearch(this.value)" onkeydown="if(event.key==='Enter')runAdminSearch()" placeholder="Search users, offers, UPI, tracking ID..."><button type="button" class="btn blue" onclick="runAdminSearch()">Search</button><button type="button" class="btn light" onclick="clearAdminSearch()">Clear</button><button type="button" class="btn tg" onclick="refresh()">Refresh</button></div></div>${adminNav()}`}
function overviewSection(){const t=adminTotals();return `<div class="admin-stats-pro"><div><span>Total Users</span><b>${users.length}</b><small>${users.filter(u=>userStatus(u)==='pending').length} pending approval</small></div><div><span>Campaigns</span><b>${campaigns.length}</b><small>${campaigns.filter(c=>statusOf(c,'active')==='active').length} active</small></div><div><span>Pending Leads</span><b>${t.pending}</b><small>Need action</small></div><div><span>Approved Leads</span><b>${t.approved}</b><small>${t.rejected} rejected</small></div><div><span>Profit</span><b>₹${money(t.profit)}</b><small>Revenue ₹${money(t.revenue)}</small></div><div><span>Pending Payouts</span><b>${t.pendingWithdraw}</b><small>Paid ${t.paidWithdraw}</small></div></div><div class="grid2"><div class="panel admin-card-pro"><div class="panel-head"><h2>Recent Leads</h2><button class="btn light" onclick="setAdminTab('leads')">View All</button></div>${leadCards(filteredLeads().slice(0,5))}</div><div class="panel admin-card-pro"><div class="panel-head"><h2>Pending Withdrawals</h2><button class="btn light" onclick="setAdminTab('withdraws')">View All</button></div>${withdrawCards(filteredWithdraws().filter(x=>statusOf(x)==='pending').slice(0,5))}</div></div>`}
function leadCards(arr){return arr.length?arr.map(s=>{const uid=getUid(s);return `<div class="mini-row"><div><b>${safe(s.campaignTitle||s.offerName||s.campaignId||'-')}</b><small>${safe(s.goalName||'Task')} • ${compactDate(s.time||s.createdAt)}</small></div><div><span class="status ${safe(statusOf(s))}">${safe(statusOf(s))}</span><strong>₹${money(s.reward||0)}</strong></div></div>`}).join(''):'<div class="empty small">No leads found</div>'}
function withdrawCards(arr){return arr.length?arr.map(w=>`<div class="mini-row"><div><b>${safe(w.name||w.email||userNameById(w.userId||w.uid)||'-')}</b><small>${safe(w.upi||'-')} • ${compactDate(w.time||w.createdAt)}</small></div><div><span class="status ${safe(statusOf(w))}">${safe(statusOf(w))}</span><strong>₹${money(w.amount||0)}</strong></div></div>`).join(''):'<div class="empty small">No withdrawals</div>'}
function statusFilterHTML(kind,current){const opts=['all','pending','approved','rejected','clicked','active','paused'];return `<select class="field smallSelect" onchange="setAdminFilter('${kind}',this.value)">${opts.map(o=>`<option value="${o}" ${current===o?'selected':''}>${o.toUpperCase()}</option>`).join('')}</select>`}
function campaignsSection(){const arr=filteredCampaigns();return `<div class="panel admin-create"><div class="panel-head"><h2>Add Campaign</h2><small>Terms and worker steps are separate.</small></div><div class="admin-form-grid"><input id="atitle" class="field" placeholder="Campaign title"><input id="adestination" class="field" placeholder="Destination / PathakCPA tracking URL"><input id="aimageurl" class="field" placeholder="Image URL optional"><select id="acat" class="field"><option>Banking</option><option>Install</option><option>Shopping</option><option>Survey</option><option>Demat</option><option>Other</option></select><input id="aimg" type="file" accept="image/*" class="field"><textarea id="agoals" class="field" rows="3" placeholder="Goal | Max payout | Worker reward\nInstall & Login | 0 | 0\nRetention 5 Days | 260 | 90"></textarea><textarea id="aterms" class="field" rows="3" placeholder="Terms & Conditions"></textarea><textarea id="asteps" class="field" rows="3" placeholder="Worker Steps"></textarea></div><button type="button" id="addCampaignBtn" onclick="addCampaign()" class="btn blue full">Add Campaign</button></div><div class="panel"><div class="panel-head"><h2>Campaign Manager</h2><div>${statusFilterHTML('campaignStatus',filters.campaignStatus)}</div></div><div class="offers admin-offer-grid">${offerCards(sliceAdmin('campaigns',arr),true)}</div>${adminPager('campaigns',arr)}</div>`}
function leadsSection(){const arr=filteredLeads();return `<div class="panel admin-report-panel"><div class="panel-head"><div><h2>Admin Reports & Lead Verification</h2><p class="muted">Full report with UPI, tracking ID, event, payout and approval action.</p></div><div class="head-actions">${statusFilterHTML('leadStatus',filters.leadStatus)}${leadOfferOptions()}<button type="button" class="btn light" onclick="exportAdminCSV('leads')">Export CSV</button></div></div>${leadStatsCards(arr)}<div class="tablewrap"><table class="table compact-table admin-table pro-report-table"><tr><th>Date & Time</th><th>Offer / Event</th><th>Worker</th><th>Tracking ID</th><th>Reward</th><th>Status</th><th>Action</th></tr>${sliceAdmin('leads',arr).map(leadRow).join('')||'<tr><td colspan="7">No leads found</td></tr>'}</table></div>${adminPager('leads',arr)}</div>`}
function leadRow(s){const uid=getUid(s);const tid=s.clickId||s.trackingId||s.click_id||s.subid||'';return `<tr><td><b>${compactDate(s.time||s.createdAt)}</b><small>${safe(s.source||s._collection||'lead')}</small></td><td><b>${safe(s.campaignTitle||s.offerName||s.campaignId||'-')}</b><small>${safe(s.goalName||s.event||'Task')}</small></td><td><b>${safe(s.name||s.workerName||userNameById(uid))}</b><small>${safe(s.upi||s.p1||s.email||uid||'-')}</small></td><td><code>${safe(tid||'-')}</code><small>${safe(s.ip||s.ipAddress||'')}</small></td><td><b>₹${money(s.reward||s.payout||0)}</b><small>Profit ₹${money(s.affiliateProfit||s.profit||0)}</small></td><td><span class="status ${safe(statusOf(s))}">${safe(statusOf(s))}</span></td><td><div class="actions admin-actions"><button type="button" class="btn green" onclick="lead('${s.id}','${s._collection}','approved','${uid}',${Number(s.reward||s.payout||0)})">Approve</button><button type="button" class="btn red" onclick="lead('${s.id}','${s._collection}','rejected','',0)">Reject</button><button type="button" class="btn light" onclick="delDoc('${s.id}','${s._collection}')">Delete</button></div></td></tr>`}
function usersSection(){const arr=filteredUsers();return `<div class="panel"><div class="panel-head"><div><h2>User Management</h2><p class="muted">Approve/reject, change role and adjust balance.</p></div><div class="head-actions">${statusFilterHTML('userStatus',filters.userStatus)}<button type="button" class="btn light" onclick="exportAdminCSV('users')">Export</button></div></div><div class="tablewrap"><table class="table compact-table admin-table"><tr><th>User</th><th>Joined</th><th>Balance</th><th>Role</th><th>Status</th><th>Actions</th></tr>${sliceAdmin('users',arr).map(userRow).join('')||'<tr><td colspan="6">No users</td></tr>'}</table></div>${adminPager('users',arr)}</div>`}
function userRow(u){const st=userStatus(u);return `<tr><td><b>${safe(u.name||'-')}</b><small>${safe(u.email||u.id)}</small></td><td><b>${compactDate(u.createdAt||u.time)}</b><small>${safe(u.id||'').slice(0,10)}</small></td><td><b>₹${money(u.balance||0)}</b><small>Pending ₹${money(u.pendingWithdraw||0)}</small></td><td><span class="role-pill">${safe(u.role||'user')}</span></td><td><span class="status ${safe(st)}">${safe(st)}</span></td><td><div class="admin-actions"><input id="bal_${safeDocId(u.id)}" data-uid="${safe(u.id)}" type="number" class="field mini-field" placeholder="₹"><button type="button" class="btn green" onclick="approveUser('${u.id}')">Approve</button><button type="button" class="btn red" onclick="rejectUser('${u.id}')">Reject</button><button type="button" class="btn green" onclick="addBal('${u.id}')">Add</button><button type="button" class="btn orange" onclick="setBal('${u.id}')">Set</button><button type="button" class="btn blue" onclick="roleUser('${u.id}','${(u.role||'user')==='admin'?'user':'admin'}')">${(u.role||'user')==='admin'?'User':'Admin'}</button></div></td></tr>`}
function withdrawsSection(){const arr=filteredWithdraws();return `<div class="panel"><div class="panel-head"><div><h2>Wallet & Withdrawal Control</h2><p class="muted">Approve, reject/refund and export payout requests.</p></div><div class="head-actions">${statusFilterHTML('withdrawStatus',filters.withdrawStatus)}<button type="button" class="btn light" onclick="exportAdminCSV('withdrawals')">Export</button></div></div><div class="tablewrap"><table class="table compact-table admin-table"><tr><th>User</th><th>UPI</th><th>Time</th><th>Amount</th><th>Status</th><th>Action</th></tr>${sliceAdmin('withdraws',arr).map(withdrawRow).join('')||'<tr><td colspan="6">No withdrawals</td></tr>'}</table></div>${adminPager('withdraws',arr)}</div>`}
function withdrawRow(w){return `<tr><td><b>${safe(w.name||w.email||userNameById(w.userId||w.uid||w.publisherId)||'-')}</b><small>${safe(w.email||w.userId||w.uid||'')}</small></td><td>${safe(w.upi||'-')}</td><td><b>${compactDate(w.time||w.createdAt)}</b><small>${safe(w.method||'UPI')}</small></td><td><b>₹${money(w.amount||0)}</b></td><td><span class="status ${safe(statusOf(w))}">${safe(statusOf(w))}</span><small>${w.balanceDeducted?'Deducted':'Pending deduct'}</small></td><td><div class="actions admin-actions"><button type="button" class="btn green" onclick="withdrawAction('${w.id}','${w._collection}','approved')">Approve</button><button type="button" class="btn red" onclick="withdrawAction('${w.id}','${w._collection}','rejected')">Reject/Refund</button><button type="button" class="btn light" onclick="delDoc('${w.id}','${w._collection}')">Delete</button></div></td></tr>`}
function smartSection(){const arr=filteredSmart();return `<div class="panel"><div class="panel-head"><h2>Smart Link Manager</h2><span class="muted">Tracking links created by publishers.</span></div><div class="tablewrap"><table class="table compact-table"><tr><th>Campaign</th><th>Worker</th><th>Profit</th><th>Action</th></tr>${sliceAdmin('smart',arr).map(l=>`<tr><td><b>${safe(l.campaignTitle||l.offerName||'-')}</b><small>${safe(l.slug||l.id)}</small></td><td><b>₹${money((l.goals||[]).reduce((a,g)=>a+Number(g.userReward||0),0))}</b></td><td><b>₹${money((l.goals||[]).reduce((a,g)=>a+Number(g.affiliateProfit||0),0))}</b></td><td><button type="button" class="btn red" onclick="delDoc('${l.id}','smart_links')">Delete</button></td></tr>`).join('')||'<tr><td colspan="4">No smart links</td></tr>'}</table></div>${adminPager('smart',arr)}</div>`}
function settingsSection(){return `<div class="grid2"><div class="panel"><h2>Global Settings</h2><label>Telegram URL</label><input id="telegram" class="field" value="${safe(settings.telegramUrl||'')}" placeholder="https://t.me/yourchannel"><button type="button" onclick="saveSettings()" class="btn tg full">Save Telegram</button></div><div class="panel"><h2>Admin Notes</h2><div class="notice"><b>Safe Mode</b><p>Postback, tracking and refresh logic are untouched. Use this panel for campaign, user, lead and wallet control.</p></div></div></div>`}
function currentSection(){if(adminTab==='overview')return overviewSection();if(adminTab==='campaigns')return campaignsSection();if(adminTab==='leads')return leadsSection();if(adminTab==='users')return usersSection();if(adminTab==='withdraws')return withdrawsSection();if(adminTab==='smart')return smartSection();if(adminTab==='settings')return settingsSection();return overviewSection()}
window.renderPage=()=>{if(!requireLogin())return;if(!isAdmin()){shell('admin',`<div class="panel"><h2>Admin only</h2><p class="muted">Your account is not admin.</p></div>`);return}shell('admin',`${adminTop()}${currentSection()}`)};

window.exportAdminCSV=(type)=>{let rows=[];if(type==='leads'){rows=[['Time','Offer','Event','Worker UPI','Publisher','Reward','Profit','Status','Click ID']];filteredLeads().forEach(x=>rows.push([compactDate(x.time||x.createdAt),x.campaignTitle||x.offerName||x.campaignId||'',x.goalName||'',x.upi||'',getUid(x),x.reward||0,x.affiliateProfit||x.profit||0,x.status||'pending',x.clickId||x.trackingId||'']))}else if(type==='withdrawals'){rows=[['Time','User','UPI','Amount','Status']];filteredWithdraws().forEach(x=>rows.push([compactDate(x.time||x.createdAt),x.email||x.userId||'',x.upi||'',x.amount||0,x.status||'pending']))}else{rows=[['Name','Email','Joined','Balance','Role','Status']];filteredUsers().forEach(x=>rows.push([x.name||'',x.email||x.id||'',compactDate(x.createdAt||x.time),x.balance||0,x.role||'user',userStatus(x)]))}downloadCSV(type+'-'+Date.now()+'.csv',rows)};
window.saveSettings=async()=>{try{await setDoc(doc(db,'settings','main'),{telegramUrl:document.getElementById('telegram')?.value||''},{merge:true});localStorage.setItem('telegramUrl',document.getElementById('telegram')?.value||'');toast('Saved');await refresh()}catch(e){toast(e.message||'Save failed')}};
window.addCampaign=async()=>{const btn=document.getElementById('addCampaignBtn');try{if(btn){btn.disabled=true;btn.textContent='Saving...'}const title=document.getElementById('atitle')?.value?.trim()||'';if(!title){toast('Title required');return}let image=document.getElementById('aimageurl')?.value?.trim()||'';const file=document.getElementById('aimg')?.files?.[0];if(!image&&file)image=await uploadCampaignImage(file);let goals=parseGoals(document.getElementById('agoals')?.value||'');if(!goals.length)goals=[{id:'g0',name:'Task Complete',maxPayout:0,userReward:0,affiliateProfit:0}];const steps=document.getElementById('asteps')?.value||'';await addDoc(collection(db,'campaigns'),{title,destinationUrl:document.getElementById('adestination')?.value?.trim()||'',trackingUrl:document.getElementById('adestination')?.value?.trim()||'',category:document.getElementById('acat')?.value||'Other',image,imageUrl:image,logo:image,terms:document.getElementById('aterms')?.value||'',steps,instructions:steps,status:'active',goals,createdAt:Date.now()});toast('Campaign added');await refresh()}catch(e){console.error(e);toast(e.message||'Campaign add failed')}finally{if(btn){btn.disabled=false;btn.textContent='Add Campaign'}}};
window.editCampaignAdmin=(id)=>{const c=campaigns.find(x=>x.id===id);if(!c)return;modal(`<h2>Edit Campaign</h2><input id="etitle" class="field" value="${safe(c.title||'')}"><input id="edestination" class="field" value="${safe(c.destinationUrl||c.trackingUrl||c.url||c.offerUrl||'')}" placeholder="Destination URL"><input id="eimage" class="field" value="${safe(c.image||c.imageUrl||c.logo||'')}" placeholder="Image URL"><label class="mini">Goals</label><textarea id="egoals" class="field" rows="5">${getGoals(c).map(g=>`${g.name} | ${g.maxPayout} | ${g.userReward}`).join('\n')}</textarea><label class="mini">Terms & Conditions</label><textarea id="eterms" class="field" rows="4">${safe(c.terms||'')}</textarea><label class="mini">Worker Steps</label><textarea id="esteps" class="field" rows="4">${safe(c.instructions||c.steps||'')}</textarea><button type="button" class="btn full" onclick="saveCampaignAdmin('${id}')">Save</button>`)};
window.saveCampaignAdmin=async(id)=>{try{const steps=document.getElementById('esteps')?.value||'';await updateDoc(doc(db,'campaigns',id),{title:document.getElementById('etitle')?.value||'',destinationUrl:document.getElementById('edestination')?.value||'',trackingUrl:document.getElementById('edestination')?.value||'',image:document.getElementById('eimage')?.value||'',imageUrl:document.getElementById('eimage')?.value||'',logo:document.getElementById('eimage')?.value||'',goals:parseGoals(document.getElementById('egoals')?.value||''),terms:document.getElementById('eterms')?.value||'',steps,instructions:steps,updatedAt:Date.now()});window.closeModal();toast('Updated');await refresh()}catch(e){toast(e.message||'Update failed')}};
window.lead=async(id,col,status,uid,reward)=>{try{await updateDoc(doc(db,col,id),{status,updatedAt:Date.now()});if(status==='approved'&&uid&&reward){const u=users.find(x=>x.id===uid);await setDoc(doc(db,'users',uid),{balance:Number(u?.balance||0)+Number(reward)},{merge:true})}toast('Updated');await refresh()}catch(e){toast(e.message||'Update failed')}};
window.withdrawAction=async(id,col,status)=>{try{const w=withdraws.find(x=>x.id===id);if(!w){toast('Withdrawal not found');return}const uid=w.userId||w.uid||w.publisherId;const amount=Number(w.amount||0);const currentStatus=statusOf(w);let patch={status,updatedAt:Date.now()};if(status==='approved'&&!w.balanceDeducted&&uid){const u=users.find(x=>x.id===uid);await setDoc(doc(db,'users',uid),{balance:Math.max(0,Number(u?.balance||0)-amount)},{merge:true});patch.balanceDeducted=true;patch.deductedOnApprove=true}if(status==='rejected'&&w.balanceDeducted&&!w.refunded&&uid&&currentStatus!=='rejected'){const u=users.find(x=>x.id===uid);await setDoc(doc(db,'users',uid),{balance:Number(u?.balance||0)+amount},{merge:true});patch.refunded=true;patch.refundedAt=Date.now()}await updateDoc(doc(db,col,id),patch);toast(status==='rejected'?'Rejected / refunded':'Withdrawal approved');await refresh()}catch(e){console.error(e);toast(e?.message||'Withdraw update failed')}};
window.delDoc=async(id,col)=>{try{if(!confirm('Delete?'))return;await deleteDoc(doc(db,col,id));toast('Deleted');await refresh()}catch(e){toast(e.message||'Delete failed')}};
window.addBal=async(uid)=>{let u=users.find(x=>x.id===uid),a=Number(document.querySelector(`[data-uid="${uid}"]`)?.value||0);await setDoc(doc(db,'users',uid),{balance:Number(u?.balance||0)+a},{merge:true});await refresh()};
window.setBal=async(uid)=>{let a=Number(document.querySelector(`[data-uid="${uid}"]`)?.value||0);await setDoc(doc(db,'users',uid),{balance:a},{merge:true});await refresh()};
window.approveUser=async(uid)=>{try{await setDoc(doc(db,'users',uid),{status:'approved',approved:true,approvedAt:Date.now()},{merge:true});toast('User approved');await refresh()}catch(e){toast(e.message||'Approve failed')}};
window.rejectUser=async(uid)=>{try{await setDoc(doc(db,'users',uid),{status:'rejected',approved:false,rejectedAt:Date.now()},{merge:true});toast('User rejected');await refresh()}catch(e){toast(e.message||'Reject failed')}};
window.roleUser=async(uid,role)=>{await setDoc(doc(db,'users',uid),{role},{merge:true});await refresh()};
window.toggleCampaign=async(id,status)=>{await updateDoc(doc(db,'campaigns',id),{status});await refresh()};
window.deleteCampaign=async(id)=>{if(confirm('Delete campaign?')){await deleteDoc(doc(db,'campaigns',id));await refresh()}};
init();
</script></body></html>
