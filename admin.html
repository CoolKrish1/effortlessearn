<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><div id="modal" class="modal"><div class="modalbox"><button type="button" class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div><script type="module">
import {init,requireLogin,shell,profile,campaigns,submissions,withdraws,users,smartLinks,revenueShare,offerCards,api} from './app.js';
import {ref,uploadBytes,getDownloadURL} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';
const {db,storage,collection,addDoc,doc,updateDoc,deleteDoc,increment,setDoc,refresh,baseUrl,safe}=api;
window.renderPage=()=>{if(!requireLogin())return;if(profile?.role!=='admin'){shell('admin',`<div class="panel"><h2>Admin Only</h2><p>Normal users ko admin page/access nahi milega. Firebase users collection me apne UID document par <b>role = admin</b> set karo.</p></div>`);return;}
const totalBalance=users.reduce((a,u)=>a+Number(u.balance||0),0); const pending=submissions.filter(s=>(s.status||'pending')==='pending').length;
shell('admin',`<div class="hero lightHero"><b>Advanced Admin Control Center</b><span>Users, balance, leads, withdrawals, campaigns, smart links sab manage karo.</span></div><div class="stats"><div class="stat"><span>Total Users</span><h2>${users.length}</h2></div><div class="stat"><span>Pending Leads</span><h2>${pending}</h2></div><div class="stat"><span>Campaigns</span><h2>${campaigns.length}</h2></div><div class="stat"><span>User Balance</span><h2>₹${totalBalance}</h2></div></div>
<div class="grid2"><div class="panel"><h2>Website Settings</h2><input id="brandName" class="field" placeholder="Brand Name" value="${safe(api.siteSettings.brandName||'Effortless Earn')}"><input id="telegramUrl" class="field" placeholder="Telegram URL e.g. https://t.me/channel" value="${safe(api.siteSettings.telegramUrl||'')}"><button type="button" onclick="saveSettings()" class="btn blue full">Save Website Settings</button></div><div class="panel"><h2>Add Campaign</h2><input id="atitle" class="field" placeholder="Campaign title"><input id="areward" type="number" class="field" placeholder="User reward ₹"><input id="apayout" type="number" class="field" placeholder="Company payout ₹"><select id="acat" class="field"><option>Banking</option><option>Shopping</option><option>Survey</option><option>App Install</option><option>Demat</option><option>Other</option></select><input id="aurl" class="field" placeholder="Destination URL"><input id="aimg" type="file" accept="image/*" class="field"><textarea id="asteps" class="field" rows="5" placeholder="Steps / terms"></textarea><button type="button" onclick="addCampaign()" class="btn blue full">Add Campaign</button></div>
<div class="panel"><h2>Create Smart Link</h2><input id="sname" class="field" placeholder="Smart link name"><input id="sslug" class="field" placeholder="Slug e.g. earn-offer"><input id="sdest" class="field" placeholder="Destination URL"><button type="button" onclick="addSmart()" class="btn green full">Create Smart Link</button><hr><h3>Revenue Share</h3>${revenueShare.map(r=>`<div class="mini"><b>${safe(r.slug||r.trackingId||r.id)}</b><span>Reward ₹${r.userReward||0} • Profit ₹${r.profit||0}</span></div>`).join('')||'<p class="muted">No revenue_share data</p>'}</div></div>
<div class="panel"><h2>User Management</h2><div class="scrollX"><table class="table"><tr><th>User</th><th>UID</th><th>Balance</th><th>Role</th><th>Set Balance</th><th>Add/Deduct</th><th>Action</th></tr>${users.map(u=>`<tr><td>${safe(u.name||'')}<br><small>${safe(u.email||'')}</small></td><td><small>${safe(u.id)}</small></td><td><b>₹${u.balance||0}</b></td><td><span class="status ${u.role==='admin'?'approved':'pending'}">${safe(u.role||'user')}</span></td><td><input id="set_${u.id}" class="field smallField" type="number" placeholder="New ₹"></td><td><input id="add_${u.id}" class="field smallField" type="number" placeholder="+/- ₹"></td><td><button type="button" class="btn light" onclick="viewUser('${u.id}')">View</button> <button type="button" class="btn blue" onclick="setBalance('${u.id}')">Set</button> <button type="button" class="btn green" onclick="changeBalance('${u.id}')">Add</button> <button type="button" class="btn light" onclick="toggleRole('${u.id}','${u.role==='admin'?'user':'admin'}')">${u.role==='admin'?'Make User':'Make Admin'}</button> <button type="button" class="btn red" onclick="deleteUserDoc('${u.id}')">Delete Data</button></td></tr>`).join('')||'<tr><td colspan="7">No users</td></tr>'}</table></div></div>
<div class="panel"><h2>Lead Approval</h2><div class="scrollX"><table class="table"><tr><th>Offer</th><th>User</th><th>Reward</th><th>Proof</th><th>Status</th><th>Action</th></tr>${submissions.map(s=>`<tr><td>${safe(s.campaignTitle||s.campaignId||s.campaign||'-')}</td><td>${safe(s.email||s.userId||'-')}</td><td>₹${s.userReward||s.reward||0}</td><td>${s.proof?`<a class="smalllink" target="_blank" href="${safe(s.proof)}">View</a>`:'-'}</td><td><span class="status ${s.status||'pending'}">${s.status||'pending'}</span></td><td><button type="button" class="btn green" onclick="lead('${s._col}','${s.id}','approved','${s.userId||''}',${Number(s.userReward||s.reward||0)})">Approve</button> <button type="button" class="btn red" onclick="lead('${s._col}','${s.id}','rejected','${s.userId||''}',0)">Reject</button> <button type="button" class="btn light" onclick="deleteLead('${s._col}','${s.id}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="6">No leads</td></tr>'}</table></div></div>
<div class="panel"><h2>Smart Links</h2><div class="scrollX"><table class="table"><tr><th>Name</th><th>Link</th><th>Destination</th><th>Status</th><th>Action</th></tr>${smartLinks.map(s=>`<tr><td>${safe(s.name||s.slug||s.id)}</td><td><input class="field" value="${baseUrl()}campaign.html?slug=${safe(s.slug||s.id)}" readonly></td><td>${safe(s.destinationUrl||s.url||'-')}</td><td>${safe(s.status||'active')}</td><td><button type="button" class="btn blue" onclick="navigator.clipboard.writeText('${baseUrl()}campaign.html?slug=${safe(s.slug||s.id)}');alert('Copied')">Copy</button> <button type="button" class="btn red" onclick="deleteSmart('${s.id}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="5">No smart links</td></tr>'}</table></div></div>
<div class="panel"><h2>Withdraw Approval</h2><div class="scrollX"><table class="table"><tr><th>User</th><th>UPI</th><th>Amount</th><th>Status</th><th>Action</th></tr>${withdraws.map(w=>`<tr><td>${safe(w.name||w.email||'-')}</td><td>${safe(w.upi||'-')}</td><td>₹${w.amount||0}</td><td><span class="status ${w.status||'pending'}">${w.status||'pending'}</span></td><td><button type="button" class="btn green" onclick="withdraw('${w._col}','${w.id}','approved')">Approve</button> <button type="button" class="btn red" onclick="withdraw('${w._col}','${w.id}','rejected')">Reject</button> <button type="button" class="btn light" onclick="deleteWithdraw('${w._col}','${w.id}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="5">No withdrawals</td></tr>'}</table></div></div>
<div class="panel"><h2>Manage Campaigns</h2><div class="offers">${offerCards(campaigns,true)}</div></div>`)};
window.saveSettings=async()=>{await setDoc(doc(db,'settings','site'),{brandName:brandName.value,telegramUrl:telegramUrl.value,updatedAt:Date.now()},{merge:true}); alert('Settings saved'); await refresh()};
window.addCampaign=async()=>{let url='';let f=aimg.files[0]; if(f){let r=ref(storage,'campaigns/'+Date.now()+'-'+f.name);await uploadBytes(r,f);url=await getDownloadURL(r)} await addDoc(collection(db,'campaigns'),{title:atitle.value,reward:Number(areward.value),userReward:Number(areward.value),companyPayout:Number(apayout.value||0),category:acat.value,destinationUrl:aurl.value,steps:asteps.value,image:url,status:'active',createdAt:Date.now()}); alert('Campaign added'); await refresh()};
window.lead=async(col,id,status,uid,reward)=>{await updateDoc(doc(db,col,id),{status,updatedAt:Date.now()}); if(status==='approved'&&uid&&reward>0) await updateDoc(doc(db,'users',uid),{balance:increment(reward)}); alert('Updated'); await refresh()};
window.withdraw=async(col,id,status)=>{await updateDoc(doc(db,col,id),{status,updatedAt:Date.now()}); alert('Updated'); await refresh()};
window.addSmart=async()=>{await addDoc(collection(db,'smart_links'),{name:sname.value,slug:sslug.value||Date.now().toString(36),destinationUrl:sdest.value,status:'active',createdAt:Date.now()}); alert('Smart link created'); await refresh()};
window.deleteSmart=async(id)=>{if(confirm('Delete smart link?')){await deleteDoc(doc(db,'smart_links',id)); await refresh()}};
window.toggleCampaign=async(id,status)=>{await updateDoc(doc(db,'campaigns',id),{status}); await refresh()};
window.deleteCampaign=async(id)=>{if(confirm('Delete campaign?')){await deleteDoc(doc(db,'campaigns',id)); await refresh()}};
window.viewUser=(uid)=>{const u=users.find(x=>x.id===uid); if(!u)return; const leads=submissions.filter(s=>s.userId===uid||s.email===u.email); const pays=withdraws.filter(w=>w.userId===uid||w.email===u.email); modal(`<h1>User Details</h1><div class="grid2"><div class="note"><b>Name</b><p>${safe(u.name||'-')}</p><b>Email</b><p>${safe(u.email||'-')}</p><b>Balance</b><p>₹${u.balance||0}</p><b>Role</b><p>${safe(u.role||'user')}</p></div><div class="note"><b>UID</b><p>${safe(u.id)}</p><b>Leads</b><p>${leads.length}</p><b>Withdrawals</b><p>${pays.length}</p><b>Created</b><p>${u.createdAt?new Date(u.createdAt).toLocaleString():'-'}</p></div></div><h2>User Leads</h2>${leads.map(l=>`<div class="mini"><span>${safe(l.campaignTitle||l.campaignId||'-')}</span><b class="status ${l.status||'pending'}">${l.status||'pending'}</b></div>`).join('')||'<p>No leads</p>'}`)};
window.setBalance=async(uid)=>{let v=Number(document.getElementById('set_'+uid).value); if(isNaN(v))return alert('Amount dalo'); await updateDoc(doc(db,'users',uid),{balance:v}); await refresh()};
window.changeBalance=async(uid)=>{let v=Number(document.getElementById('add_'+uid).value); if(isNaN(v))return alert('Amount dalo'); await updateDoc(doc(db,'users',uid),{balance:increment(v)}); await refresh()};
window.toggleRole=async(uid,role)=>{await updateDoc(doc(db,'users',uid),{role}); await refresh()};
window.deleteUserDoc=async(uid)=>{if(confirm('Sirf user ka Firestore data delete hoga, Firebase Auth account nahi. Continue?')){await deleteDoc(doc(db,'users',uid)); await refresh()}};
window.deleteLead=async(col,id)=>{if(confirm('Delete lead?')){await deleteDoc(doc(db,col,id)); await refresh()}};
window.deleteWithdraw=async(col,id)=>{if(confirm('Delete withdrawal?')){await deleteDoc(doc(db,col,id)); await refresh()}};
init();</script></body></html>
