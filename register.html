<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create Account | Effortless Earn</title>
  <meta name="description" content="Create an Effortless Earn account to join reward campaigns and track cashback offers.">
  <meta name="robots" content="index, follow"><link rel="stylesheet" href="style.css"></head><body><div class="authwrap"><div class="authbox"><div style="font-size:46px">🛡</div><h1>Create Account</h1><input id="name" class="field" placeholder="Full Name"><input id="email" class="field" placeholder="Email Address"><input id="pass" type="password" class="field" placeholder="Password"><button type="button" onclick="register()" class="btn blue full">Join Now</button><p>Already have account? <a href="login.html" class="smalllink">Login</a></p></div></div><script type="module">
import { auth, db } from './firebase.js';
import { createUserWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { doc,setDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

window.register=async()=>{
  const btn=document.querySelector('button[onclick="register()"]');
  try{
    const fullName=(document.getElementById('name')?.value||'').trim();
    const emailVal=(document.getElementById('email')?.value||'').trim();
    const passVal=document.getElementById('pass')?.value||'';
    if(!fullName){alert('Please enter your name');return;}
    if(!emailVal){alert('Please enter email');return;}
    if(passVal.length<6){alert('Password minimum 6 characters');return;}
    if(btn){btn.disabled=true;btn.textContent='Creating...'}
    const r=await createUserWithEmailAndPassword(auth,emailVal,passVal);
    await setDoc(doc(db,'users',r.user.uid),{
      name: fullName,
      email: emailVal,
      balance: 0,
      pendingBalance: 0,
      role: 'user',
      status: 'pending',
      approved: false,
      createdAt: Date.now()
    });
    await signOut(auth);
    alert('Account created. Admin approval required before login.');
    location.href='login.html';
  }catch(e){
    console.error(e);
    alert(e?.message||'Registration failed');
  }finally{
    if(btn){btn.disabled=false;btn.textContent='Join Now'}
  }
};
</script></body></html>
