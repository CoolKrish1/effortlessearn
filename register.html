<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Register</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111827;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:20px;
width:350px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:14px;
background:black;
color:white;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>

Register

</h2>

<input
id="name"
placeholder="Name"
>

<input
id="email"
placeholder="Email"
>

<input
id="password"
type="password"
placeholder="Password"
>

<button
onclick="register()"
>

REGISTER

</button>

</div>

<script type="module">

import {
auth,
db
}

from "./firebase.js";

import {

createUserWithEmailAndPassword

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {

doc,
setDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.register=
async()=>{

try{

let user=

await createUserWithEmailAndPassword(

auth,

email.value,

password.value

);

await setDoc(

doc(
db,
"users",
user.user.uid
),

{

name:
name.value,

email:
email.value,

balance:0,

role:"user",

createdAt:
Date.now()

}

);

alert(
"Account Created"
);

location.href=
"login.html";

}

catch(e){

alert(
e.message
);

}

}

</script>

</body>
</html>
