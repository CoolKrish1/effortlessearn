<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Register</title><link rel="stylesheet" href="style.css"></head><body><div class="authwrap"><div class="authbox"><div style="font-size:46px">🛡</div><h1>CREATE ACCOUNT</h1><input id="name" class="field" placeholder="Full Name"><input id="email" class="field" placeholder="Email Address"><input id="pass" type="password" class="field" placeholder="Password"><button onclick="register()" class="btn blue full">JOIN NOW</button><p>Already have account? <a href="login.html" class="smalllink">Login</a></p></div></div><script type="module">import { auth, db } from './firebase.js';import { createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';import { doc,setDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';window.register=async()=>{try{let r=await createUserWithEmailAndPassword(auth,email.value,pass.value);await setDoc(doc(db,'users',r.user.uid),{name:name.value,email:email.value,balance:0,role:'user',createdAt:Date.now()});location.href='dashboard.html'}catch(e){alert(e.message)}};</script></body></html>
