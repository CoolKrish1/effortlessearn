<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Postback</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,toast} from './app.js';window.renderPage=()=>{if(!requireLogin())return;shell('postback',`<div class="panel"><h2>Global Postback URL</h2><div class="toolbar"><input id="pb" class="field" placeholder="https://domain.com/callback?click_id={click_id}&payout={payout}&status={event_id}"><button type="button" onclick="localStorage.setItem('postback',pb.value);toast('Saved')" class="btn">Save</button></div><div class="grid2"><div class="linkbox">{click_id}: Publisher Click ID</div><div class="linkbox">{event_id}: Goal Token</div><div class="linkbox">{payout}: Publisher Profit</div><div class="linkbox">{p1_upi}: Worker UPI</div></div></div>`);pb.value=localStorage.getItem('postback')||''};init();</script></body></html>
