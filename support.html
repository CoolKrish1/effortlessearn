<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Support</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,user} from './app.js';import {db} from './firebase.js';import {collection,addDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';window.renderPage=()=>{if(!requireLogin())return;shell('support',`<div class="panel"><h2>Support Ticket</h2><input id="subject" class="field" placeholder="Subject"><textarea id="message" class="field" rows="6" placeholder="Message"></textarea><button type="button" onclick="sendTicket()" class="btn blue">SUBMIT TICKET</button></div>`)};window.sendTicket=async()=>{await addDoc(collection(db,'support'),{userId:user.uid,email:user.email,subject:subject.value,message:message.value,status:'open',time:Date.now()});alert('Ticket submitted')};init();</script></body></html>
