<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>
<body>

<h2>Login / Register</h2>

<input id="email" placeholder="email"><br><br>
<input id="password" type="password" placeholder="password"><br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
authDomain:"effortless-earn-7f39e.firebaseapp.com",
projectId:"effortless-earn-7f39e",
storageBucket:"effortless-earn-7f39e.firebaseapp.com",
messagingSenderId:"554178513766",
appId:"1:554178513766:web:d8d7edf915a95349cb16a7"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* REGISTER */
window.register = async () => {
const email = email.value;
const password = password.value;

try {
const user = await createUserWithEmailAndPassword(auth,email,password);

await setDoc(doc(db,"users",user.user.uid),{
email,
role:"user",
balance:0
});

msg.innerText = "Registered";
}catch(e){
msg.innerText = e.message;
}
};

/* LOGIN */
window.login = async () => {
const email = email.value;
const password = password.value;

try {
const user = await signInWithEmailAndPassword(auth,email,password);

const snap = await getDoc(doc(db,"users",user.user.uid));

if(!snap.exists()){
msg.innerText = "No user DB found";
return;
}

const role = snap.data().role;

if(role === "admin"){
window.location.replace("admin.html");
}else{
window.location.replace("dashboard.html");
}

}catch(e){
msg.innerText = e.message;
}
};

</script>

</body>
</html>
