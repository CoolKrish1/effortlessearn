<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>
<body>

<h2>Login</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
authDomain: "effortless-earn-7f39e.firebaseapp.com",
projectId: "effortless-earn-7f39e",
storageBucket: "effortless-earn-7f39e.appspot.com",
messagingSenderId: "554178513766",
appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* REGISTER */
window.register = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

const userCred = await createUserWithEmailAndPassword(auth,email,password);

await setDoc(doc(db,"users",userCred.user.uid),{
email,
role:"user",
balance:0
});

document.getElementById("msg").innerText="Registered ✔";

}catch(e){
document.getElementById("msg").innerText=e.message;
}

};

/* LOGIN */
window.login = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

const userCred = await signInWithEmailAndPassword(auth,email,password);

const snap = await getDoc(doc(db,"users",userCred.user.uid));

if(!snap.exists()){
document.getElementById("msg").innerText="User not found";
return;
}

const role = snap.data().role;

if(role==="admin"){
location.href="admin.html";
}else{
location.href="dashboard.html";
}

}catch(e){
document.getElementById("msg").innerText=e.message;
}

};

</script>

</body>
</html>
