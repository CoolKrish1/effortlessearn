<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login</title><link rel="stylesheet" href="style.css"></head><body><div class="authwrap"><div class="authbox"><div style="font-size:52px">🚀</div><h1>Welcome Back</h1><p class="muted">Login to publisher dashboard</p><input id="email" class="field" placeholder="Email Address"><input id="pass" type="password" class="field" placeholder="Password"><button type="button" onclick="login()" class="btn blue full">Login</button><p>New user? <a href="register.html" class="smalllink">Create account</a></p></div></div><script type="module">import {auth} from './firebase.js';import {signInWithEmailAndPassword} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';window.login=async()=>{try{await signInWithEmailAndPassword(auth,email.value.trim(),pass.value);location.replace('dashboard.html')}catch(e){alert(e.message)}};</script></body></html>
