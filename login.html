<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login</title><link rel="stylesheet" href="style.css"></head><body><div class="authwrap"><div class="authbox"><div style="font-size:46px">🚀</div><h1>Login</h1><input id="email" class="field" placeholder="Email"><input id="pass" type="password" class="field" placeholder="Password"><button type="button" onclick="login()" class="btn blue full">Access Dashboard</button><p>New Publisher? <a href="register.html" class="smalllink">Create Account</a></p></div></div><script type="module">import { auth } from './firebase.js';import { signInWithEmailAndPassword,onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';onAuthStateChanged(auth,u=>{if(u) location.href='dashboard.html'});window.login=async()=>{try{await signInWithEmailAndPassword(auth,email.value,pass.value);location.href='dashboard.html'}catch(e){alert(e.message)}};</script></body></html>
