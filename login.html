<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login</title><link rel="stylesheet" href="style.css"></head><body><div class="authwrap"><div class="authbox"><div style="font-size:46px">🛡</div><h1>PARTNER LOGIN</h1><p class="muted">SECURE GATEWAY • 2026 EDITION</p><input id="email" class="field" placeholder="Email Address"><input id="pass" type="password" class="field" placeholder="Password"><button type="button" onclick="login()" class="btn blue full">🔒 ACCESS DASHBOARD</button><p>New Publisher? <a href="register.html" class="smalllink">Create Account</a></p></div></div><script type="module">import { auth } from './firebase.js';import { signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';window.login=async()=>{try{await signInWithEmailAndPassword(auth,email.value,pass.value);location.href='dashboard.html'}catch(e){alert(e.message)}};</script></body></html>
